<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Expert Zone | Extended List</title>
    <link rel="icon" type="image/png" href="assets/diffs/High Expert.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* Bucket header styling */
        .bucket-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 32px 0 14px 0;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .bucket-header:first-of-type { margin-top: 10px; }

        .bucket-header img {
            height: 46px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
        }

        .bucket-title {
            font-size: 1.35rem;
            font-weight: 800; /* Dialed back from 900 for readability */
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .bucket-count {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Stripe accents for buckets */
        .bucket-high   .level-entry { border-left: 3px solid #c0392b; }
        .bucket-medium .level-entry { border-left: 3px solid #e67e22; }
        .bucket-low    .level-entry { border-left: 3px solid #27ae60; }

        .bucket-high   .bucket-header { border-left: 4px solid #c0392b; }
        .bucket-medium .bucket-header { border-left: 4px solid #e67e22; }
        .bucket-low    .bucket-header { border-left: 4px solid #27ae60; }

        /* Level Entry Tweak */
        .level-entry.expert-entry { 
            cursor: pointer; 
            transition: transform 0.2s; 
            min-width: 0; /* Allows children to shrink for ellipsis */
        }
        .level-entry.expert-entry:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }

        /* Prevent text from going off screen */
        .level-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .level-meta {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo-link">
            <img src="assets/logo.webp" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/mainlist">Main List</a>
            <a href="/expert" class="active">Extended List</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Entering the Expert Zone...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfgjpCE6e8sHa-GcjVrD27Tcymbc0Q7w2MGdxVTtWnKi-uoXg/viewform?usp=header" target="_blank" class="submit-btn" style="margin-bottom: 25px;">Submit a Completion</a>
            <a href="https://docs.google.com/spreadsheets/d/10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0/" target="_blank" class="submit-btn" style="margin-bottom: 25px;">Link to Google Sheet</a>

            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const expertSheetGid = "1575264256";

        const BUCKETS = [
            { key: "high", cssClass: "bucket-high", match: ["high expert"], label: "High Expert", diffAsset: "High Expert" },
            { key: "medium", cssClass: "bucket-medium", match: ["medium expert", "mid expert"], label: "Medium Expert", diffAsset: "Medium Expert" },
            { key: "low", cssClass: "bucket-low", match: ["low expert"], label: "Low Expert", diffAsset: "Low Expert" },
        ];

        let activeTags = [];
        window.DATA = { levels: [] };

        // --- UTILS ---
        function safeText(val) { return val ? String(val).trim() : ""; }
        
        function parseSkills(raw) {
            if (!raw) return [];
            return raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean);
        }

        function getBucket(level) {
            const d = level.difficulty.toLowerCase();
            for (const bucket of BUCKETS) {
                if (bucket.match.some(m => d === m || d.includes(m))) return bucket;
            }
            return null;
        }

        function mapRowToLevel(row) {
            // Automatically detect whatever is in the FIRST column (Column A)
            const firstColHeader = Object.keys(row)[0];
            const levelIdFromColA = safeText(row[firstColHeader]);

            const name = safeText(row["Name"] || row["name"]);
            const acronym = safeText(row["Acronym"]);
            const skillsArray = parseSkills(row["Skills Needed"] || row["Skills"]);
            
            return {
                id: levelIdFromColA || acronym || name, // ID used for URL
                name,
                acronym,
                author: safeText(row["Creator(s)"] || row["Author"]),
                difficulty: safeText(row["Difficulty"]),
                points: safeText(row["Points"]),
                quality: safeText(row["Quality"]),
                _skillsArray: skillsArray.map(s => s.toLowerCase()),
                img: acronym ? `assets/thumbs/${acronym.toLowerCase()}.png` : "assets/thumbs/Noimageavailable.png"
            };
        }

        // --- RENDERING ---
        function renderTagButtons(allTags) {
            const container = document.getElementById("tag-filters");
            container.innerHTML = "";
            allTags.sort().forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-btn";
                btn.textContent = tag;
                btn.onclick = () => {
                    const idx = activeTags.indexOf(tag);
                    if (idx > -1) activeTags.splice(idx, 1);
                    else activeTags.push(tag);
                    btn.classList.toggle("active-tag");
                    renderLevels();
                };
                container.appendChild(btn);
            });
        }

        function renderLevels() {
            const filtered = DATA.levels.filter(lvl => 
                activeTags.every(t => lvl._skillsArray.includes(t.toLowerCase()))
            );

            const bucketMap = {};
            BUCKETS.forEach(b => bucketMap[b.key] = []);
            filtered.forEach(lvl => {
                const b = getBucket(lvl);
                if (b) bucketMap[b.key].push(lvl);
            });

            let html = "";
            BUCKETS.forEach(bucket => {
                const levels = bucketMap[bucket.key];
                if (levels.length === 0) return;

                html += `
                <div class="${bucket.cssClass}">
                    <div class="bucket-header">
                        <img src="assets/diffs/${bucket.diffAsset}.png" alt="${bucket.label}">
                        <span class="bucket-title">${bucket.label}</span>
                        <span class="bucket-count">${levels.length} Level${levels.length !== 1 ? "s" : ""}</span>
                    </div>
                    ${levels.map(lvl => renderEntry(lvl)).join("")}
                </div>`;
            });

            document.getElementById("list-view").innerHTML = html || `<p style="text-align:center; color:var(--text-muted); margin-top:50px;">No levels match your criteria.</p>`;
        }

        function renderEntry(lvl) {
            const qualityIcon = lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small" title="Quality: ${lvl.quality}">` : '';
            const diffIcon = lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small" style="padding:10px;" title="${lvl.difficulty}">` : '';

            return `
            <div class="level-entry expert-entry" onclick="window.location.href='expert-level.html?id=${encodeURIComponent(lvl.id)}'">
                <img class="level-thumb" src="${lvl.img}" onerror="this.src='assets/thumbs/Noimageavailable.png'">
                <div class="level-info" style="padding: 0 12px; min-width: 0;">
                    <div class="level-name">${lvl.name}</div>
                    <div class="level-meta">by ${lvl.author}</div>
                    <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points ? lvl.points + " pts" : ""}</div>
                </div>
                <div class="level-difficulty-slot" style="display:flex; gap:5px; align-items:center; flex-shrink: 0;">
                    ${qualityIcon}
                    ${diffIcon}
                </div>
            </div>`;
        }

        // --- INIT ---
        async function init() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${expertSheetGid}`;
                const res = await fetch(url);
                const text = await res.text();
                const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
                
                DATA.levels = data.map(mapRowToLevel);
                
                const tagSet = new Set();
                DATA.levels.forEach(l => l._skillsArray.forEach(s => tagSet.add(s)));
                renderTagButtons(Array.from(tagSet));

                document.getElementById("loading-overlay").style.display = "none";
                renderLevels();
            } catch (err) {
                document.getElementById("loading-overlay").innerHTML = "<span style='color:red;'>Failed to load Expert Zone.</span>";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
