<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Expert Zone</title>
    <link rel="icon" type="image/png" href="assets/diffs/High Expert.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* Bucket header styling */
        .bucket-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 32px 0 14px 0;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .bucket-header:first-of-type {
            margin-top: 10px;
        }

        .bucket-header img {
            height: 46px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
        }

        .bucket-title {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .bucket-count {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Expert entries have no rank number, slight left padding tweak */
        .level-entry.expert-entry .level-rank {
            display: none;
        }

        /* Stripe accent on left edge per bucket */
        .bucket-high   .level-entry { border-left: 3px solid #c0392b; }
        .bucket-medium .level-entry { border-left: 3px solid #e67e22; }
        .bucket-low    .level-entry { border-left: 3px solid #27ae60; }

        .bucket-high   .bucket-header { border-left: 4px solid #c0392b; }
        .bucket-medium .bucket-header { border-left: 4px solid #e67e22; }
        .bucket-low    .bucket-header { border-left: 4px solid #27ae60; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo-link">
            <img src="assets/logo.webp" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/mainlist">Main List</a>
            <a href="/expert" class="active">Extended List</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Fetching levels from the expert zone...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfgjpCE6e8sHa-GcjVrD27Tcymbc0Q7w2MGdxVTtWnKi-uoXg/viewform?usp=header" target="_blank" class="submit-btn" style="margin-bottom: 25px;">Submit a Completion</a>
            <a href="https://docs.google.com/spreadsheets/d/10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0/" target="_blank" class="submit-btn" style="margin-bottom: 25px;">Link to Google Sheet</a>

            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <div id="infoModal" class="modal" style="display:none;">
        <div class="modal-content" id="modal-content-box"
            style="width:90vw; max-width:700px; aspect-ratio:4/3; position:relative; overflow-y:auto; color:#fff; display:flex; flex-direction:column;">
            <span onclick="closeModal()" class="close-btn"
                style="cursor:pointer; font-size:24px; position:absolute; top:15px; right:20px; z-index:10; text-shadow:0 1px 3px rgba(0,0,0,0.8); color:#fff;">
                &times;
            </span>
            <div id="modal-body" style="position:relative; z-index:1; padding:10px;"></div>
        </div>
    </div>

    <script src="levelRenderer.js"></script>
    <script src="levelPopup.js"></script>

    <script>
        // ── CONFIG ──────────────────────────────────────────────────────────────
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";

        const expertSheetGid = "1575264256";

        function getCsvUrl(id, gid) {
            return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
        }

        // ── BUCKET DEFINITIONS (order matters — high first) ───────────────────
        // Matches whatever text appears in the "Difficulty" column of the sheet.
        const BUCKETS = [
            {
                key: "high",
                cssClass: "bucket-high",
                // All difficulty strings that belong to this bucket (case-insensitive match)
                match: ["high expert"],
                label: "High Expert",
                diffAsset: "High Expert",   // assets/diffs/<diffAsset>.png
            },
            {
                key: "medium",
                cssClass: "bucket-medium",
                match: ["medium expert", "mid expert"],
                label: "Medium Expert",
                diffAsset: "Medium Expert",
            },
            {
                key: "low",
                cssClass: "bucket-low",
                match: ["low expert"],
                label: "Low Expert",
                diffAsset: "Low Expert",
            },
        ];

        // ── UTILITIES ────────────────────────────────────────────────────────
        function parseSkills(raw) {
            if (!raw) return [];
            return raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean);
        }

        function safeText(val) {
            return (val === undefined || val === null) ? "" : String(val);
        }

        function getStatColor(val) {
            const num = parseFloat(String(val).split('/')[0]);
            if (isNaN(num)) return "#333";
            if (num <= 4.5) return "#cc0000";
            if (num <= 7.5) return "#e67e22";
            return "#008037";
        }

        function mapRowToLevel(row) {
            const name       = safeText(row["Name"] || row["name"]);
            const acronym    = safeText(row["Acronym"] || "");
            
            // Logic for image fallbacks if acronym is missing
            const img        = acronym ? "assets/thumbs/" + acronym.toLowerCase() + ".png" : "assets/thumbs/Noimageavailable.png";
            const smallimg   = acronym ? "assets/smallthumbs/" + acronym.toLowerCase() + ".png" : "assets/smallthumbs/Noimageavailable.png";
            
            const author     = safeText(row["Creator(s)"] || row["Creator"] || row["Author"] || "");
            const difficulty = safeText(row["Difficulty"] || "");
            const skillsArray = parseSkills(safeText(row["Skills Needed"] || row["Skills needed"] || row["Skills"] || ""));
            const points     = safeText(row["Points"]      || "");
            const verifier   = safeText(row["Verifier"]    || "");
            const victors     = safeText(row["Victors"]     || "");
            const enjoyment  = safeText(row["Enjoyment"]   || "");
            const quality     = safeText(row["Quality"]     || "");
            const levelCode  = safeText(row["Level Code"]  || "");
            const desc       = safeText(row["Description"] || "");

            // Use acronym as the unique id (stable, sheet-order preserved)
            const id = acronym || name;

            return {
                id,
                name,
                img,
                smallimg,
                author,
                difficulty,
                skills: skillsArray.join(", "),
                _skillsArray: skillsArray.map(s => s.toLowerCase()),
                points,
                verifier,
                victors,
                enjoyment,
                quality,
                levelCode,
                desc,
            };
        }

        // ── RESOLVE BUCKET ────────────────────────────────────────────────────
        function getBucket(level) {
            const d = level.difficulty.toLowerCase().trim();
            for (const bucket of BUCKETS) {
                if (bucket.match.some(m => d === m || d.includes(m))) return bucket;
            }
            return null; // skip levels that don't match any bucket
        }

        // ── STATE ─────────────────────────────────────────────────────────────
        let activeTags = [];
        window.DATA = { levels: [] };

        // ── TAG FILTER ────────────────────────────────────────────────────────
        function renderTagButtons(allTags) {
            const container = document.getElementById("tag-filters");
            container.innerHTML = "";
            allTags.sort((a, b) => a.localeCompare(b));
            allTags.forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-btn";
                btn.type = "button";
                btn.textContent = tag;
                btn.dataset.tag = tag;
                btn.addEventListener("click", () => {
                    const t = btn.dataset.tag;
                    const isActive = activeTags.includes(t);
                    if (isActive) {
                        activeTags = activeTags.filter(x => x !== t);
                        btn.classList.remove("active-tag");
                    } else {
                        activeTags.push(t);
                        btn.classList.add("active-tag");
                    }
                    renderLevels();
                });
                container.appendChild(btn);
            });
        }

        // ── RENDER ────────────────────────────────────────────────────────────
        function renderLevels() {
            const filtered = DATA.levels.filter(lvl => {
                if (activeTags.length === 0) return true;
                return activeTags.every(t => lvl._skillsArray && lvl._skillsArray.includes(t.toLowerCase()));
            });

            // Group into buckets preserving sheet order
            const bucketMap = {};
            BUCKETS.forEach(b => { bucketMap[b.key] = []; });

            filtered.forEach(lvl => {
                const bucket = getBucket(lvl);
                if (bucket) bucketMap[bucket.key].push(lvl);
            });

            let html = "";

            BUCKETS.forEach(bucket => {
                const levels = bucketMap[bucket.key];
                if (levels.length === 0) return;

                const diffImg = `assets/diffs/${bucket.diffAsset}.png`;

                html += `
                <div class="${bucket.cssClass}">
                    <div class="bucket-header">
                        <img src="${diffImg}" alt="${bucket.label}" onerror="this.style.display='none'">
                        <span class="bucket-title">${bucket.label}</span>
                        <span class="bucket-count">${levels.length} level${levels.length !== 1 ? "s" : ""}</span>
                    </div>
                    ${levels.map(lvl => renderEntry(lvl)).join("")}
                </div>`;
            });

            document.getElementById("list-view").innerHTML = html || `<p style="color:var(--text-muted); text-align:center; margin-top:40px;">No levels match the selected filters.</p>`;
        }

function renderEntry(lvl) {
            const diffIcon    = lvl.difficulty ? `<img style="padding:10px;" src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small" title="${lvl.difficulty}">` : '';
            const qualityIcon = lvl.quality     ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small" title="${lvl.quality}">` : '';
            
            // --- UPDATED FALLBACK LOGIC CUZ IM STUPID---
            const thumb       = lvl.img || "assets/thumbs/Noimageavailable.png";
            const fallbackThumb = "assets/thumbs/Noimageavailable.png";

            return `
            <div class="level-entry expert-entry" onclick="showLevelDetails('${CSS.escape(lvl.id)}')" style="--bg-image: url('${thumb}'), url('${fallbackThumb}')">
                <img class="level-thumb" src="${thumb}" alt="${lvl.name}" onerror="this.src='${fallbackThumb}'">
                <div class="level-info" style="padding: 0 12px;">
                    <div class="level-name">${lvl.name}</div>
                    <div class="level-meta">by ${lvl.author || "Unknown"}</div>
                    <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points ? lvl.points + " pts" : ""}</div>
                </div>
                <div class="level-difficulty-slot" style="display:flex; gap:5px; align-items:center;">
                    ${qualityIcon}
                    ${diffIcon}
                </div>
            </div>`;
        }

        // ── MODAL ─────────────────────────────────────────────────────────────
        document.getElementById("infoModal").addEventListener("click", function(e) {
            if (!this.querySelector(".modal-content").contains(e.target)) closeModal();
        });

        function showLevelDetails(id) {
            const lvl = DATA.levels.find(l => String(l.id).trim() === String(id).trim());
            if (!lvl) return;

            const modalBox = document.getElementById("modal-content-box");
            const fallbackLarge = "assets/thumbs/Noimageavailable.png";

            // Layering backgrounds: Primary image first, Fallback second.
            modalBox.style.background = `linear-gradient(to bottom, rgba(20,20,20,0.5), rgba(15,15,15,0.9)), url('${lvl.img}'), url('${fallbackLarge}')`;
            modalBox.style.backgroundSize = "cover";
            modalBox.style.backgroundPosition = "center";
            modalBox.style.backgroundRepeat = "no-repeat";

            const renderBar = (label, val) => {
                const num     = parseFloat(String(val).split('/')[0]) || 0;
                const percent = Math.min(Math.max((num / 10) * 100, 0), 100);
                const color   = getStatColor(num);
                const display = (val && String(val).trim() !== "") ? val : "N/A";
                return `
                <div class="stat-box-container">
                    <div class="stat-label" style="color:#bbb; font-size:0.7rem; text-transform:uppercase; margin-bottom:4px; text-align:center;">${label}</div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width:${percent}%; background-color:${color};"></div>
                        <div class="stat-bar-text">${display}</div>
                    </div>
                </div>`;
            };

            document.getElementById("modal-body").innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                    <div>
                        <h2 style="margin:0; text-shadow:2px 2px 4px rgba(0,0,0,1); font-size:1.8rem;">${lvl.name}</h2>
                        <p style="text-shadow:1px 1px 3px rgba(0,0,0,1); margin:5px 0;">By <strong>${lvl.author || "Unknown"}</strong></p>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        ${lvl.quality    ? `<img src="assets/quality/${lvl.quality.trim()}.svg" style="width:60px; height:60px; filter:drop-shadow(0px 4px 6px rgba(0,0,0,0.8)); padding:10px;" title="${lvl.quality}">` : ""}
                        ${lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" style="width:60px; filter:drop-shadow(0px 4px 6px rgba(0,0,0,0.8));" title="${lvl.difficulty}">` : ""}
                    </div>
                </div>

                <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; margin-bottom:15px;">
                    <p style="font-size:0.95rem; color:#eee; line-height:1.4; margin:0; text-shadow:1px 1px 2px rgba(0,0,0,0.8);">${lvl.desc || "No description provided."}</p>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:15px; align-items:start;">
                    <div>
                        ${renderBar("Enjoyment", lvl.enjoyment)}
                        <h3 style="font-size:0.9rem; margin:15px 0 5px 0; color:#fff;">Victors</h3>
                        <div style="font-size:0.85rem; color:#ccc;">${lvl.victors ? lvl.victors.split(/[\s,]+/).filter(Boolean).join(", ") : "None"}</div>
                    </div>
                    <div class="stat-box-container">
                        <h3 style="font-size:0.9rem; margin:0 0 8px 0; color:#fff; text-shadow:1px 1px 2px #000;">Skills</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:5px;">
                            ${lvl.skills
                                ? lvl.skills.split(',').map(s => `<span style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); padding:3px 8px; border-radius:4px; font-size:0.8rem;">${s.trim()}</span>`).join('')
                                : "N/A"}
                        </div>
                    </div>
                </div>

                ${lvl.levelCode ? `
                <div style="margin-top:15px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.1);">
                    <span style="font-size:0.8rem; color:#bbb;">Level Code:</span>
                    <div style="display:flex; gap:8px; margin-top:5px;">
                        <input type="text" value="${lvl.levelCode}" readonly style="background:rgba(0,0,0,0.6); color:#fff; border:1px solid #444; padding:5px; border-radius:4px; flex-grow:1; font-family:monospace;">
                        <button onclick="copyLevelCode(this, '${lvl.levelCode.replace(/'/g, "\\'")}')" style="background:var(--accent); color:#fff; border:none; padding:5px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Copy</button>
                        <button onclick="LevelPopup.show('${lvl.levelCode}')" style="background:var(--accent); color:#fff; border:none; padding:5px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Preview Level</button>
                    </div>
                </div>` : ""}
            `;

            document.getElementById("infoModal").style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function copyLevelCode(btn, code) {
            if (!code) return;
            const orig = btn.textContent;
            const done = () => { btn.textContent = "Copied!"; setTimeout(() => btn.textContent = orig, 1500); };
            navigator.clipboard.writeText(code).then(done).catch(() => {
                const t = document.createElement("textarea");
                t.value = code; document.body.appendChild(t); t.select();
                document.execCommand("copy"); document.body.removeChild(t); done();
            });
        }

        function closeModal() {
            document.getElementById("infoModal").style.display = "none";
            document.body.style.overflow = "auto";
        }

        // ── INIT ──────────────────────────────────────────────────────────────
        async function init() {
            try {
                document.getElementById("loading-overlay").textContent = "Entering the Expert Zone...";

                const url  = getCsvUrl(spreadsheetId, expertSheetGid);
                const res  = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });

                DATA.levels = data.map(mapRowToLevel);

                // Build skill tag set
                const tagSet = new Set();
                DATA.levels.forEach(l => (l._skillsArray || []).forEach(s => tagSet.add(s)));
                renderTagButtons(Array.from(tagSet));

                document.getElementById("loading-overlay").style.display = "none";
                renderLevels();
            } catch (err) {
                console.error(err);
                document.getElementById("loading-overlay").innerHTML =
                    "<span style='color:red;'>Connection Error — could not load the Expert Zone sheet.<br>Make sure the GID is set correctly and the sheet is publicly accessible.</span>";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
