<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Expert Zone | Extended List</title>
    <link rel="icon" type="image/png" href="assets/diffs/High Expert.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* Bucket header styling */
        .bucket-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 32px 0 14px 0;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .bucket-header:first-of-type { margin-top: 10px; }

        .bucket-header img {
            height: 46px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
        }

        .bucket-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .bucket-count {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* The Blurred Background Effect (Matches Mainlist) */
        .level-entry {
            position: relative;
            z-index: 1;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .level-entry::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1);
        }

        .level-entry:hover { transform: translateX(5px); }

        /* Stripe accents for buckets */
        .bucket-high   .level-entry { border-left: 4px solid #c0392b; }
        .bucket-medium .level-entry { border-left: 4px solid #e67e22; }
        .bucket-low    .level-entry { border-left: 4px solid #27ae60; }

        .bucket-high   .bucket-header { border-left: 5px solid #c0392b; }
        .bucket-medium .bucket-header { border-left: 5px solid #e67e22; }
        .bucket-low    .bucket-header { border-left: 5px solid #27ae60; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
        <div class="nav-links">
            <a href="/mainlist">Main List</a>
            <a href="/expert" class="active">Extended List</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Entering the Expert Zone...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="https://docs.google.com/forms/..." target="_blank" class="submit-btn" style="margin-bottom: 25px;">Submit a Completion</a>
            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const expertSheetGid = "1575264256";

        const BUCKETS = [
            { key: "high", cssClass: "bucket-high", match: ["high expert"], label: "High Expert", diffAsset: "High Expert" },
            { key: "medium", cssClass: "bucket-medium", match: ["medium expert", "mid expert"], label: "Medium Expert", diffAsset: "Medium Expert" },
            { key: "low", cssClass: "bucket-low", match: ["low expert"], label: "Low Expert", diffAsset: "Low Expert" },
        ];

        let activeTags = [];
        window.DATA = { levels: [] };

        function safeText(val) { return val ? String(val).trim() : ""; }
        function parseSkills(raw) { return raw ? raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean) : []; }

        function getBucket(level) {
            const d = level.difficulty.toLowerCase();
            return BUCKETS.find(b => b.match.some(m => d.includes(m))) || null;
        }

        function mapRowToLevel(row) {
            const firstColHeader = Object.keys(row)[0];
            const levelId = safeText(row[firstColHeader]);
            const acronym = safeText(row["Acronym"]);
            
            return {
                id: levelId || acronym,
                name: safeText(row["Name"] || row["name"]),
                author: safeText(row["Creator(s)"] || row["Author"]),
                difficulty: safeText(row["Difficulty"]),
                points: safeText(row["Points"]),
                quality: safeText(row["Quality"]),
                _skillsArray: parseSkills(row["Skills Needed"]).map(s => s.toLowerCase()),
                img: acronym ? `assets/thumbs/${acronym.toLowerCase()}.png` : "assets/thumbs/Noimageavailable.png"
            };
        }

        function renderLevels() {
            const filtered = DATA.levels.filter(lvl => 
                activeTags.every(t => lvl._skillsArray.includes(t.toLowerCase()))
            );

            let html = "";
            BUCKETS.forEach(bucket => {
                const levels = filtered.filter(lvl => getBucket(lvl)?.key === bucket.key);
                if (levels.length === 0) return;

                html += `
                <div class="${bucket.cssClass}">
                    <div class="bucket-header">
                        <img src="assets/diffs/${bucket.diffAsset}.png" alt="${bucket.label}">
                        <span class="bucket-title">${bucket.label}</span>
                        <span class="bucket-count">${levels.length} Levels</span>
                    </div>
                    ${levels.map(lvl => `
                        <div class="level-entry" onclick="window.location.href='expert-level.html?id=${encodeURIComponent(lvl.id)}'" style="--bg-image: url('${lvl.img}')">
                            <img class="level-thumb" src="${lvl.img}" onerror="this.src='assets/thumbs/Noimageavailable.png'">
                            <div class="level-info" style="padding: 0 12px; min-width: 0;">
                                <div class="level-name">${lvl.name}</div>
                                <div class="level-meta">by ${lvl.author}</div>
                                <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points} pts</div>
                            </div>
                            <div class="level-difficulty-slot" style="display:flex; gap:5px; margin-left: auto;">
                                ${lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small">` : ''}
                                ${lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small">` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            });
            document.getElementById("list-view").innerHTML = html || "<p>No matches.</p>";
        }

        async function init() {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${expertSheetGid}`);
            const text = await res.text();
            const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
            DATA.levels = data.map(mapRowToLevel);

            const tagSet = new Set();
            DATA.levels.forEach(l => l._skillsArray.forEach(s => tagSet.add(s)));
            const container = document.getElementById("tag-filters");
            Array.from(tagSet).sort().forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-btn";
                btn.textContent = tag;
                btn.onclick = () => {
                    btn.classList.toggle("active-tag");
                    activeTags = Array.from(document.querySelectorAll(".active-tag")).map(b => b.textContent);
                    renderLevels();
                };
                container.appendChild(btn);
            });

            document.getElementById("loading-overlay").style.display = "none";
            renderLevels();
        }
        window.onload = init;
    </script>
</body>
</html>
