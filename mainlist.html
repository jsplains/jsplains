<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        .page-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        .top-nav { margin-bottom: 20px; }
        .back-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .back-link:hover { color: #fff; }

        .layout-wrapper { display: flex; gap: 25px; }
        .level-card { flex: 2; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
        .sidebar-card { flex: 0.8; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; }
        
        .banner { height: 350px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid var(--border); background-color: #000; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 1)); }
        .level-body { padding: 40px; position: relative; margin-top: -60px; }

        .section-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        
        .player-entry { 
            background: rgba(255,255,255,0.03); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .player-pfp { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; background: #222; border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-divider { height: 1px; background: var(--border); margin: 20px 0; }

        .skill-tag { background: rgba(255,255,255,0.08); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; display: inline-block; margin: 0 6px 6px 0; }
        
        /* Stats Styling */
        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-top: 30px; 
        }

        .stat-item {
            background: rgba(255,255,255,0.02); 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }
        .stat-item:hover { transform: translateY(-3px); background: rgba(255,255,255,0.04); }

        .custom-stat-icon {
            height: 55px;
            margin-bottom: 15px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
        }

        .label-with-icon {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .rank-bubble {
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 1.8rem;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .level-header-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .code-container { display: flex; gap: 8px; margin-top: 10px; }
        .code-input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-family: monospace; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 6px; font-weight: 700; cursor: pointer; }

        @media (max-width: 900px) { .layout-wrapper { flex-direction: column; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
        <div class="nav-links">
            <a href="/index" class="active">Main List</a>
            <a href="/expert">Extended List</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Loading levels...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfgjpCE6e8sHa-GcjVrD27Tcymbc0Q7w2MGdxVTtWnKi-uoXg/viewform" target="_blank" class="submit-btn">Submit a Completion</a>
            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const sheetGids = ["0", "1720349441"]; 

        let activeTags = [];
        window.DATA = { levels: [] };

        // --- UTILS ---
        function getCsvUrl(gid) { return `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}`; }
        function parseSkills(raw) { return raw ? raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean) : []; }
        function safeText(val) { return val == null ? "" : String(val); }

        function mapRowToLevel(row) {
            const m82id = safeText(row["ID (M82)"] || "N/A");
            const acronym = safeText(row["Acronym"] || "").toLowerCase();
            return {
                id: m82id,
                name: safeText(row["Name"] || "Unknown"),
                img: acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png",
                author: safeText(row["Creator(s)"] || "Unknown"),
                rank: safeText(row["Rank"] || "0"),
                difficulty: safeText(row["Difficulty"] || ""),
                points: safeText(row["Points"] || "0"),
                quality: safeText(row["Quality"] || ""),
                _skillsArray: parseSkills(safeText(row["Skills Needed"] || "")).map(s => s.toLowerCase())
            };
        }

        async function fetchSheetCsv(gid) {
            const res = await fetch(getCsvUrl(gid));
            const text = await res.text();
            return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        }

        // --- NAVIGATION ---
        function navigateToLevel(id) {
            window.location.href = `/level?id=${id}`;
        }

        // --- RENDERING ---
        function filterLevels() {
            const filtered = window.DATA.levels.filter(lvl => 
                activeTags.length === 0 || activeTags.every(t => lvl._skillsArray.includes(t.toLowerCase()))
            );
            
            document.getElementById('list-view').innerHTML = filtered.map(lvl => `
                <div class="level-entry" onclick="navigateToLevel('${lvl.id}')" style="--bg-image: url('${lvl.img}')">
                    <img class="level-thumb" src="${lvl.img}" onerror="this.src='assets/thumbs/Noimageavailable.png'">
                    <div class="level-rank">#${lvl.rank}</div>
                    <div class="level-info">
                        <div class="level-name">${lvl.name}</div>
                        <div class="level-meta">by ${lvl.author}</div>
                        <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points} pts</div>
                    </div>
                    <div class="level-difficulty-slot">
                        ${lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small">` : ''}
                        ${lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small">` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderTagButtons(allTags) {
            const container = document.getElementById("tag-filters");
            allTags.sort().forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-btn";
                btn.textContent = tag;
                btn.onclick = () => {
                    btn.classList.toggle("active-tag");
                    activeTags = Array.from(document.querySelectorAll(".active-tag")).map(b => b.textContent);
                    filterLevels();
                };
                container.appendChild(btn);
            });
        }

        async function init() {
            try {
                const [d1, d2] = await Promise.all([fetchSheetCsv(sheetGids[0]), fetchSheetCsv(sheetGids[1])]);
                window.DATA.levels = [...d1, ...d2].map(mapRowToLevel);
                
                const tagSet = new Set();
                window.DATA.levels.forEach(l => l._skillsArray.forEach(s => tagSet.add(s)));
                renderTagButtons(Array.from(tagSet));
                
                document.getElementById('loading-overlay').style.display = 'none';
                filterLevels();
            } catch (e) { console.error(e); }
        }
        window.onload = init;
    </script>
</body>
</html>
