<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
        <div class="nav-links">
            <a href="index.html" class="active">Main List</a>
            <a href="expert.html">Extended List</a>
            <a href="leaderboard.html">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Loading levels...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="https://docs.google.com/forms/..." target="_blank" class="submit-btn">Submit a Completion</a>
            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const sheetGids = ["0", "1720349441"]; 

        let activeTags = [];
        window.DATA = { levels: [] };

        // --- UTILS ---
        function getCsvUrl(gid) { return `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}`; }
        function parseSkills(raw) { return raw ? raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean) : []; }
        function safeText(val) { return val == null ? "" : String(val); }

        function mapRowToLevel(row) {
            const m82id = safeText(row["ID (M82)"] || "N/A");
            const acronym = safeText(row["Acronym"] || "").toLowerCase();
            return {
                id: m82id,
                name: safeText(row["Name"] || "Unknown"),
                img: acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png",
                author: safeText(row["Creator(s)"] || "Unknown"),
                rank: safeText(row["Rank"] || "0"),
                difficulty: safeText(row["Difficulty"] || ""),
                points: safeText(row["Points"] || "0"),
                quality: safeText(row["Quality"] || ""),
                _skillsArray: parseSkills(safeText(row["Skills Needed"] || "")).map(s => s.toLowerCase())
            };
        }

        async function fetchSheetCsv(gid) {
            const res = await fetch(getCsvUrl(gid));
            const text = await res.text();
            return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        }

        // --- NAVIGATION ---
        function navigateToLevel(id) {
            window.location.href = `level.html?id=${id}`;
        }

        // --- RENDERING ---
        function filterLevels() {
            const filtered = window.DATA.levels.filter(lvl => 
                activeTags.length === 0 || activeTags.every(t => lvl._skillsArray.includes(t.toLowerCase()))
            );
            
            document.getElementById('list-view').innerHTML = filtered.map(lvl => `
                <div class="level-entry" onclick="navigateToLevel('${lvl.id}')" style="--bg-image: url('${lvl.img}')">
                    <img class="level-thumb" src="${lvl.img}" onerror="this.src='assets/thumbs/Noimageavailable.png'">
                    <div class="level-rank">#${lvl.rank}</div>
                    <div class="level-info">
                        <div class="level-name">${lvl.name}</div>
                        <div class="level-meta">by ${lvl.author}</div>
                        <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points} pts</div>
                    </div>
                    <div class="level-difficulty-slot">
                        ${lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small">` : ''}
                        ${lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small">` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderTagButtons(allTags) {
            const container = document.getElementById("tag-filters");
            allTags.sort().forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-btn";
                btn.textContent = tag;
                btn.onclick = () => {
                    btn.classList.toggle("active-tag");
                    activeTags = Array.from(document.querySelectorAll(".active-tag")).map(b => b.textContent);
                    filterLevels();
                };
                container.appendChild(btn);
            });
        }

        async function init() {
            try {
                const [d1, d2] = await Promise.all([fetchSheetCsv(sheetGids[0]), fetchSheetCsv(sheetGids[1])]);
                window.DATA.levels = [...d1, ...d2].map(mapRowToLevel);
                
                const tagSet = new Set();
                window.DATA.levels.forEach(l => l._skillsArray.forEach(s => tagSet.add(s)));
                renderTagButtons(Array.from(tagSet));
                
                document.getElementById('loading-overlay').style.display = 'none';
                filterLevels();
            } catch (e) { console.error(e); }
        }
        window.onload = init;
    </script>
</body>
</html>
