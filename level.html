<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Level...</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        .page-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        .top-nav { margin-bottom: 20px; }
        .back-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .back-link:hover { color: #fff; }

        .layout-wrapper { display: flex; gap: 25px; }
        .level-card { flex: 2; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
        .sidebar-card { flex: 0.8; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; }
        
        .banner { height: 350px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid var(--border); background-color: #000; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 1)); }
        .level-body { padding: 40px; position: relative; margin-top: -60px; }

        .section-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        
        .player-entry { 
            background: rgba(255,255,255,0.03); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .player-pfp { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; background: #222; border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-divider { height: 1px; background: var(--border); margin: 20px 0; }

        .skill-tag { background: rgba(255,255,255,0.08); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; display: inline-block; margin: 0 6px 6px 0; }
        
        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 15px; 
            margin-top: 30px; 
        }

        .stat-item {
            background: rgba(255,255,255,0.02); 
            padding: 20px 10px;
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
            min-width: 0;
        }
        .stat-item:hover { transform: translateY(-3px); background: rgba(255,255,255,0.04); }

        .custom-stat-icon {
            height: 55px;
            margin-bottom: 15px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
        }

        .label-with-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 8px;
            width: 100%;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 900;
            line-height: 1.2;
            word-wrap: break-word;
            overflow-wrap: break-word;
            width: 100%;
        }

        .rank-bubble {
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 1.8rem;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .level-header-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .code-container { display: flex; gap: 8px; margin-top: 10px; max-width: 600px; }
        .code-input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.9rem; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .action-btn:hover { opacity: 0.8; }

        @media (max-width: 900px) { .layout-wrapper { flex-direction: column; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
    </nav>

    <div class="page-container">
        <div class="top-nav">
            <a href="/mainlist" class="back-link">← Back to Main List</a>
        </div>

        <div id="loading-msg" style="text-align:center; margin-top:50px; font-weight:700; color:var(--text-muted);">
            Connecting to the zone...
        </div>

        <div class="layout-wrapper" id="page-content" style="display:none;">
            <div class="level-card">
                <div id="banner" class="banner"><div class="banner-overlay"></div></div>
                <div class="level-body">
                    <div id="main-details"></div>
                </div>
            </div>
            
            <div class="sidebar-card">
                <span class="section-label">Verifier</span>
                <div id="verifier-area"></div>
                <div class="sidebar-divider"></div>
                <span class="section-label">Victors</span>
                <div id="victors-area"></div>
            </div>
        </div>
    </div>

    <script src="levelRenderer.js"></script>
    <script src="levelPopup.js"></script>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const sheetGids = ["0", "1720349441"]; 

        function getScoreColor(val) {
            const score = parseFloat(val);
            if (isNaN(score)) return 'var(--text-muted)';
            const normalized = score <= 10 ? score * 10 : score;
            if (normalized >= 75) return '#22c55e'; // Green
            if (normalized >= 55) return '#eab308'; // Yellow
            if (normalized >= 35) return '#f97316'; // Orange
            return '#ef4444'; // Red
        }

        function getEnjoymentIcon(val) {
            const score = parseFloat(val);
            if (isNaN(score)) return 'fa-face-meh-blank';
            
            const normalized = score <= 10 ? score * 10 : score;
            
            if (normalized >= 75) return 'fa-face-smile';      // Green range
            if (normalized >= 35) return 'fa-face-meh';        // Yellow/Orange range
            return 'fa-face-frown';                            // Red range
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id');
            if (!targetId) { window.location.href = '/mainlist'; return; }

            try {
                const results = await Promise.all(sheetGids.map(gid => 
                    fetch(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}`)
                    .then(r => r.text())
                    .then(txt => Papa.parse(txt, { header: true, skipEmptyLines: true }).data)
                ));

                const allRows = results.flat();
                const lvl = allRows.find(row => String(Object.values(row)[0]).trim() === String(targetId).trim());

                if (!lvl) {
                    document.getElementById('loading-msg').innerHTML = "<h1>Level Not Found</h1>";
                    return;
                }
                renderPage(lvl, targetId);
            } catch (err) {
                document.getElementById('loading-msg').innerHTML = "Database Connection Failed.";
            }
        }

        function renderPage(lvl, idValue) {
            const getVal = (keys) => {
                const foundKey = Object.keys(lvl).find(k => keys.includes(k.trim()));
                return foundKey ? lvl[foundKey] : "";
            };

            const name = getVal(["Name", "name"]) || "Unknown";
            const rank = getVal(["Rank"]) || "?";
            const acronym = (getVal(["Acronym"]) || "").toLowerCase().trim();
            const thumb = acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png";
            const levelCode = (getVal(["Level Code"]) || "").trim();
            
            const enjoymentVal = getVal(["Enjoyment"]) || "0";
            const qualityVal = getVal(["Quality"]) || "0";
            const difficultyVal = getVal(["Difficulty"]) || "N/A";
            const pointsVal = getVal(["Points"]) || "0";
            
            document.title = `(#${rank}) ${name}`;
            document.getElementById('banner').style.backgroundImage = `url('${thumb}')`;
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('page-content').style.display = 'flex';

            const verifier = (getVal(["Verifier"]) || "").trim();
            document.getElementById('verifier-area').innerHTML = (verifier && verifier.toLowerCase() !== "none") 
                ? `<div class="player-entry"><img src="assets/players/${verifier}.png" onerror="this.src='assets/players/default.png'" class="player-pfp"><span style="font-weight:700;">${verifier}</span></div>`
                : `<p style="color:var(--text-muted);">None</p>`;

            const victorsRaw = getVal(["Victors"]) || "";
            const otherVictors = victorsRaw.split(/[ ,]+/).filter(v => v && v.toLowerCase() !== "none" && v.toLowerCase() !== verifier.toLowerCase());
            document.getElementById('victors-area').innerHTML = otherVictors.length > 0 
                ? otherVictors.map(v => `<div class="player-entry"><img src="assets/players/${v.trim()}.png" onerror="this.src='assets/players/default.png'" class="player-pfp"><span style="font-weight:600;">${v.trim()}</span></div>`).join("")
                : `<p style="color:var(--text-muted);">None</p>`;

            const skillsRaw = getVal(["Skills Needed", "Skills"]);
            const skillsHtml = skillsRaw ? skillsRaw.split(',').map(s => `<span class="skill-tag">${s.trim()}</span>`).join('') : "N/A";

            document.getElementById('main-details').innerHTML = `
                <div class="level-header-row">
                    <span class="rank-bubble">#${rank}</span>
                    <h1 style="font-size:3rem; font-weight:900; margin:0; line-height:1.1;">${name}</h1>
                    <span style="color: var(--text-muted); font-size: 1.3rem; font-family: monospace;">(ID: ${idValue})</span>
                </div>
                <p style="color:var(--text-muted); font-size:1.2rem; margin-top:15px;">by <strong>${getVal(["Creator(s)", "Author"])}</strong></p>
                
                <div style="margin:30px 0; padding:25px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px;">
                    <span class="section-label" style="color:var(--accent)">Description</span>
                    <p style="margin:0; line-height:1.6; color:#eee; font-size:0.95rem;">${getVal(["Description", "Notes"]) || "No description provided."}</p>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">
                        <img src="assets/diffs/${difficultyVal.trim()}.png" onerror="this.style.visibility='hidden'" class="custom-stat-icon">
                        <div class="label-with-icon">
                            <i class="fa-solid fa-gauge-high"></i> Difficulty
                        </div>
                        <div class="stat-value">${difficultyVal}</div>
                    </div>

                    <div class="stat-item">
                        <div style="height:55px; display:flex; align-items:center; justify-content:center; margin-bottom:15px;">
                             <i class="fa-solid ${getEnjoymentIcon(enjoymentVal)}" style="font-size:3rem; color:${getScoreColor(enjoymentVal)}; opacity: 0.9;"></i>
                        </div>
                        <div class="label-with-icon">
                            <i class="fa-solid fa-heart"></i> Enjoyment
                        </div>
                        <div class="stat-value" style="color: ${getScoreColor(enjoymentVal)};">${enjoymentVal}</div>
                    </div>

                    <div class="stat-item">
                        <img src="assets/quality/${qualityVal.trim()}.svg" onerror="this.style.visibility='hidden'" class="custom-stat-icon">
                        <div class="label-with-icon">
                            <i class="fa-solid fa-star"></i> Quality
                        </div>
                        <div class="stat-value" style="color: ${getScoreColor(qualityVal)};">${qualityVal}</div>
                    </div>

                    <div class="stat-item">
                        <div style="height:55px; display:flex; align-items:center; justify-content:center; margin-bottom:15px;">
                             <i class="fa-solid fa-trophy" style="font-size:3rem; color:var(--accent); opacity: 0.9;"></i>
                        </div>
                        <div class="label-with-icon">
                            <i class="fa-solid fa-bolt"></i> Points
                        </div>
                        <div class="stat-value" style="color:var(--accent);">${pointsVal}</div>
                    </div>
                </div>

                <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top:30px;">
                    <span class="section-label">Skills Required</span>
                    <div style="margin-top:10px;">${skillsHtml}</div>
                </div>

                <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top:30px;">
                    <span class="section-label">Level Code</span>
                    <div class="code-container">
                        <input type="text" value="${levelCode || "No Code"}" readonly id="lcode" class="code-input">
                        <button onclick="copyLevelCode(this, \`${levelCode.replace(/'/g, "\\'")}\`)" class="action-btn">Copy</button>
                        <button onclick="LevelPopup.show(\`${levelCode.replace(/'/g, "\\'")}\`)" class="action-btn">Preview</button>
                    </div>
                </div>
            `;
        }

        function copyLevelCode(btn, code) {
            if (!code || code === "No Code") return;
            navigator.clipboard.writeText(code).then(() => {
                const orig = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
