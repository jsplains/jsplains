<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Details</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        .page-container { max-width: 1200px; margin: 40px auto; display: flex; gap: 25px; padding: 0 20px; }
        .level-card { flex: 2; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; min-height: 600px; }
        .victor-card { flex: 0.8; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; }
        .banner { height: 350px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid var(--border); background-color: #000; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 1)); }
        .level-body { padding: 40px; position: relative; margin-top: -60px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 700; margin-bottom: 20px; display: inline-block; transition: 0.2s; }
        .back-link:hover { color: var(--accent-hover); text-decoration: underline; }
        .victor-pill { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        @media (max-width: 900px) {
            .page-container { flex-direction: column; }
            .victor-card { order: 2; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
        <div class="nav-links">
            <a href="index.html">Main List</a>
            <a href="expert.html">Extended List</a>
            <a href="leaderboard.html">Leaderboard</a>
        </div>
    </nav>

    <div id="loading-msg" style="text-align:center; margin-top:100px; font-weight:700; color:var(--text-muted);">
        Retrieving Level Data...
    </div>

    <div class="page-container" id="page-content" style="display:none;">
        <div class="level-card">
            <div id="banner" class="banner"><div class="banner-overlay"></div></div>
            <div class="level-body">
                <a href="index.html" class="back-link">← Back to Main List</a>
                <div id="main-details"></div>
            </div>
        </div>

        <div class="victor-card">
            <h3 style="text-transform:uppercase; font-size:0.75rem; color:var(--text-muted); letter-spacing:1px; margin-bottom:20px;">Victors & Verifier</h3>
            <div id="victor-list"></div>
        </div>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        // List all GIDs just in case the ID is on the second sheet
        const sheetGids = ["0", "1720349441"]; 

        function getStatColor(val) {
            const num = parseFloat(val);
            if (isNaN(num)) return "var(--text-main)";
            if (num <= 4.5) return "#ef4444";
            if (num <= 7.5) return "#fbbf24";
            return "#22c55e";
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id');
            
            if (!targetId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Fetch both sheets to ensure we find the level wherever it is
                const results = await Promise.all(sheetGids.map(gid => 
                    fetch(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}`)
                    .then(r => r.text())
                    .then(txt => Papa.parse(txt, { header: true, skipEmptyLines: true }).data)
                ));

                const allRows = results.flat();
                
                // CRITICAL FIX: Try multiple possible ID column names and convert both to strings for comparison
                const lvl = allRows.find(row => {
                    const rowId = row["ID (M82)"] || row["ID"] || row["id"];
                    return String(rowId).trim() === String(targetId).trim();
                });

                if (!lvl) {
                    document.getElementById('loading-msg').innerHTML = `
                        <h1 style="color:#ef4444">Level Not Found</h1>
                        <p>ID: ${targetId} could not be located in the database.</p>
                        <a href="index.html" style="color:var(--accent)">Return to List</a>
                    `;
                    return;
                }

                renderPage(lvl);
            } catch (err) {
                console.error("Initialization Error:", err);
                document.getElementById('loading-msg').innerHTML = "Failed to connect to the database.";
            }
        }

        function renderPage(lvl) {
            // Setup naming/images
            const name = lvl["Name"] || lvl["name"] || "Unknown Level";
            const acronym = (lvl["Acronym"] || "").toLowerCase().trim();
            const thumb = acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png";
            
            document.getElementById('banner').style.backgroundImage = `url('${thumb}')`;
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('page-content').style.display = 'flex';

            // Victors Logic
            const verifier = (lvl["Verifier"] || "").trim();
            const victorsRaw = lvl["Victors"] || "";
            const otherVictors = victorsRaw.split(/[ ,]+/).filter(v => v && v.toLowerCase() !== "none" && v.toLowerCase() !== verifier.toLowerCase());
            
            let vHtml = "";
            if (verifier && verifier.toLowerCase() !== "none") {
                vHtml += `
                    <div class="victor-pill" style="border-left: 4px solid var(--accent)">
                        <img src="assets/players/${verifier}.png" onerror="this.src='assets/players/default.png'" style="width:30px; height:30px; border-radius:4px;">
                        <div>
                            <div style="font-size:0.85rem; font-weight:700;">${verifier}</div>
                            <div style="font-size:0.6rem; color:var(--accent); text-transform:uppercase; font-weight:800;">Verifier</div>
                        </div>
                    </div>`;
            }

            otherVictors.forEach(v => {
                vHtml += `
                    <div class="victor-pill">
                        <img src="assets/players/${v}.png" onerror="this.src='assets/players/default.png'" style="width:30px; height:30px; border-radius:4px;">
                        <div style="font-size:0.85rem; font-weight:700;">${v}</div>
                    </div>`;
            });

            document.getElementById('victor-list').innerHTML = vHtml || "<p style='color:var(--text-muted); font-size:0.8rem;'>No recorded victors.</p>";

            // Main Details Construction
            const difficulty = lvl["Difficulty"] || "";
            const quality = lvl["Quality"] || "";

            document.getElementById('main-details').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h1 style="font-size:2.8rem; font-weight:900; line-height:1; margin:0; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">${name}</h1>
                        <p style="font-size:1.1rem; color:var(--text-muted); margin-top:10px;">by <strong style="color:var(--text-main)">${lvl["Creator(s)"] || lvl["Author"] || "Unknown"}</strong></p>
                    </div>
                    <div style="display:flex; gap:10px;">
                        ${quality ? `<img src="assets/quality/${quality.trim()}.svg" style="height:60px;" title="Quality: ${quality}">` : ""}
                        ${difficulty ? `<img src="assets/diffs/${difficulty.trim()}.png" style="height:60px;" title="Difficulty: ${difficulty}">` : ""}
                    </div>
                </div>

                <div style="margin:30px 0; padding:25px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px; line-height:1.6; color:#cbd5e1;">
                    <h4 style="margin:0 0 10px 0; font-size:0.7rem; text-transform:uppercase; color:var(--accent); letter-spacing:1px;">Description</h4>
                    ${lvl["Description"] || lvl["Notes"] || "No description provided."}
                </div>

                <div class="stat-grid">
                    <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:10px; border:1px solid var(--border); text-align:center;">
                        <div style="font-size:0.65rem; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px;">Enjoyment Score</div>
                        <div style="font-size:1.5rem; font-weight:900; color:${getStatColor(lvl.Enjoyment)}">${lvl.Enjoyment || "N/A"}</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:10px; border:1px solid var(--border); text-align:center;">
                        <div style="font-size:0.65rem; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px;">List Points</div>
                        <div style="font-size:1.5rem; font-weight:900; color:var(--accent)">${lvl.Points || "0"}</div>
                    </div>
                </div>

                <div style="margin-top:30px;">
                    <h4 style="margin:0 0 10px 0; font-size:0.7rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:1px;">Level Code</h4>
                    <div style="display:flex; gap:10px;">
                        <input type="text" value="${lvl["Level Code"] || ""}" readonly style="flex:1; background:rgba(0,0,0,0.4); border:1px solid var(--border); color:#fff; padding:12px; border-radius:8px; font-family:monospace;">
                        <button onclick="copyCode(this, '${lvl["Level Code"]}')" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:8px; font-weight:700; cursor:pointer;">Copy</button>
                    </div>
                </div>
            `;
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code);
            const original = btn.textContent;
            btn.textContent = "Copied!";
            btn.style.background = "#22c55e";
            setTimeout(() => {
                btn.textContent = original;
                btn.style.background = "var(--accent)";
            }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
