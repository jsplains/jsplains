<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extended List | Level Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
        <div class="nav-links">
            <a href="/mainlist">Main List</a>
            <a href="/expert" class="active">Extended List</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>

    <div class="page-container">
        <div class="top-nav" style="margin: 20px 0;">
            <a href="expert.html" class="back-link" style="color: var(--accent); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">
                <i class="fa-solid fa-arrow-left"></i> Back to Extended List
            </a>
        </div>

        <div id="loading-msg" style="text-align:center; padding: 100px 0; color: var(--text-muted); font-weight: 700;">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading Expert Data...
        </div>

        <div class="layout-wrapper" id="page-content" style="display:none; display: flex; gap: 30px;">
            
            <div class="level-card" style="flex: 2; background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden;">
                <div id="banner" style="height: 400px; background-size: cover; background-position: center; position: relative;">
                    <div style="position: absolute; inset: 0; background: linear-gradient(transparent, var(--bg-card));"></div>
                </div>
                
                <div style="padding: 0 40px 40px 40px; margin-top: -60px; position: relative;">
                    <div id="main-details">
                        </div>
                </div>
            </div>
            
            <div class="sidebar-card" style="flex: 0.8; height: fit-content;">
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; padding: 25px;">
                    <span class="section-label" style="display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;">Verifier</span>
                    <div id="verifier-area"></div>
                    
                    <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">
                    
                    <span class="section-label" style="display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;">Victors</span>
                    <div id="victors-area"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="levelPopup.js"></script>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const expertSheetGid = "1575264256"; 

        // Shared Logic for consistent coloring
        const getScoreColor = (v) => {
            const s = parseFloat(v);
            if (isNaN(s)) return 'var(--text-muted)';
            const n = s <= 10 ? s * 10 : s;
            return n >= 75 ? '#22c55e' : (n >= 35 ? '#f97316' : '#ef4444');
        };

        const getFace = (v) => {
            const s = parseFloat(v);
            if (isNaN(s)) return 'fa-face-meh-blank';
            const n = s <= 10 ? s * 10 : s;
            return n >= 75 ? 'fa-face-smile' : (n >= 35 ? 'fa-face-meh' : 'fa-face-frown');
        };

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id'); 
            if (!targetId) { window.location.href = 'expert.html'; return; }

            try {
                const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${expertSheetGid}`;
                const res = await fetch(url);
                const csvText = await res.text();
                const { data } = Papa.parse(csvText, { header: true, skipEmptyLines: true });

                const lvl = data.find(row => String(row[Object.keys(row)[0]]).trim() === String(targetId).trim());

                if (!lvl) {
                    document.getElementById('loading-msg').innerHTML = "<h1>Level Not Found</h1>";
                    return;
                }
                renderPage(lvl);
            } catch (err) {
                document.getElementById('loading-msg').innerText = "Connection Error.";
            }
        }

        function renderPage(lvl) {
            const name = lvl["Name"] || "Unknown";
            const id = lvl[Object.keys(lvl)[0]];
            const acronym = (lvl["Acronym"] || "").toLowerCase().trim();
            const thumb = acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png";
            
            document.getElementById('banner').style.backgroundImage = `url('${thumb}')`;
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('page-content').style.display = 'flex';

            // Sidebar Rendering
            const verifier = (lvl["Verifier"] || "").trim();
            const verHTML = (verifier && verifier.toLowerCase() !== "none") 
                ? `<div style="display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.03); padding:12px; border-radius:10px; border:1px solid var(--border);">
                    <img src="assets/players/${verifier}.png" onerror="this.src='assets/players/default.png'" style="width:35px; height:35px; border-radius:5px;">
                    <span style="font-weight:700; font-size:0.95rem;">${verifier}</span>
                   </div>` 
                : '<p style="color:var(--text-muted);">None</p>';
            document.getElementById('verifier-area').innerHTML = verHTML;

            const victors = (lvl["Victors"] || "").split(/[ ,]+/).filter(v => v && v.toLowerCase() !== "none" && v.toLowerCase() !== verifier.toLowerCase());
            document.getElementById('victors-area').innerHTML = victors.length ? victors.map(v => `
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px; padding:8px;">
                    <img src="assets/players/${v.trim()}.png" onerror="this.src='assets/players/default.png'" style="width:30px; height:30px; border-radius:4px; opacity:0.8;">
                    <span style="font-weight:600; font-size:0.85rem; color:#ccc;">${v.trim()}</span>
                </div>
            `).join("") : '<p style="color:var(--text-muted);">None</p>';

            // Main Details
            document.getElementById('main-details').innerHTML = `
                <div style="display:flex; align-items: baseline; gap:15px;">
                    <h1 style="font-size:3.5rem; font-weight:900; margin:0; letter-spacing:-1px;">${name}</h1>
                    <span style="font-family:monospace; font-size:1.5rem; color:var(--text-muted); opacity:0.5;">#${id}</span>
                </div>
                <p style="font-size:1.2rem; color:var(--text-muted); margin-top:5px;">by <span style="color:var(--text-main); font-weight:700;">${lvl["Creator(s)"] || lvl["Author"]}</span></p>
                
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:20px; margin-top:40px;">
                    <div style="text-align:center; padding:20px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--border);">
                        <img src="assets/diffs/${lvl["Difficulty"].trim()}.png" style="height:60px; margin-bottom:15px;">
                        <span style="display:block; font-size:0.65rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:1px;">Difficulty</span>
                        <div style="font-weight:900; font-size:1.2rem;">${lvl["Difficulty"]}</div>
                    </div>

                    <div style="text-align:center; padding:20px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--border);">
                        <i class="fa-solid ${getFace(lvl["Enjoyment"])}" style="font-size:3rem; color:${getScoreColor(lvl["Enjoyment"])}; margin-bottom:15px;"></i>
                        <span style="display:block; font-size:0.65rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:1px;">Enjoyment</span>
                        <div style="font-weight:900; font-size:1.2rem; color:${getScoreColor(lvl["Enjoyment"])}">${lvl["Enjoyment"]}</div>
                    </div>

                    <div style="text-align:center; padding:20px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--border);">
                        <img src="assets/quality/${lvl["Quality"].trim()}.svg" style="height:60px; margin-bottom:15px;">
                        <span style="display:block; font-size:0.65rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:1px;">Quality</span>
                        <div style="font-weight:900; font-size:1.2rem; color:${getScoreColor(lvl["Quality"])}">${lvl["Quality"]}</div>
                    </div>
                </div>

                <div style="margin-top:40px; line-height:1.8; color:#ddd; background:rgba(0,0,0,0.2); padding:30px; border-radius:12px; border:1px solid var(--border);">
                    <span style="display:block; font-size:0.7rem; text-transform:uppercase; color:var(--accent); letter-spacing:2px; margin-bottom:10px; font-weight:800;">Level Description</span>
                    ${lvl["Description"] || "No description provided."}
                </div>

                <div style="margin-top:40px; border-top:1px solid var(--border); padding-top:30px; display:flex; flex-direction:column; gap:10px;">
                    <span style="font-size:0.7rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:2px;">Level ID / Code</span>
                    <div style="display:flex; gap:10px;">
                        <input type="text" value="${lvl["Level Code"] || 'N/A'}" readonly style="flex:1; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:8px; font-family:monospace;">
                        <button onclick="copyCode(this, '${lvl["Level Code"]}')" style="background:var(--accent); color:#fff; border:none; padding:0 25px; border-radius:8px; font-weight:700; cursor:pointer;">Copy</button>
                        <button onclick="LevelPopup.show('${lvl["Level Code"]}')" style="background:#333; color:#fff; border:none; padding:0 25px; border-radius:8px; font-weight:700; cursor:pointer;">Preview</button>
                    </div>
                </div>
            `;
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code);
            const t = btn.innerText; btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = t, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
