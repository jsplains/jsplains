<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Zone | Level Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        .page-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        .top-nav { margin-bottom: 20px; }
        .back-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .back-link:hover { color: #fff; }

        .layout-wrapper { display: flex; gap: 25px; }
        .level-card { flex: 2; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
        .sidebar-card { flex: 0.8; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; }
        
        .banner { height: 350px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid var(--border); background-color: #000; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 1)); }
        .level-body { padding: 40px; position: relative; margin-top: -60px; }

        .section-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        
        /* Profile Styling */
        .player-entry { 
            background: rgba(255,255,255,0.03); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .player-pfp { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; background: #222; border: 1px solid rgba(255,255,255,0.1); }

        /* Stats Grid */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 30px; }
        .stat-item {
            background: rgba(255,255,255,0.02); 
            padding: 20px 10px;
            border-radius: 10px; 
            border: 1px solid var(--border); 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .custom-stat-icon { height: 55px; margin-bottom: 15px; object-fit: contain; }
        .stat-value { font-size: 1.25rem; font-weight: 900; }

        /* Code Actions */
        .code-container { display: flex; gap: 8px; margin-top: 10px; }
        .code-input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-family: monospace; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { opacity: 0.8; }

        @media (max-width: 900px) { .layout-wrapper { flex-direction: column; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
    </nav>

    <div class="page-container">
        <div class="top-nav">
            <a href="expert.html" class="back-link">← Back to Extended List</a>
        </div>

        <div id="loading-msg" style="text-align:center; margin-top:50px; font-weight:700; color:var(--text-muted);">
            Connecting to the Expert Zone...
        </div>

        <div class="layout-wrapper" id="page-content" style="display:none;">
            <div class="level-card">
                <div id="banner" class="banner"><div class="banner-overlay"></div></div>
                <div class="level-body">
                    <div id="main-details"></div>
                </div>
            </div>
            
            <div class="sidebar-card">
                <span class="section-label">Verifier</span>
                <div id="verifier-area"></div>
                <div style="height: 1px; background: var(--border); margin: 20px 0;"></div>
                <span class="section-label">Victors</span>
                <div id="victors-area"></div>
            </div>
        </div>
    </div>

    <script src="levelPopup.js"></script>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const expertSheetGid = "1575264256"; 

        function getScoreColor(val) {
            const score = parseFloat(val);
            if (isNaN(score)) return 'var(--text-muted)';
            const normalized = score <= 10 ? score * 10 : score;
            if (normalized >= 75) return '#22c55e'; 
            if (normalized >= 35) return '#f97316'; 
            return '#ef4444'; 
        }

        function getEnjoymentIcon(val) {
            const score = parseFloat(val);
            if (isNaN(score)) return 'fa-face-meh-blank';
            const normalized = score <= 10 ? score * 10 : score;
            if (normalized >= 75) return 'fa-face-smile';
            if (normalized >= 35) return 'fa-face-meh'; 
            return 'fa-face-frown';
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id'); 
            if (!targetId) { window.location.href = 'expert.html'; return; }

            try {
                const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${expertSheetGid}`;
                const res = await fetch(url);
                const csvText = await res.text();
                const { data } = Papa.parse(csvText, { header: true, skipEmptyLines: true });

                // Find level by Column A (the first key in the row object)
                const lvl = data.find(row => {
                    const firstKey = Object.keys(row)[0];
                    return String(row[firstKey]).trim() === String(targetId).trim();
                });

                if (!lvl) {
                    document.getElementById('loading-msg').innerHTML = "<h1>Level Not Found</h1>";
                    return;
                }
                renderPage(lvl);
            } catch (err) {
                document.getElementById('loading-msg').innerHTML = "Database Connection Failed.";
            }
        }

        function renderPage(lvl) {
            const firstKey = Object.keys(lvl)[0];
            const rankId = lvl[firstKey];
            const name = lvl["Name"] || "Unknown";
            const acronym = (lvl["Acronym"] || "").toLowerCase().trim();
            const thumb = acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png";
            const levelCode = (lvl["Level Code"] || "").trim();
            
            document.title = `${name} (#${rankId}) - Expert Zone`;
            document.getElementById('banner').style.backgroundImage = `url('${thumb}')`;
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('page-content').style.display = 'flex';

            // Verifier PFP Logic
            const verifier = (lvl["Verifier"] || "").trim();
            document.getElementById('verifier-area').innerHTML = (verifier && verifier.toLowerCase() !== "none")
                ? `<div class="player-entry"><img src="assets/players/${verifier}.png" onerror="this.src='assets/players/default.png'" class="player-pfp"><span style="font-weight:700;">${verifier}</span></div>`
                : `<p style="color:var(--text-muted);">None</p>`;

            // Victors PFP Logic
            const victorsRaw = lvl["Victors"] || "";
            const victorsArray = victorsRaw.split(/[ ,]+/).filter(v => v && v.toLowerCase() !== "none" && v.toLowerCase() !== verifier.toLowerCase());
            document.getElementById('victors-area').innerHTML = victorsArray.length > 0
                ? victorsArray.map(v => `<div class="player-entry"><img src="assets/players/${v.trim()}.png" onerror="this.src='assets/players/default.png'" class="player-pfp"><span style="font-weight:600;">${v.trim()}</span></div>`).join("")
                : `<p style="color:var(--text-muted);">None</p>`;

            document.getElementById('main-details').innerHTML = `
                <div style="display:flex; align-items: baseline; gap:15px;">
                    <h1 style="font-size:3rem; font-weight:900; margin:0; line-height:1.1;">${name}</h1>
                    <span style="color:var(--text-muted); font-family:monospace; font-size:1.5rem; font-weight:700;">#${rankId}</span>
                </div>
                <p style="color:var(--text-muted); font-size:1.2rem; margin-top:10px;">by <strong>${lvl["Creator(s)"] || lvl["Author"]}</strong></p>
                
                <div class="stat-grid">
                    <div class="stat-item">
                        <img src="assets/diffs/${lvl["Difficulty"].trim()}.png" class="custom-stat-icon">
                        <span class="section-label">Difficulty</span>
                        <div class="stat-value">${lvl["Difficulty"]}</div>
                    </div>

                    <div class="stat-item">
                        <i class="fa-solid ${getEnjoymentIcon(lvl["Enjoyment"])}" style="font-size:3rem; color:${getScoreColor(lvl["Enjoyment"])}; margin-bottom:15px;"></i>
                        <span class="section-label">Enjoyment</span>
                        <div class="stat-value" style="color:${getScoreColor(lvl["Enjoyment"])}">${lvl["Enjoyment"]}</div>
                    </div>

                    <div class="stat-item">
                        <img src="assets/quality/${lvl["Quality"].trim()}.svg" onerror="this.style.opacity='0'" class="custom-stat-icon">
                        <span class="section-label">Quality</span>
                        <div class="stat-value" style="color:${getScoreColor(lvl["Quality"])}">${lvl["Quality"]}</div>
                    </div>

                    <div class="stat-item">
                         <i class="fa-solid fa-trophy" style="font-size:3rem; color:var(--accent); margin-bottom:15px; opacity:0.8;"></i>
                         <span class="section-label">Points</span>
                         <div class="stat-value" style="color:var(--accent);">${lvl["Points"] || "0"}</div>
                    </div>
                </div>

                <div style="margin:30px 0; padding:25px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px;">
                    <span class="section-label" style="color:var(--accent)">Description</span>
                    <p style="margin:0; line-height:1.6; color:#eee;">${lvl["Description"] || "No description provided."}</p>
                </div>

                <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top:30px;">
                    <span class="section-label">Level Details</span>
                    <div class="code-container">
                        <input type="text" value="${levelCode || "No Code"}" readonly class="code-input">
                        <button onclick="copyCode(this, \`${levelCode}\`)" class="action-btn">Copy</button>
                        <button onclick="LevelPopup.show(\`${levelCode}\`)" class="action-btn">Preview</button>
                    </div>
                </div>
            `;
        }

        function copyCode(btn, code) {
            if (!code || code === "No Code") return;
            navigator.clipboard.writeText(code).then(() => {
                const oldText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = oldText, 1500);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
