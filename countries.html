<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone | National Rankings</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: var(--bg-page); font-family: 'Montserrat', sans-serif; }
        .main-wrapper { display: flex; gap: 20px; max-width: 1400px; margin: 80px auto 0 auto; padding: 0 20px 20px 20px; height: calc(100vh - 100px); box-sizing: border-box; }

        /* Sidebar */
        .leaderboard-column { flex: 0 0 380px; display: flex; flex-direction: column; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .controls { padding: 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
        select { width: 100%; background: var(--bg-page); color: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px; font-family: 'Montserrat'; cursor: pointer; font-weight: 600; }

        #country-list { flex: 1; overflow-y: auto; padding: 12px; }
        .country-entry { display: flex; align-items: center; margin-bottom: 8px; padding: 12px; background: rgba(15, 23, 42, 0.4); border-radius: 8px; border-left: 4px solid var(--accent); transition: 0.2s; cursor: pointer; }
        .country-entry:hover { background: rgba(255, 255, 255, 0.05); }
        .country-entry.selected { border-left-color: #fff; background: var(--accent-light); }
        .flag-sidebar { width: 28px; border-radius: 3px; margin-right: 12px; }

        /* Detail View */
        .details-column { flex: 1; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 30px; overflow-y: auto; }
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin: 30px 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: 800; }
        
        /* Rankings List */
        .player-rank-item { display: flex; justify-content: space-between; padding: 8px 12px; background: rgba(0,0,0,0.1); border-radius: 6px; margin-bottom: 5px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.03); }
        .rank-number { font-weight: 800; color: var(--text-muted); margin-right: 10px; }

        /* Clears Text */
        .clear-list-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .clear-text-item { font-size: 0.85rem; color: var(--text-main); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav></nav>

    <div class="main-wrapper">
        <div class="leaderboard-column">
            <div class="controls">
                <select id="sort-selector" onchange="renderCountryList()">
                    <option value="points">Sort by Weighted Points</option>
                    <option value="hardest">Sort by Hardest Completion</option>
                    <option value="clears">Sort by Total Clear Count</option>
                </select>
            </div>
            <div id="country-list"></div>
        </div>

        <div class="details-column" id="country-detail-view">
            <div style="height:100%; display:flex; justify-content:center; align-items:center; opacity:0.2;">
                <h3>Select a country to view stats</h3>
            </div>
        </div>
    </div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const GIDS = { "GM": "0", "Master": "1720349441", "Expert": "1575264256" };
    
    const isoMap = { 
        "hr": "Croatia", "us": "United States", "gb": "United Kingdom", "ca": "Canada", 
        "de": "Germany", "fr": "France", "ru": "Russia", "jp": "Japan", "kr": "South Korea", 
        "br": "Brazil", "es": "Spain", "it": "Italy", "au": "Australia", "nl": "Netherlands" 
    };

    let countryData = {};
    let selectedCountry = null;

    async function fetchCsv(gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`);
        return Papa.parse(await res.text(), { header: true, skipEmptyLines: true }).data;
    }

    async function init() {
        try {
            const [lbRaw, gm, m, e] = await Promise.all([
                fetchCsv(LB_GID), fetchCsv(GIDS.GM), fetchCsv(GIDS.Master), fetchCsv(GIDS.Expert)
            ]);

            const playerToCountry = {};
            lbRaw.forEach(row => playerToCountry[(row["Username"] || "").trim().toLowerCase()] = (row["Country"] || "??").trim().toLowerCase());

            const processList = (list, diff) => list.map(row => ({
                name: (row["Name"] || "").trim(),
                points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
                victors: (row["Victors"] || "").split(/\s+/).filter(Boolean),
                difficulty: diff
            }));

            const allLevels = [...processList(gm, "GM"), ...processList(m, "Master"), ...processList(e, "Expert")];

            const countryClears = {};
            allLevels.forEach(level => {
                const uniqueNations = new Set();
                level.victors.forEach(v => {
                    const code = playerToCountry[v.toLowerCase()];
                    if (code && code !== "??") uniqueNations.add(code);
                });
                uniqueNations.forEach(code => {
                    if (!countryClears[code]) countryClears[code] = [];
                    countryClears[code].push(level);
                });
            });

            countryData = {};
            Object.keys(countryClears).forEach(code => {
                const sorted = countryClears[code].sort((a, b) => b.points - a.points);
                let total = 0;
                sorted.forEach((l, i) => total += l.points * Math.pow(0.9, i));

                countryData[code] = {
                    code,
                    name: isoMap[code] || code.toUpperCase(),
                    totalPoints: Math.round(total),
                    clears: sorted,
                    // Get players from the leaderboard and sort them by their individual points
                    players: lbRaw.filter(r => r.Country?.toLowerCase() === code)
                                 .sort((a, b) => (parseInt(b.Points) || 0) - (parseInt(a.Points) || 0))
                };
            });

            renderCountryList();
        } catch (err) { console.error(err); }
    }

    function renderCountryList() {
        const sortType = document.getElementById('sort-selector').value;
        const sorted = Object.values(countryData).sort((a, b) => {
            if (sortType === "points") return b.totalPoints - a.totalPoints;
            if (sortType === "clears") return b.clears.length - a.clears.length;
            if (sortType === "hardest") return (b.clears[0]?.points || 0) - (a.clears[0]?.points || 0);
        });

        document.getElementById('country-list').innerHTML = sorted.map((c, i) => `
            <div class="country-entry ${selectedCountry === c.code ? 'selected' : ''}" onclick="showCountry('${c.code}')">
                <span style="width:35px; font-weight:800; opacity:0.5;">#${i+1}</span>
                <img class="flag-sidebar" src="https://flagcdn.com/w40/${c.code}.png">
                <div style="flex:1">
                    <span style="font-weight:700; display:block;">${c.name}</span>
                </div>
                <div style="font-weight:800; color:var(--accent);">${c.totalPoints.toLocaleString()}</div>
            </div>
        `).join('');
    }

    function showCountry(code) {
        selectedCountry = code;
        renderCountryList();
        const c = countryData[code];

        const gmClears = c.clears.filter(l => l.difficulty === "GM");
        const masterClears = c.clears.filter(l => l.difficulty === "Master");
        const expertClears = c.clears.filter(l => l.difficulty === "Expert");

        const renderClearSet = (title, list) => `
            <div class="section-title">${title} (${list.length})</div>
            <div class="clear-list-container">
                ${list.length ? list.map(l => `<span class="clear-text-item">${l.name}</span>`).join('') : '<span style="opacity:0.3">No completions</span>'}
            </div>
        `;

        document.getElementById('country-detail-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:10px;">
                <img src="https://flagcdn.com/w160/${code}.png" style="width:80px; border-radius:6px;">
                <h1 style="margin:0; font-size:2.2rem; font-weight:800;">${c.name}</h1>
            </div>
            <p style="color:var(--accent); font-weight:800; margin:0 0 30px 0;">Total Points: ${c.totalPoints.toLocaleString()}</p>

            <div class="section-title">National Contributor Rankings</div>
            <div>
                ${c.players.map((p, i) => `
                    <div class="player-rank-item">
                        <span><span class="rank-number">${i+1}</span> ${p.Username}</span>
                        <span style="font-weight:700; opacity:0.7;">${parseInt(p.Points).toLocaleString()} pts</span>
                    </div>
                `).join('')}
            </div>

            ${renderClearSet("GM Clears", gmClears)}
            ${renderClearSet("Master Clears", masterClears)}
            ${renderClearSet("Expert Clears", expertClears)}
        `;
    }

    window.onload = init;
</script>
</body>
</html>
