<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body {
            background-color: var(--bg-page);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .modal {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-weight: 800; font-size: 1.8rem; }
        .accent-text { color: var(--accent); }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .stat-box { margin-bottom: 20px; }
        .stat-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .submit-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .submit-btn:hover { opacity: 0.9; }
        textarea { resize: vertical; min-height: 80px; }
    </style>
</head>
<body>

    <div id="level-modal" class="modal">
        <div class="modal-content glass-card">
            <h2>Submit <span class="accent-text">Level</span></h2>
            <form id="level-submission-form">
                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Level Name *</label>
                        <input type="text" name="levelName" required>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Level Code *</label>
                        <input type="text" name="levelCode" required>
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Creator *</label>
                        <input type="text" name="creator" required>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Acronym</label>
                        <input type="text" name="acronym" placeholder="e.g. BB">
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Is it verified? *</label>
                        <select name="isVerified" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Estimated Difficulty *</label>
                        <select name="difficulty" required>
                            <option value="Grandmaster III+">Grandmaster III+</option>
                            <option value="Grandmaster III">Grandmaster III</option>
                            <option value="Grandmaster II">Grandmaster II</option>
                            <option value="Grandmaster I">Grandmaster I</option>
                            <option value="High Master">High Master</option>
                            <option value="Medium Master">Medium Master</option>
                            <option value="Low Master">Low Master</option>
                            <option value="High Expert">High Expert</option>
                            <option value="Medium Expert">Medium Expert</option>
                            <option value="Low Expert">Low Expert</option>
                        </select>
                    </div>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Thumbnail link (if applicable)</label>
                    <input type="url" name="thumbnail">
                </div>

                <div class="stat-box">
                    <label class="stat-label">Description</label>
                    <textarea name="description"></textarea>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Extra information</label>
                    <textarea name="extraInfo"></textarea>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Verifier (If Verified)</label>
                        <input type="text" name="verifier">
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Replay Code (If Verified)</label>
                        <input type="text" name="replayCode">
                    </div>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Enjoyment (0-10)</label>
                    <input type="number" name="enjoyment" min="0" max="10" value="5">
                </div>

                <button type="submit" class="submit-btn">Submit Level</button>
            </form>
        </div>
    </div>

    <div id="completion-modal" class="modal">
        <div class="modal-content glass-card">
            <h2>Submit <span class="accent-text">Completion</span></h2>
            <form id="gmz-completion-form">
                <div class="stat-box">
                    <label class="stat-label">Name (No Spaces) *</label>
                    <input type="text" name="userName" pattern="^\S+$" title="No spaces allowed" required>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Level ID *</label>
                        <input type="text" name="levelID" placeholder="Use 0 if pending" required>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Level Name (For Verification)</label>
                        <input type="text" name="levelName">
                    </div>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Replay Code *</label>
                    <input type="text" name="replayCode" required>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Other proof (If applicable)</label>
                    <input type="text" name="otherProof">
                </div>

                <div class="stat-box">
                    <label class="stat-label">Opinions on difficulty or quality</label>
                    <textarea name="opinion"></textarea>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Enjoyment (0-10)</label>
                    <input type="number" name="enjoyment" min="0" max="10" value="5">
                </div>

                <button type="submit" class="submit-btn">Submit Record</button>
            </form>
        </div>
    </div>

    <script>
        const URL_LEVEL_FORM = "https://docs.google.com/forms/u/0/d/e/1FAIpQLScT3osZzYudTof9h9aVI5xuy9B0AikyLJssKPpg2R8tZLW-Ug/formResponse";
        const URL_GMZ_FORM = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSfgjpCE6e8sHa-GcjVrD27Tcymbc0Q7w2MGdxVTtWnKi-uoXg/formResponse";

        async function postToGoogle(url, params) {
            await fetch(url, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString()
            });
        }

        document.getElementById('gmz-completion-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(e.target);
            const p = new URLSearchParams();
            p.append('entry.138865611',  data.get('userName'));
            p.append('entry.1983053746', data.get('levelID'));
            p.append('entry.1783510526', data.get('levelName'));
            p.append('entry.533261642',  data.get('replayCode'));
            p.append('entry.1382434685', data.get('otherProof'));
            p.append('entry.331566418',  data.get('opinion'));
            p.append('entry.1070588665', data.get('enjoyment'));

            try {
                await postToGoogle(URL_GMZ_FORM, p);
                alert("Completion Recorded!");
                e.target.reset();
            } catch (err) { alert("Submission failed."); }
        });

        document.getElementById('level-submission-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(e.target);
            const lp = new URLSearchParams();
            lp.append('entry.2064115160', data.get('levelName'));
            lp.append('entry.1741548680', data.get('creator'));
            lp.append('entry.571408800',  data.get('levelCode'));
            lp.append('entry.1221773094', data.get('isVerified'));
            lp.append('entry.114757608',  data.get('difficulty'));
            lp.append('entry.384819777',  data.get('thumbnail'));
            lp.append('entry.1437151121', data.get('acronym'));
            lp.append('entry.722602758',  data.get('description'));
            lp.append('entry.1121764669', data.get('extraInfo'));
            lp.append('entry.1144889759', data.get('replayCode'));
            lp.append('entry.1044432296', data.get('verifier'));
            lp.append('entry.212555546',  data.get('enjoyment'));

            try {
                await postToGoogle(URL_LEVEL_FORM, lp);
                if (data.get('isVerified') === "Yes") {
                    await new Promise(r => setTimeout(r, 700));
                    const gp = new URLSearchParams();
                    gp.append('entry.138865611',  data.get('verifier'));
                    gp.append('entry.1983053746', "TBD");
                    gp.append('entry.1783510526', data.get('levelName'));
                    gp.append('entry.533261642',  data.get('replayCode'));
                    gp.append('entry.1070588665', data.get('enjoyment'));
                    await postToGoogle(URL_GMZ_FORM, gp);
                }
                alert("Level Submitted Successfully!");
                e.target.reset();
            } catch (err) { alert("Submission failed."); }
        });
    </script>
</body>
</html>
