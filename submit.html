<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMZ | Submit Record</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* --- SUBMISSION PORTAL SPECIFIC STYLES --- */
        :root { 
            --bg-page: #0f172a; 
            --bg-card: #1e293b; 
            --accent: #8b5cf6; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border: #334155; 
        }

        body { 
            background-color: var(--bg-page); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
        }

        .page-content {
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .modal-container { width: 100%; max-width: 650px; }

        .glass-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }

        .stat-box { margin-bottom: 20px; position: relative; }

        .stat-label { 
            font-size: 0.7rem; font-weight: 800; color: var(--text-muted); 
            text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px; 
        }

        input, textarea { 
            width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.9); 
            border: 1px solid var(--border); border-radius: 8px; 
            color: var(--text-main); font-family: 'Montserrat', sans-serif; 
            box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* --- CUSTOM DROPDOWN LIST STYLES --- */
        .dropdown-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: #161e2e;
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 350px;
            overflow-y: auto;
            display: none; /* Controlled by JS */
            z-index: 9999;
            margin-top: 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .dropdown-item {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
        }

        .dropdown-item:hover { background: rgba(139, 92, 246, 0.15); }

        .dropdown-item img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .dropdown-item .level-name-text {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .dropdown-item .rank-prefix {
            color: var(--accent);
            font-weight: 800;
            margin-right: 4px;
        }

        .portal-submit-btn { 
            background: var(--accent); color: white; border: none; padding: 16px; 
            border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; 
            text-transform: uppercase; margin-top: 10px; transition: 0.2s; 
        }
        .portal-submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .portal-submit-btn:disabled { background: #334155; cursor: not-allowed; color: var(--text-muted); }

        #status-msg { color: var(--accent); font-size: 0.8rem; margin-bottom: 10px; text-align: center; font-weight: 600; }
        iframe { display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="assets/logo.webp" class="nav-logo" alt="Logo"></a>
    
        <div class="nav-links">
            <div class="dropdown">
                <button class="dropbtn">Lists <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="/mainlist"><i class="fas fa-list-ol"></i> Main List</a>
                    <a href="/expert"><i class="fas fa-expand-arrows-alt"></i> Extended List</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn">Leaderboard <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="/leaderboard"><i class="fas fa-user"></i> Individual</a>
                    <a href="/countries"><i class="fas fa-globe-americas"></i> Countries</a>
                </div>
            </div>

            <div class="dropdown dropdown-right">
                <button class="dropbtn">Socials <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://dsc.gg/appelcord" target="_blank"><i class="fab fa-discord"></i> Discord</a>
                </div>
            </div>

            <div class="dropdown dropdown-right">
                <button class="dropbtn">More <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://github.com/ProgramminguyFromScratch/GMZ" target="_blank"><i class="fab fa-github"></i> GitHub Repo</a>
                    <a href="/guidelines"><i class="fas fa-file-alt"></i> Submission Guidelines</a>
                </div>
            </div>
        </div>
    </nav>

    <script type="text/javascript">var submitted=false;</script>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
            onload="if(submitted) {alert('Submission Received!'); window.location.reload();}"></iframe>

    <div class="page-content">
        <div class="modal-container">
            <div class="glass-card">
                <h2 style="margin-top:0; font-weight:800;">Submit <span style="color:var(--accent)">Completion</span></h2>
                <div id="status-msg">Connecting to database...</div>
                
                <form action="https://docs.google.com/forms/d/e/1FAIpQLSfgjpCE6e8sHa-GcjVrD27Tcymbc0Q7w2MGdxVTtWnKi-uoXg/formResponse" 
                      method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                    
                    <div class="stat-box">
                        <label class="stat-label">Your Name (No Spaces) *</label>
                        <input type="text" name="entry.619656823" required placeholder="PlayerName">
                    </div>

                    <div class="stat-box">
                        <label class="stat-label">Level Name (Searchable) *</label>
                        <input type="text" id="level-search-input" autocomplete="off" placeholder="Start typing level name..." required>
                        <input type="hidden" name="entry.614428572" id="form-level-name">
                        <div id="custom-dropdown-list" class="dropdown-list"></div>
                    </div>

                    <input type="hidden" id="hidden-level-id" name="entry.1258302997">

                    <div class="stat-box">
                        <label class="stat-label">Replay Code *</label>
                        <input type="text" name="entry.868041341" required placeholder="Paste code here">
                    </div>

                    <div class="stat-box">
                        <label class="stat-label">Other proof</label>
                        <input type="text" name="entry.101583515" placeholder="Optional link">
                    </div>

                    <div class="stat-box">
                        <label class="stat-label">Opinions</label>
                        <textarea name="entry.531767357" rows="3" placeholder="What did you think?"></textarea>
                    </div>

                    <div class="stat-box">
                        <label class="stat-label">Enjoyment (0-10) | INTEGERS ONLY</label>
                        <input type="number" name="entry.1652160869" min="0" max="10">
                    </div>

                    <button type="submit" class="portal-submit-btn" id="portal-btn" disabled>Loading levels...</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        
        const configs = [
            { gid: "0", idCol: 0, rankCol: 1, nameCol: 2, diffCol: 7, isRanked: true },          
            { gid: "1720349441", idCol: 0, rankCol: 1, nameCol: 2, diffCol: 7, isRanked: true },
            { gid: "1575264256", idCol: 0, rankCol: null, nameCol: 2, diffCol: 7, isRanked: false }
        ];

        let database = [];

        async function init() {
            const btn = document.getElementById('portal-btn');
            const status = document.getElementById('status-msg');

            try {
                for (let cfg of configs) {
                    const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${cfg.gid}`;
                    const response = await fetch(url);
                    const text = await response.text();
                    const parsed = Papa.parse(text, { header: false, skipEmptyLines: true }).data;

                    // Skip header row
                    for (let i = 1; i < parsed.length; i++) {
                        const row = parsed[i];
                        if (row[cfg.nameCol]) {
                            database.push({
                                id: row[cfg.idCol],
                                name: row[cfg.nameCol],
                                rank: cfg.isRanked ? row[cfg.rankCol] : null,
                                difficulty: row[cfg.diffCol] ? row[cfg.diffCol].trim() : "unknown",
                                isRanked: cfg.isRanked
                            });
                        }
                    }
                }
                status.style.display = 'none';
                btn.disabled = false;
                btn.textContent = "Submit Record";
                setupDropdownLogic();
            } catch (e) {
                status.textContent = "Error loading database.";
            }
        }

        function setupDropdownLogic() {
            const searchInput = document.getElementById('level-search-input');
            const list = document.getElementById('custom-dropdown-list');
            const formLevelName = document.getElementById('form-level-name');
            const hiddenId = document.getElementById('hidden-level-id');

            searchInput.addEventListener('input', () => {
                const query = searchInput.value.toLowerCase();
                list.innerHTML = '';
                if (!query) { list.style.display = 'none'; return; }

                const matches = database.filter(l => l.name.toLowerCase().includes(query)).slice(0, 15);

                if (matches.length > 0) {
                    matches.forEach(lvl => {
                        const item = document.createElement('div');
                        item.className = 'dropdown-item';
                        
                        // Icon mapping
                        const icon = document.createElement('img');
                        icon.src = `assets/diffs/${lvl.difficulty}.svg`;
                        icon.onerror = () => icon.src = 'assets/diffs/unknown.svg';
                        
                        const textContainer = document.createElement('div');
                        const displayName = lvl.isRanked ? `<span class="rank-prefix">#${lvl.rank}</span> ${lvl.name}` : lvl.name;
                        textContainer.innerHTML = `<span class="level-name-text">${displayName}</span>`;
                        
                        item.appendChild(icon);
                        item.appendChild(textContainer);

                        item.onclick = () => {
                            searchInput.value = lvl.isRanked ? `(#${lvl.rank}) ${lvl.name}` : lvl.name;
                            formLevelName.value = lvl.name;
                            hiddenId.value = lvl.id;
                            list.style.display = 'none';
                        };
                        list.appendChild(item);
                    });
                    list.style.display = 'block';
                } else {
                    list.style.display = 'none';
                }
            });

            // Close when clicking away
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target)) list.style.display = 'none';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
