<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMZ Submission Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body {
            background-color: var(--bg-page);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .modal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding-bottom: 100px;
        }
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h2 { margin-top: 0; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; }
        .accent-text { color: var(--accent); }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .stat-box { margin-bottom: 20px; }
        .stat-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .submit-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        iframe { display: none; }
        textarea { resize: vertical; min-height: 80px; }
    </style>
</head>
<body>

    <iframe name="hidden_iframe" id="hidden_iframe" onload="if(window.submitted){alert('Submission successful!'); window.location.reload();}"></iframe>

    <div class="modal-container">

        <div class="glass-card">
            <h2>Submit <span class="accent-text">Level</span></h2>
            <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLScT3osZzYudTof9h9aVI5xuy9B0AikyLJssKPpg2R8tZLW-Ug/formResponse" 
                  method="POST" 
                  target="hidden_iframe" 
                  onsubmit="window.submitted=true;">
                
                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Level Name *</label>
                        <input type="text" name="entry.2064115160" required>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Level Code *</label>
                        <input type="text" name="entry.571408800" required>
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Creator *</label>
                        <input type="text" name="entry.1741548680" required>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Acronym</label>
                        <input type="text" name="entry.1437151121">
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Is it verified? *</label>
                        <select name="entry.1221773094" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Difficulty *</label>
                        <select name="entry.114757608" required>
                            <option value="Grandmaster III+">Grandmaster III+</option>
                            <option value="Grandmaster III">Grandmaster III</option>
                            <option value="Grandmaster II">Grandmaster II</option>
                            <option value="Grandmaster I">Grandmaster I</option>
                            <option value="High Master">High Master</option>
                            <option value="Medium Master">Medium Master</option>
                            <option value="Low Master">Low Master</option>
                            <option value="High Expert">High Expert</option>
                            <option value="Medium Expert">Medium Expert</option>
                            <option value="Low Expert">Low Expert</option>
                        </select>
                    </div>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Thumbnail link</label>
                    <input type="url" name="entry.384819777">
                </div>

                <div class="stat-box">
                    <label class="stat-label">Description</label>
                    <textarea name="entry.722602758"></textarea>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Extra information</label>
                    <textarea name="entry.1121764669"></textarea>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Verifier</label>
                        <input type="text" name="entry.1044432296">
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Replay Code</label>
                        <input type="text" name="entry.1144889759">
                    </div>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Enjoyment (0-10)</label>
                    <input type="number" name="entry.212555546" min="0" max="10" value="5">
                </div>

                <button type="submit" class="submit-btn">Submit Level</button>
            </form>
        </div>

        <div class="glass-card">
            <h2>Submit <span class="accent-text">Completion</span></h2>
            <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfgjpCE6e8sHa-GcjVrD27Tcymbc0Q7w2MGdxVTtWnKi-uoXg/formResponse" 
                  method="POST" 
                  target="hidden_iframe" 
                  onsubmit="window.submitted=true;">
                
                <div class="stat-box">
                    <label class="stat-label">Name (No Spaces) *</label>
                    <input type="text" name="entry.138865611" pattern="^\S+$" title="No spaces allowed" required>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <label class="stat-label">Level ID *</label>
                        <input type="text" name="entry.1983053746" placeholder="Use 0 if pending" required>
                    </div>
                    <div class="stat-box">
                        <label class="stat-label">Level Name</label>
                        <input type="text" name="entry.1783510526">
                    </div>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Replay Code *</label>
                    <input type="text" name="entry.533261642" required>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Other proof</label>
                    <input type="text" name="entry.1382434685">
                </div>

                <div class="stat-box">
                    <label class="stat-label">Opinions</label>
                    <textarea name="entry.331566418"></textarea>
                </div>

                <div class="stat-box">
                    <label class="stat-label">Enjoyment (0-10)</label>
                    <input type="number" name="entry.1070588665" min="0" max="10" value="5">
                </div>

                <button type="submit" class="submit-btn">Submit Record</button>
            </form>
        </div>

    </div>

    <script>
        window.submitted = false;
    </script>
</body>
</html>
