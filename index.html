<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Optimized CSS for Performance */
        .level-entry {
            contain: layout style paint;
            will-change: transform;
            min-height: 100px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            background-color: #1a1a1a;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .level-entry:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .level-thumb {
            width: 120px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 15px;
            opacity: 0;
            transition: opacity 0.3s ease-in;
            background: #222;
        }

        .level-thumb[src] {
            opacity: 1;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .active-tag {
            background-color: var(--accent, #ffcc00) !important;
            color: #000 !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <nav>
        <a href="/" class="logo-link">
            <img src="assets/logo.webp" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/" class="active">Main List</a>
            <a href="/expert">Extended List</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Loading into the zone...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="https://docs.google.com/forms/..." target="_blank" class="submit-btn" style="margin-bottom: 25px;">Submit a Completion</a>
            
            <h3>Search</h3>
            <input type="text" id="levelSearch" class="search-input" placeholder="Search by name or creator..." oninput="filterLevels()">

            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <div id="infoModal" class="modal" style="display:none;">
        <div class="modal-content" id="modal-content-box" 
            style="width: 90vw; max-width: 700px; aspect-ratio: 4 / 3; position: relative; overflow-y: auto; color: #fff; display: flex; flex-direction: column;">
            <span onclick="closeModal()" class="close-btn" style="cursor:pointer; font-size:24px; position: absolute; top: 15px; right: 20px; z-index: 10; color: #fff;">&times;</span>
            <div id="modal-body" style="position: relative; z-index: 1; padding: 10px;"></div>
        </div>
    </div>

    <script src="levelRenderer.js"></script>
    <script src="levelPopup.js"></script>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const sheetGids = ["0", "1720349441"]; 

        let activeTags = [];
        window.DATA = { levels: [] };

        // Helper functions
        const getCsvUrl = (id, gid) => `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
        const parseSkills = (raw) => raw ? raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean) : [];
        const safeText = (val) => (val === undefined || val === null) ? "" : String(val);

        function mapRowToLevel(row) {
            const acronym = safeText(row["Acronym"] || "").toLowerCase();
            const skillsRaw = safeText(row["Skills Needed"] || row["Skills"] || "");
            return {
                id: safeText(row["ID"] || row["id"] || row["Rank"]),
                name: safeText(row["Name"] || row["name"]),
                img: acronym ? `assets/thumbs/${acronym}.png` : "assets/thumbs/Noimageavailable.png",
                author: safeText(row["Creator(s)"] || row["Creator"] || row["Author"] || "Unknown"),
                rank: safeText(row["Rank"] || ""),
                difficulty: safeText(row["Difficulty"] || ""),
                skills: parseSkills(skillsRaw).join(", "),
                _skillsArray: parseSkills(skillsRaw).map(s => s.toLowerCase()),
                points: safeText(row["Points"] || ""),
                victors: safeText(row["Victors"] || ""),
                enjoyment: safeText(row["Enjoyment"] || ""),
                quality: safeText(row["Quality"] || ""),
                desc: safeText(row["Description"] || row["Notes"] || "No description provided."),
                levelCode: safeText(row["Level Code"] || "")
            };
        }

        // More optimized Renderer
        function filterLevels() {
            const listView = document.getElementById('list-view');
            const searchTerm = document.getElementById('levelSearch').value.toLowerCase();
            if (!window.DATA.levels || !listView) return;

            // Filter logic
            const filtered = DATA.levels.filter(lvl => {
                const matchesTags = activeTags.length === 0 || activeTags.every(t => lvl._skillsArray.includes(t.toLowerCase()));
                const matchesSearch = lvl.name.toLowerCase().includes(searchTerm) || lvl.author.toLowerCase().includes(searchTerm);
                return matchesTags && matchesSearch;
            });

            // Batch Rendering with DocumentFragment, Basiaclly instead of Importing each thign 1by1 this is more optimized and does it all in 1 go
            listView.innerHTML = '';
            const fragment = document.createDocumentFragment();
            const fallback = "assets/thumbs/Noimageavailable.png";

            filtered.forEach(lvl => {
                const div = document.createElement('div');
                div.className = 'level-entry';
                div.onclick = () => showLevelDetails(lvl.id);
                
                const diffIcon = lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small" loading="lazy">` : '';
                const qIcon = lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small" loading="lazy">` : '';

                div.innerHTML = `
                    <img class="level-thumb" src="${lvl.img}" loading="lazy" onerror="this.src='${fallback}'" alt="${lvl.name}">
                    <div class="level-rank">#${lvl.rank}</div>
                    <div class="level-info">
                        <div class="level-name">${lvl.name}</div>
                        <div class="level-meta">by ${lvl.author}</div>
                        <div class="level-meta" style="color:var(--accent, #ffcc00); font-weight:700;">${lvl.points} pts</div>
                    </div>
                    <div class="level-difficulty-slot" style="display:flex; gap:5px; align-items:center; margin-left:auto;">
                        ${qIcon} ${diffIcon}
                    </div>
                `;
                fragment.appendChild(div);
            });
            listView.appendChild(fragment);
        }

        // Modal
        function showLevelDetails(id) {
            const lvl = DATA.levels.find(l => String(l.id) === String(id));
            if (!lvl) return;
            
            const modalBox = document.getElementById('modal-content-box');
            modalBox.style.background = `linear-gradient(to bottom, rgba(20,20,20,0.8), rgba(15,15,15,0.98)), url('${lvl.img}'), url('assets/thumbs/Noimageavailable.png')`;
            modalBox.style.backgroundSize = "cover";

            const getStatColor = (num) => num <= 4.5 ? "#cc0000" : num <= 7.5 ? "#e6ac00" : "#008037";
            const renderBar = (label, val) => {
                const num = parseFloat(val) || 0;
                return `
                    <div class="stat-box-container" style="margin-bottom:10px;">
                        <div style="font-size:0.7rem; text-transform:uppercase; color:#bbb;">${label}</div>
                        <div style="background:#333; height:12px; border-radius:6px; overflow:hidden; position:relative;">
                            <div style="width:${num*10}%; background:${getStatColor(num)}; height:100%;"></div>
                            <div style="position:absolute; width:100%; text-align:center; top:0; font-size:10px; line-height:12px;">${val || '0'}</div>
                        </div>
                    </div>`;
            };

            document.getElementById('modal-body').innerHTML = `
                <h2 style="margin-bottom:0;">${lvl.name} <span style="font-size:1rem; color:#888;">#${lvl.rank}</span></h2>
                <p>By <strong>${lvl.author}</strong></p>
                <div style="background:rgba(0,0,0,0.5); padding:15px; border-radius:8px; margin:15px 0;">${lvl.desc}</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div>${renderBar("Enjoyment", lvl.enjoyment)}</div>
                    <div>
                        <div style="font-size:0.7rem; color:#bbb;">SKILLS</div>
                        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">
                            ${lvl._skillsArray.map(s => `<span style="background:#444; padding:2px 6px; border-radius:4px; font-size:11px;">${s}</span>`).join('')}
                        </div>
                    </div>
                </div>
                ${lvl.levelCode ? `<div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
                    <code>${lvl.levelCode}</code>
                    <button onclick="navigator.clipboard.writeText('${lvl.levelCode}')" style="margin-left:10px; cursor:pointer;">Copy</button>
                </div>` : ''}
            `;
            document.getElementById('infoModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        // Initialize
        async function init() {
            try {
                const results = await Promise.all(sheetGids.map(gid => 
                    fetch(getCsvUrl(spreadsheetId, gid)).then(r => r.text())
                ));
                
                const merged = results.flatMap(csv => Papa.parse(csv, {header:true}).data).map(mapRowToLevel);
                window.DATA.levels = merged.filter(l => l.name); // Filter empty rows

                const tagSet = new Set();
                window.DATA.levels.forEach(l => l._skillsArray.forEach(s => tagSet.add(s)));
                
                const tagContainer = document.getElementById("tag-filters");
                Array.from(tagSet).sort().forEach(tag => {
                    const btn = document.createElement("button");
                    btn.className = "tag-btn";
                    btn.textContent = tag;
                    btn.onclick = () => {
                        btn.classList.toggle("active-tag");
                        activeTags = btn.classList.contains("active-tag") 
                            ? [...activeTags, tag] 
                            : activeTags.filter(t => t !== tag);
                        filterLevels();
                    };
                    tagContainer.appendChild(btn);
                });

                document.getElementById('loading-overlay').style.display = 'none';
                filterLevels();
            } catch (err) {
                console.error(err);
                document.getElementById('loading-overlay').textContent = "Error loading data.";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
