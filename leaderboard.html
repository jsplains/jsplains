<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* ── Layout ── */
        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 100px);
            box-sizing: border-box;
        }

        /* ── Left Column ── */
        .leaderboard-column {
            flex: 0 0 400px;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .list-header {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }

        .search-wrap {
            position: relative;
            margin-bottom: 10px;
            width: 100%;
        }
        .search-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        .search-bar {
            width: 100%;
            box-sizing: border-box; /* Fixes the extension past container */
            padding: 10px 10px 10px 35px;
            border-radius: 8px;
            background: #111;
            border: 1px solid #444;
            color: white;
            font-family: inherit;
        }

        #leaderboard-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* ── Entry Logic ── */
        .level-entry { margin-bottom: 8px; cursor: pointer; }
        .level-entry.selected {
            background: rgba(139, 60, 247, 0.12);
            border-color: var(--accent);
            box-shadow: inset 4px 0 0 var(--accent);
        }

        .player-info { flex: 1; min-width: 0; margin: 0 12px; }
        .player-name-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-name-wrapper b { overflow: hidden; text-overflow: ellipsis; }

        /* ── Right Column ── */
        .details-column {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 30px;
            overflow-y: auto;
        }

        /* ── Hardest Clear Cards (Visibility Fix) ── */
        .hardest-clears-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .hardest-clear-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 1;
            background: #000;
        }
        .hc-thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .hc-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 60%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 12px;
        }
        .hc-name { 
            font-size: 0.9rem; font-weight: 800; color: #fff; 
            text-shadow: 0 2px 4px rgba(0,0,0,1); /* Visibility fix */
        }

        /* ── Skills & Clears (Restored original styling) ── */
        .skills-summary { display: flex; flex-direction: column; gap: 6px; }
        .skill-row { display: flex; align-items: center; gap: 10px; }
        .skill-row-label { width: 130px; font-size: 0.8rem; font-weight: 700; color: #eee; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .skill-bar-wrap { flex: 1; height: 14px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: linear-gradient(90deg, #550eb3, #8b3cf7); transition: width 0.5s ease; }
        .skill-multiplier { width: 44px; font-size: 0.78rem; font-weight: 900; color: #c4a0ff; text-align: right; }

        .clears-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 15px; }
        .clear-card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; }
        .clear-card img { width: 100%; height: 100%; object-fit: cover; }
        .cc-label { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.8); font-size: 0.55rem; padding: 2px; text-align: center; 
        }

        .filter-btn {
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: #888; font-size: 0.75rem; 
            cursor: pointer; font-weight: 700;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .section-title {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
            color: #666; margin: 30px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px;
        }

        @media (max-width: 1000px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .leaderboard-column { width: 100%; height: 400px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
    <div class="nav-links">
        <a href="/mainlist">Main List</a>
        <a href="/expert">Extended List</a>
        <a href="/leaderboard" class="active">Leaderboard</a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="leaderboard-column">
        <div class="list-header">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="player-search" class="search-bar" placeholder="Filter players..." oninput="renderLeaderboard()">
            </div>
            <select id="sort-select" style="width:100%; background:#111; color:#888; border:1px solid #444; padding:5px; border-radius:5px;" onchange="renderLeaderboard()">
                <option value="points">Points</option>
                <option value="totalclears">Total Clears</option>
            </select>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="details-column" id="player-profile-view"></div>
</div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
    const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    window.PLAYER_DATA = [];
    window.ALL_LEVELS = [];
    window.GLOBAL_SKILL_RATES = {};
    let selectedPlayerName = null;

    async function init() {
        const [lb, l1, l2, l3] = await Promise.all([
            fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])
        ]);

        window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
            name: (row["Name"] || row["name"] || "").trim(),
            acronym: (row["Acronym"] || "").toLowerCase(),
            difficulty: (row["Difficulty"] || "").trim(),
            rank: row["Rank"] || "",
            skills: (row["Skills Needed"] || row["Skills"] || "").split(/,|\n/).map(s=>s.trim()).filter(Boolean),
            victors: (row["Victors"] || "").split(/\s+/).filter(Boolean)
        }));

        // Global Skill Math
        const counts = {};
        window.ALL_LEVELS.forEach(l => l.skills.forEach(s => counts[s] = (counts[s] || 0) + 1));
        const total = window.ALL_LEVELS.length || 1;
        window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(counts).map(([s, c]) => [s, c / total]));

        window.PLAYER_DATA = lb.map(row => ({
            name: (row["Username"] || "").trim(),
            points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
            hardest: row["Hardest Clear (Master+)"] || "None",
            secondHardest: row["Second Hardest (Master+)"] || "None",
            thirdHardest: row["Third Hardest (Master+)"] || "None",
            country: (row["Country"] || "").trim().toLowerCase()
        })).sort((a,b) => b.points - a.points);

        renderLeaderboard();
        if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
    }

    async function fetchCsv(gid) {
        const res = await fetch(csvUrl(gid));
        const text = await res.text();
        return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        const query = document.getElementById('player-search').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;

        let display = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));
        if(sortBy === 'totalclears') display.sort((a,b) => getClears(b.name).length - getClears(a.name).length);

        container.innerHTML = display.map(p => {
            const rank = window.PLAYER_DATA.findIndex(x => x.name === p.name) + 1;
            let c = "rank-gray";
            if(rank <= 3) c = "rank-purple"; else if(rank <= 10) c = "rank-blue";
            else if(rank <= 25) c = "rank-green";
            
            return `
            <div class="level-entry ${c} ${p.name === selectedPlayerName ? 'selected' : ''}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                <div class="level-rank">#${rank}</div>
                <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                <div class="player-info">
                    <div class="player-name-wrapper">
                        ${p.country ? `<img src="https://flagcdn.com/w20/${p.country}.png" style="width:16px;">` : ''}
                        <b>${p.name}</b>
                    </div>
                </div>
                <div class="level-points">${p.points.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function getClears(name) {
        return window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase()));
    }

    function selectPlayer(name) {
        selectedPlayerName = name;
        renderLeaderboard();
        const p = window.PLAYER_DATA.find(x => x.name === name);
        const clears = getClears(name);

        // Skill Calc
        const pCounts = {};
        clears.forEach(l => l.skills.forEach(s => pCounts[s] = (pCounts[s] || 0) + 1));
        const skillProfile = Object.entries(pCounts).map(([s, count]) => ({
            skill: s, ratio: (count / (clears.length || 1)) / (window.GLOBAL_SKILL_RATES[s] || 0.001)
        })).sort((a,b) => b.ratio - a.ratio);

        const hardestCards = [p.hardest, p.secondHardest, p.thirdHardest].map(txt => {
            const clean = txt.replace(/\(Top\s*\d+\)/i, "").trim();
            const lvl = window.ALL_LEVELS.find(l => l.name.toLowerCase() === clean.toLowerCase());
            if(!lvl) return `<div style="aspect-ratio:1; border:1px dashed #333; border-radius:10px;"></div>`;
            return `
                <div class="hardest-clear-card">
                    <img class="hc-thumb" src="assets/thumbs/${lvl.acronym}.png" onerror="this.style.opacity='0.1'">
                    <div class="hc-overlay"><div class="hc-name">${clean}</div></div>
                    <img src="assets/diffs/${lvl.difficulty}.png" style="position:absolute; top:5px; right:5px; width:20px;">
                </div>`;
        }).join('');

        document.getElementById('player-profile-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:80px; height:80px; border-radius:10px;">
                <div>
                    <h2 style="margin:0; display:flex; align-items:center; gap:10px;">
                        ${p.country ? `<img src="https://flagcdn.com/w40/${p.country}.png" style="width:30px;">` : ''}
                        ${p.name}
                    </h2>
                    <p style="color:var(--accent); font-weight:800; margin:5px 0;">${p.points.toLocaleString()} POINTS</p>
                </div>
            </div>

            <div class="section-title">Hardest Clears</div>
            <div class="hardest-clears-row">${hardestCards}</div>

            <div class="section-title">Skills Profile</div>
            <div class="skills-summary">
                ${skillProfile.slice(0, 6).map(s => `
                    <div class="skill-row">
                        <div class="skill-row-label">${s.skill}</div>
                        <div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${Math.min(s.ratio*15, 100)}%"></div></div>
                        <div class="skill-multiplier">${s.ratio.toFixed(1)}x</div>
                    </div>
                `).join('')}
            </div>

            <div class="section-title">All Clears (${clears.length})</div>
            <div style="display:flex; gap:5px; flex-wrap:wrap;">
                <button class="filter-btn active" onclick="filterModalClears('all', this)">All</button>
                <button class="filter-btn" onclick="filterModalClears('Grandmaster', this)">GM</button>
                <button class="filter-btn" onclick="filterModalClears('Master', this)">Master</button>
                <button class="filter-btn" onclick="filterModalClears('Expert', this)">Expert</button>
            </div>
            <div class="clears-grid" id="modal-clears-grid">
                ${clears.map(l => `<div class="clear-card"><img src="assets/smallthumbs/${l.acronym}.png"><div class="cc-label">${l.name}</div></div>`).join('')}
            </div>
        `;
    }

    window.filterModalClears = function(diff, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const clears = getClears(selectedPlayerName);
        const filtered = diff === 'all' ? clears : clears.filter(l => l.difficulty.includes(diff));
        document.getElementById('modal-clears-grid').innerHTML = filtered.map(l => `
            <div class="clear-card"><img src="assets/smallthumbs/${l.acronym}.png"><div class="cc-label">${l.name}</div></div>
        `).join('');
    };

    window.onload = init;
</script>
</body>
</html>
