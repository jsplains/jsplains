<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* Base Layout */
        body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-body); }

        /* Unified Navigation (Matches your Home Page) */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 70px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo { height: 45px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            text-decoration: none;
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 700;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* Main Wrapper */
        .main-wrapper { 
            display: flex; 
            gap: 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
            height: calc(100vh - 70px); 
            box-sizing: border-box; 
        }

        /* Sidebar Styling */
        .leaderboard-column { flex: 0 0 380px; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .list-header { padding: 12px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }
        
        /* Restored Font Awesome Search Bar */
        .search-container { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #444; 
            border-radius: 8px; 
            padding: 0 12px; 
            gap: 10px;
        }
        .search-container:focus-within { border-color: var(--accent); }
        #sort-select { 
            background: transparent; color: #888; border: none; font-size: 0.7rem; 
            font-weight: 700; text-transform: uppercase; cursor: pointer; outline: none;
            padding: 8px 0; border-right: 1px solid #333; padding-right: 8px;
        }
        .search-bar { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; font-size: 0.85rem; outline: none; }
        .search-container i { color: #555; font-size: 0.8rem; }

        /* Leaderboard Entries */
        #leaderboard-list { flex: 1; overflow-y: auto; padding: 8px; }
        .level-entry { display: flex; align-items: center; padding: 8px 12px; margin-bottom: 6px; border-radius: 6px; cursor: pointer; transition: transform 0.1s; border: 1px solid transparent; }
        .level-entry:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); }
        .level-entry.selected { background: rgba(255,255,255,0.12); border-color: var(--accent); }
        
        .rank-purple { border-left: 4px solid #a155ff !important; background: rgba(161, 85, 255, 0.05); }
        .rank-blue   { border-left: 4px solid #5587ff !important; background: rgba(85, 135, 255, 0.05); }
        .rank-green  { border-left: 4px solid #55ff77 !important; background: rgba(85, 255, 119, 0.05); }
        .rank-yellow { border-left: 4px solid #f9ff55 !important; background: rgba(249, 255, 85, 0.05); }
        .rank-red    { border-left: 4px solid #ff5555 !important; background: rgba(255, 85, 85, 0.05); }
        .rank-gray   { border-left: 4px solid #888888 !important; }

        .level-rank { width: 35px; font-weight: 900; font-size: 0.8rem; color: #666; }
        .player-pfp { width: 32px; height: 32px; border-radius: 6px; margin-right: 12px; }
        .player-info { flex: 1; min-width: 0; }
        .player-name-wrapper { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .flag-icon { width: 18px; border-radius: 2px; flex-shrink: 0; }
        .hardest-sidebar-text { display: block; font-size: 0.7rem; color: #aaa; margin-top: 2px; }
        .level-points { font-weight: 800; color: var(--accent); font-size: 0.8rem; margin-left: 10px; }

        /* Profile Details Column */
        .details-column { flex: 1; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 25px; overflow-y: auto; }
        .player-stats-row { display: flex; gap: 8px; margin: 15px 0; }
        .pstat { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .pstat-val { font-size: 1.2rem; font-weight: 900; color: white; display: block; }
        .pstat-label { font-size: 0.6rem; color: #777; text-transform: uppercase; font-weight: 700; }

        /* Hardest Clear Card */
        .hardest-clears-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .hc-card { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 21/9; background: #000; grid-column: span 3; }
        .hc-thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hc-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 10%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; }
        .hc-name { color: #fff; font-size: 1.2rem; font-weight: 900; text-shadow: 2px 2px 4px #000; }

        /* Skill Bars */
        .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .skill-bar-wrap { flex: 1; height: 14px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: linear-gradient(90deg, #550eb3, #8b3cf7); transition: width 0.5s; }
        
        .clears-filter-btn {
            background: rgba(255,255,255,0.06); border: 1px solid #444; color: #aaa; 
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 700;
        }
        .clears-filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #666; margin: 30px 0 12px 0; border-bottom: 1px solid #222; padding-bottom: 5px; font-weight: 800; }
        .clears-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; margin-top: 15px; }
        .clear-card { position: relative; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; }
        .cc-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 0.55rem; padding: 5px 2px; text-align: center; color: #fff; }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><img src="assets/logo.webp" class="nav-logo"></a>
    <div class="nav-links">
        <a href="/mainlist">Main List</a>
        <a href="/expert">Extended List</a>
        <a href="/leaderboard" class="active">Leaderboard</a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="leaderboard-column">
        <div class="list-header">
            <div class="search-container">
                <select id="sort-select" onchange="renderLeaderboard()">
                    <option value="points">Points</option>
                    <option value="difficulty">Hardest</option>
                    <option value="totalclears">Clears</option>
                </select>
                <input type="text" id="player-search" class="search-bar" placeholder="Search victors..." oninput="renderLeaderboard()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="details-column" id="player-profile-view">
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#444;">
            <h3>Select a player to view profile</h3>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
    const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    window.PLAYER_DATA = [];
    window.ALL_LEVELS = [];
    window.GLOBAL_SKILL_RATES = {};
    let selectedPlayerName = null;

    async function init() {
        const [lb, l1, l2, l3] = await Promise.all([fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])]);
        
        window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
            name: (row["Name"] || "").trim(),
            acronym: (row["Acronym"] || "").toLowerCase(),
            difficulty: (row["Difficulty"] || "").trim(),
            skills: (row["Skills Needed"] || row["Skills"] || "").split(/,|\n/).map(s=>s.trim()).filter(Boolean),
            victors: (row["Victors"] || "").split(/\s+/).filter(Boolean)
        }));

        // Calculate Skill Averages for Bar Ratios
        const counts = {};
        window.ALL_LEVELS.forEach(l => l.skills.forEach(s => counts[s] = (counts[s] || 0) + 1));
        window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(counts).map(([s, c]) => [s, c / window.ALL_LEVELS.length]));

        window.PLAYER_DATA = lb.map(row => ({
            name: (row["Username"] || "").trim(),
            points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
            hardest: (row["Hardest Clear (Master+)"] || "None").trim(),
            country: (row["Country"] || "").trim().toLowerCase()
        })).sort((a,b) => b.points - a.points);

        renderLeaderboard();
        if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
    }

    async function fetchCsv(gid) {
        const res = await fetch(csvUrl(gid));
        const text = await res.text();
        return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function getClears(name) {
        return window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase()));
    }

    function getTopNumber(text) {
        if (!text || text.toLowerCase() === "none") return 999999;
        const match = text.match(/\(Top\s*(\d+)\)/i);
        return match ? parseInt(match[1], 10) : 999998; 
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        const query = document.getElementById('player-search').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;
        
        let display = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));
        
        if (sortBy === 'totalclears') display.sort((a, b) => getClears(b.name).length - getClears(a.name).length);
        else if (sortBy === 'difficulty') display.sort((a, b) => getTopNumber(a.hardest) - getTopNumber(b.hardest));
        else display.sort((a, b) => b.points - a.points);

        container.innerHTML = display.map((p, i) => {
            const globalRank = window.PLAYER_DATA.findIndex(x => x.name === p.name) + 1;
            let colorClass = "rank-gray";
            if (globalRank <= 3) colorClass = "rank-purple";
            else if (globalRank <= 10) colorClass = "rank-blue";
            else if (globalRank <= 25) colorClass = "rank-green";
            else if (globalRank <= 50) colorClass = "rank-yellow";
            else if (globalRank <= 100) colorClass = "rank-red";

            return `
            <div class="level-entry ${colorClass} ${p.name === selectedPlayerName ? 'selected' : ''}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                <div class="level-rank">#${globalRank}</div>
                <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                <div class="player-info">
                    <div class="player-name-wrapper">
                        ${p.country ? `<img class="flag-icon" src="https://flagcdn.com/w40/${p.country}.png">` : ''} 
                        <b>${p.name}</b>
                    </div>
                    <span class="hardest-sidebar-text">${p.hardest}</span>
                </div>
                <div class="level-points">${p.points.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function selectPlayer(name) {
        selectedPlayerName = name;
        renderLeaderboard();
        const p = window.PLAYER_DATA.find(x => x.name === name);
        const clears = getClears(name);
        
        const counts = { GM: 0, Master: 0, Expert: 0 };
        clears.forEach(l => {
            if(l.difficulty.includes("Grandmaster")) counts.GM++;
            else if(l.difficulty.includes("Master")) counts.Master++;
            else if(l.difficulty.includes("Expert")) counts.Expert++;
        });

        const pCounts = {};
        clears.forEach(l => l.skills.forEach(s => pCounts[s] = (pCounts[s] || 0) + 1));
        const skillProfile = Object.entries(pCounts).map(([s, count]) => ({
            skill: s, ratio: (count / (clears.length || 1)) / (window.GLOBAL_SKILL_RATES[s] || 0.001)
        })).sort((a,b) => b.ratio - a.ratio);

        const baseName = p.hardest.replace(/\(Top\s*\d+\)/i, "").trim().toLowerCase();
        const hardestLvl = window.ALL_LEVELS.find(l => l.name.toLowerCase() === baseName);

        document.getElementById('player-profile-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:20px;">
                <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:70px; height:70px; border-radius:12px;">
                <div>
                    <h1 style="margin:0; font-size:1.5rem; display:flex; align-items:center; gap:10px;">
                        ${p.country ? `<img src="https://flagcdn.com/w40/${p.country}.png" style="width:30px;">` : ''} ${p.name}
                    </h1>
                    <span style="color:var(--accent); font-weight:800;">${p.points.toLocaleString()} TOTAL POINTS</span>
                </div>
            </div>

            <div class="player-stats-row">
                <div class="pstat"><span class="pstat-val">${counts.GM}</span><span class="pstat-label">Grandmaster</span></div>
                <div class="pstat"><span class="pstat-val">${counts.Master}</span><span class="pstat-label">Master</span></div>
                <div class="pstat"><span class="pstat-val">${counts.Expert}</span><span class="pstat-label">Expert</span></div>
                <div class="pstat"><span class="pstat-val">${clears.length}</span><span class="pstat-label">Total</span></div>
            </div>

            <div class="section-title">Hardest Clear</div>
            <div class="hc-card">
                <img class="hc-thumb" src="assets/thumbs/${hardestLvl?.acronym || 'default'}.png" onerror="this.src='assets/thumbs/default.png'">
                <div class="hc-overlay"><div class="hc-name">${p.hardest}</div></div>
            </div>

            <div class="section-title">Skillset Profile</div>
            <div id="skills-list">
                ${skillProfile.slice(0, 5).map(s => `
                    <div class="skill-row">
                        <div style="width:120px; font-size:0.75rem; font-weight:700;">${s.skill}</div>
                        <div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${Math.min(s.ratio*10, 100)}%"></div></div>
                        <div style="width:40px; text-align:right; font-size:0.7rem; font-weight:900; color:var(--accent);">${s.ratio.toFixed(1)}x</div>
                    </div>
                `).join('')}
            </div>

            <div class="section-title">All Completions</div>
            <div style="display:flex; gap:6px; margin-bottom:15px;">
                <button class="clears-filter-btn active" onclick="filterC('all', this)">All</button>
                <button class="clears-filter-btn" onclick="filterC('Grandmaster', this)">GM</button>
                <button class="clears-filter-btn" onclick="filterC('Master', this)">Master</button>
                <button class="clears-filter-btn" onclick="filterC('Expert', this)">Expert</button>
            </div>
            <div class="clears-grid" id="history-grid">
                ${clears.map(l => `<div class="clear-card"><img style="width:100%; height:100%; object-fit:cover;" src="assets/smallthumbs/${l.acronym}.png" onerror="this.src='assets/smallthumbs/default.png'"><div class="cc-label">${l.name}</div></div>`).join('')}
            </div>
        `;
    }

    window.filterC = function(diff, btn) {
        document.querySelectorAll('.clears-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const clears = getClears(selectedPlayerName);
        const filtered = diff === 'all' ? clears : clears.filter(l => l.difficulty.includes(diff));
        document.getElementById('history-grid').innerHTML = filtered.map(l => `<div class="clear-card"><img style="width:100%; height:100%; object-fit:cover;" src="assets/smallthumbs/${l.acronym}.png" onerror="this.src='assets/smallthumbs/default.png'"><div class="cc-label">${l.name}</div></div>`).join('');
    };

    window.onload = init;
</script>
</body>
</html>
