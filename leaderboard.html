<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --font-main: 'Inter', sans-serif;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: var(--bg-page); 
            font-family: var(--font-main); 
            color: var(--text-main);
        }

        nav { 
            z-index: 10000; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 70px; 
            background: var(--bg-card); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 30px; 
            box-sizing: border-box; 
            border-bottom: 1px solid var(--border);
        }

        .nav-logo { height: 40px; }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 0.9rem; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: none; border: none; color: var(--text-muted);
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
            padding: 10px 0; display: flex; align-items: center; gap: 5px;
            font-family: var(--font-main);
        }
        .dropdown-content {
            display: none; position: absolute; background-color: var(--bg-card);
            min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            z-index: 1; border-radius: 8px; border: 1px solid var(--border); top: 100%;
        }
        .dropdown-content a { color: var(--text-main); padding: 12px 16px; display: block; font-size: 0.85rem; }
        .dropdown:hover .dropdown-content { display: block; }

        .main-wrapper { 
            display: flex; 
            gap: 25px; 
            max-width: 1300px; 
            margin: 100px auto 50px auto; 
            padding: 0 20px; 
            align-items: flex-start;
        }

        .leaderboard-column { 
            flex: 0 0 380px; 
            background: var(--bg-card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            position: sticky;
            top: 100px;
            max-height: calc(100vh - 150px);
            display: flex;
            flex-direction: column;
        }

        .list-header { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-container { 
            display: flex; align-items: center; background: var(--bg-page); 
            border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; 
        }
        #sort-select { 
            background: transparent; color: var(--text-muted); border: none; 
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; 
            padding: 10px 0; border-right: 1px solid var(--border); margin-right: 10px;
            font-family: var(--font-main);
        }
        .search-bar { 
            flex: 1; background: transparent; border: none; color: var(--text-main); 
            font-size: 0.85rem; outline: none; font-family: var(--font-main);
        }

        #leaderboard-list { overflow-y: auto; padding: 10px; }

        .level-entry { 
            display: flex; align-items: center; margin-bottom: 8px; padding: 12px; 
            background: rgba(255, 255, 255, 0.03); border-radius: 8px; 
            border-left: 4px solid #888; transition: 0.2s; cursor: pointer; 
        }
        .level-entry:hover { background: rgba(255, 255, 255, 0.07); transform: translateX(5px); }
        .level-entry.selected { border-color: var(--accent) !important; background: var(--accent-light); }

        .rank-purple { border-left-color: #a155ff !important; }
        .rank-blue   { border-left-color: #5587ff !important; }
        .rank-green  { border-left-color: #55ff77 !important; }
        .rank-yellow { border-left-color: #f9ff55 !important; }
        .rank-red    { border-left-color: #ff5555 !important; }

        .level-rank { width: 45px; font-weight: 800; font-size: 1rem; color: var(--text-main); }
        .player-pfp { width: 40px; height: 40px; border-radius: 8px; margin-right: 12px; border: 1px solid var(--border); }
        .level-name { font-weight: 700; font-size: 0.95rem; display: block; }
        .level-points { font-weight: 800; color: var(--accent); margin-left: auto; }

        .details-column { 
            flex: 1; 
            background: var(--bg-card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            padding: 30px; 
            min-height: 600px;
        }

        .pstat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .pstat { background: var(--bg-page); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
        .pstat-val { font-size: 1.5rem; font-weight: 800; display: block; }
        .pstat-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

        .hc-card { border-radius: 15px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 21/9; position: relative; background: #000; }
        .hc-thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hc-overlay { position: absolute; bottom: 20px; left: 20px; }

        .section-title { 
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; 
            color: var(--text-muted); margin: 40px 0 15px 0; border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; font-weight: 800; 
        }

        .skill-bar-bg { background: var(--bg-page); height: 10px; border-radius: 5px; margin: 8px 0 15px 0; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: var(--accent); transition: 1s ease-out; }

        .clears-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .clear-card { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; position: relative; background: var(--bg-page); }
        .cc-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 0.65rem; padding: 5px; text-align: center; font-weight: 700; }

        .clears-filter-btn { 
            background: var(--bg-page); border: 1px solid var(--border); color: var(--text-muted); 
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: var(--font-main);
        }
        .clears-filter-btn.active { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><img src="assets/logo.webp" class="nav-logo" alt="Logo"></a>
    <div class="nav-links">
        <div class="dropdown">
            <button class="dropbtn">Lists <i class="fas fa-caret-down"></i></button>
            <div class="dropdown-content">
                <a href="index.html">Main List</a>
                <a href="expert.html">Extended List</a>
            </div>
        </div>
        <a href="leaderboard.html" class="active">Leaderboard</a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="leaderboard-column">
        <div class="list-header">
            <div class="search-container">
                <select id="sort-select" onchange="renderLeaderboard()">
                    <option value="points">Points</option>
                    <option value="difficulty">Hardest</option>
                    <option value="totalclears">Clears</option>
                </select>
                <input type="text" id="player-search" class="search-bar" placeholder="Search..." oninput="renderLeaderboard()">
            </div>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="details-column" id="player-profile-view">
        </div>
</div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
    const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    window.PLAYER_DATA = [];
    window.ALL_LEVELS = [];
    window.GLOBAL_SKILL_RATES = {};
    let selectedPlayerName = null;

    async function init() {
        try {
            const [lb, l1, l2, l3] = await Promise.all([fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])]);
            window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
                name: (row["Name"] || "").trim(),
                acronym: (row["Acronym"] || "").toLowerCase(),
                difficulty: (row["Difficulty"] || "").trim(),
                skills: (row["Skills Needed"] || "").split(/,|\n/).map(s=>s.trim()).filter(Boolean),
                victors: (row["Victors"] || "").split(/\s+/).filter(Boolean)
            }));
            
            const counts = {};
            window.ALL_LEVELS.forEach(l => l.skills.forEach(s => counts[s] = (counts[s] || 0) + 1));
            window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(counts).map(([s, c]) => [s, c / window.ALL_LEVELS.length]));

            window.PLAYER_DATA = lb.map(row => ({
                name: (row["Username"] || "").trim(),
                points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
                hardest: (row["Hardest Clear (Master+)"] || "None").trim(),
                country: (row["Country"] || "").trim().toLowerCase()
            })).sort((a,b) => b.points - a.points);

            renderLeaderboard();
            if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
        } catch(e) { console.error(e); }
    }

    async function fetchCsv(gid) {
        const res = await fetch(csvUrl(gid));
        const text = await res.text();
        return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function getClears(name) { return window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase())); }
    
    function getTopNumber(text) {
        if (!text || text.toLowerCase() === "none") return 999999;
        const match = text.match(/\(Top\s*(\d+)\)/i);
        return match ? parseInt(match[1], 10) : 999998; 
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        const query = document.getElementById('player-search').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;
        let display = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));
        
        if (sortBy === 'totalclears') display.sort((a, b) => getClears(b.name).length - getClears(a.name).length);
        else if (sortBy === 'difficulty') display.sort((a, b) => getTopNumber(a.hardest) - getTopNumber(b.hardest));
        else display.sort((a, b) => b.points - a.points);

        container.innerHTML = display.map((p, i) => {
            const globalRank = window.PLAYER_DATA.findIndex(x => x.name === p.name) + 1;
            let rankClass = globalRank <= 3 ? "rank-purple" : globalRank <= 10 ? "rank-blue" : globalRank <= 25 ? "rank-green" : globalRank <= 50 ? "rank-yellow" : "rank-red";

            return `
            <div class="level-entry ${rankClass} ${p.name === selectedPlayerName ? 'selected' : ''}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                <div class="level-rank">#${globalRank}</div>
                <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                <div style="min-width:0; flex:1;">
                    <span class="level-name">${p.name}</span>
                    <span style="font-size:0.6rem; color:var(--text-muted); font-weight:700;">HARDEST: ${p.hardest}</span>
                </div>
                <div class="level-points">${p.points.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function selectPlayer(name) {
        selectedPlayerName = name;
        renderLeaderboard();
        const p = window.PLAYER_DATA.find(x => x.name === name);
        const clears = getClears(name);
        const counts = { GM: 0, Master: 0, Expert: 0 };
        clears.forEach(l => {
            if(l.difficulty.includes("Grandmaster")) counts.GM++;
            else if(l.difficulty.includes("Master")) counts.Master++;
            else if(l.difficulty.includes("Expert")) counts.Expert++;
        });

        const pCounts = {};
        clears.forEach(l => l.skills.forEach(s => pCounts[s] = (pCounts[s] || 0) + 1));
        const skillProfile = Object.entries(pCounts).map(([s, count]) => ({
            skill: s, ratio: (count / (clears.length || 1)) / (window.GLOBAL_SKILL_RATES[s] || 0.001)
        })).sort((a,b) => b.ratio - a.ratio);

        const baseName = p.hardest.replace(/\(Top\s*\d+\)/i, "").trim().toLowerCase();
        const hardestLvl = window.ALL_LEVELS.find(l => l.name.toLowerCase() === baseName);

        document.getElementById('player-profile-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:25px; margin-bottom:30px;">
                <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:100px; height:100px; border-radius:15px; border:2px solid var(--border);">
                <div>
                    <h1 style="margin:0; font-size:2rem; font-weight:800; display:flex; align-items:center; gap:12px;">
                        ${p.country ? `<img src="https://flagcdn.com/w40/${p.country}.png" style="width:30px;">` : ''}${p.name}
                    </h1>
                    <span style="color:var(--accent); font-weight:800; font-size:1.1rem;">${p.points.toLocaleString()} POINTS</span>
                </div>
            </div>

            <div class="pstat-row">
                <div class="pstat"><span class="pstat-val">${counts.GM}</span><span class="pstat-label">GM</span></div>
                <div class="pstat"><span class="pstat-val">${counts.Master}</span><span class="pstat-label">Master</span></div>
                <div class="pstat"><span class="pstat-val">${counts.Expert}</span><span class="pstat-label">Expert</span></div>
                <div class="pstat"><span class="pstat-val">${clears.length}</span><span class="pstat-label">Clears</span></div>
            </div>

            <div class="section-title">Hardest Achievement</div>
            <div class="hc-card">
                <img class="hc-thumb" src="assets/thumbs/${hardestLvl?.acronym || 'default'}.png" onerror="this.src='assets/thumbs/default.png'">
                <div class="hc-overlay">
                    <div style="font-size:1.5rem; font-weight:800; color:#fff; text-shadow:0 2px 10px #000;">${p.hardest}</div>
                </div>
            </div>

            <div class="section-title">Specialties</div>
            ${skillProfile.slice(0, 5).map(s => `
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:700; margin-bottom:5px;">
                    <span>${s.skill}</span><span style="color:var(--accent)">${s.ratio.toFixed(1)}x Preference</span>
                </div>
                <div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${Math.min(s.ratio*10, 100)}%;"></div></div>
            `).join('')}

            <div class="section-title">Clear History</div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="clears-filter-btn active" onclick="filterC('all', this)">All</button>
                <button class="clears-filter-btn" onclick="filterC('Grandmaster', this)">GM</button>
                <button class="clears-filter-btn" onclick="filterC('Master', this)">Master</button>
            </div>
            <div class="clears-grid" id="history-grid">
                ${clears.map(l => `<div class="clear-card"><img style="width:100%; height:100%; object-fit:cover;" src="assets/smallthumbs/${l.acronym}.png" onerror="this.src='assets/smallthumbs/default.png'"><div class="cc-label">${l.name}</div></div>`).join('')}
            </div>
        `;
    }

    window.filterC = function(diff, btn) {
        document.querySelectorAll('.clears-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = diff === 'all' ? getClears(selectedPlayerName) : getClears(selectedPlayerName).filter(l => l.difficulty.includes(diff));
        document.getElementById('history-grid').innerHTML = filtered.map(l => `<div class="clear-card"><img style="width:100%; height:100%; object-fit:cover;" src="assets/smallthumbs/${l.acronym}.png" onerror="this.src='assets/smallthumbs/default.png'"><div class="cc-label">${l.name}</div></div>`).join('');
    };

    window.onload = init;
</script>
</body>
</html>
