<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* ── Compressed Sort Bar ── */
        .sort-container {
            margin: 15px auto;
            max-width: 850px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 0 10px;
        }
        .sort-wrapper {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding-left: 12px;
        }
        .sort-wrapper i { color: var(--accent); font-size: 0.9rem; }
        #sort-select {
            padding: 8px 12px;
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }

        /* ── Compressed Entry Layout ── */
        .level-entry {
            display: flex;
            align-items: center;
            padding: 8px 16px; /* Reduced padding */
            margin-bottom: 6px;
            gap: 12px;
        }
        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .player-name-wrapper {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hardest-display {
            font-size: 0.72rem; /* Smaller text */
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }

        /* ── Stats on the Right ── */
        .entry-stats-right {
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: right;
            flex-shrink: 0;
        }
        .clear-counts-brief {
            display: flex;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 800;
        }
        .c-tag { padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3); }
        .c-gm { color: #f0f; }
        .c-mstr { color: #55f; }
        .c-exp { color: #5f5; }

        .level-points {
            font-size: 1.1rem;
            width: 90px;
            margin: 0;
            text-align: right;
        }

        /* ── Modal Improvements ── */
        .modal-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .clears-filter-row {
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 10px;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .clear-counts-brief { display: none; }
            .level-points { font-size: 0.9rem; width: 70px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-link">
            <img src="assets/logo.webp" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/mainlist">Main List</a>
            <a href="/expert">Extended List</a>
            <a href="/leaderboard" class="active">Leaderboard</a>
        </div>
    </nav>

    <div id="container" style="max-width: 850px; margin: 0px auto; padding: 20px;">
        <h1 style="text-align:center; font-weight: 800; margin-bottom: 5px;">Leaderboard</h1>

        <div class="sort-container">
            <div class="sort-wrapper">
                <i class="fa-solid fa-filter"></i>
                <select id="sort-select" onchange="renderLeaderboard()">
                    <option value="points">Points</option>
                    <option value="difficulty">Hardest Clear</option>
                    <option value="totalclears">Total Clears</option>
                </select>
            </div>
        </div>

        <div id="loading-msg" style="text-align:center; padding: 40px; color: #888;">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Zoning in on the leaderboard...
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div id="playerModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:780px;">
            <span onclick="closePlayerModal()" class="close-btn" style="cursor:pointer; font-size:24px; float:right;">&times;</span>
            <div id="player-modal-body"></div>
        </div>
    </div>

    <script>
        /* Existing Config & State logic remains identical */
        const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const LB_GID         = "1908015854";
        const LEVEL_GIDS     = ["0", "1720349441", "1575264256"];
        const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

        window.PLAYER_DATA         = [];
        window.RANKED_DATA         = [];
        window.ALL_LEVELS          = [];
        window.GLOBAL_SKILL_RATES  = {};
        window._currentModalClears = [];
        let currentClearsFilter    = "all";

        const safeText = v => (v === undefined || v === null) ? "" : String(v);

        function getTopNumber(text) {
            if (!text || text.toLowerCase() === "none" || text.trim() === "") return 999999;
            const m = text.match(/\(Top\s*(\d+)\)/i);
            return m ? parseInt(m[1], 10) : 999998;
        }

        const parseVictors = raw => (!raw || !raw.trim()) ? [] : raw.trim().split(/\s+/).filter(Boolean);
        const parseSkills  = raw => (!raw) ? [] : raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean);

        function extractLevelName(str) {
            if (!str || str.trim() === "" || str.toLowerCase() === "none") return null;
            return str.replace(/\(Top\s*\d+\)/i, "").trim();
        }

        function findLevel(nameStr) {
            if (!nameStr) return null;
            const needle = nameStr.toLowerCase();
            return window.ALL_LEVELS.find(l => l.nameLower === needle)
                || window.ALL_LEVELS.find(l => l.nameLower.includes(needle) || needle.includes(l.nameLower))
                || null;
        }

        const getDiffGroup = d => {
            const s = (d || "").toLowerCase();
            if (s.includes("grandmaster")) return "gm";
            if (s.includes("master"))      return "master";
            if (s.includes("expert"))      return "expert";
            return "other";
        };

        async function fetchCsv(gid) {
            const res  = await fetch(csvUrl(gid));
            const text = await res.text();
            return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        }

        function parsePlayerRow(row) {
            return {
                name:          safeText(row["Username"] || row["username"] || "Unknown"),
                points:        parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
                hardest:       safeText(row["Hardest Clear (Master+)"]  || ""),
                secondHardest: safeText(row["Second Hardest (Master+)"] || ""),
                thirdHardest:  safeText(row["Third Hardest (Master+)"]  || ""),
                country:       safeText(row["Country"] || "")
            };
        }

        function parseLevelRow(row) {
            const name    = safeText(row["Name"] || row["name"]);
            const acronym = safeText(row["Acronym"]).toLowerCase();
            const diff    = safeText(row["Difficulty"] || "");
            const rank    = safeText(row["Rank"] || "");
            const explicitImg = safeText(row["Image"] || "");
            const smallimg = explicitImg || (acronym ? `assets/smallthumbs/${acronym}.png` : "");
            return {
                name,
                nameLower:  name.toLowerCase(),
                acronym,
                smallimg,
                fullimg: acronym ? `assets/thumbs/${acronym}.png` : "",
                diffimg: diff ? `assets/diffs/${diff.trim()}.png` : "",
                difficulty: diff,
                rank,
                skills: parseSkills(safeText(row["Skills Needed"] || row["Skills"] || "")),
                victors: parseVictors(safeText(row["Victors"] || ""))
            };
        }

        async function fetchLeaderboard() {
            try {
                const [lbData, lvlData1, lvlData2, lvlData3] = await Promise.all([
                    fetchCsv(LB_GID),
                    fetchCsv(LEVEL_GIDS[0]),
                    fetchCsv(LEVEL_GIDS[1]),
                    fetchCsv(LEVEL_GIDS[2])
                ]);

                window.ALL_LEVELS = [...lvlData1, ...lvlData2, ...lvlData3].map(parseLevelRow);
                
                // Skill Calculation
                const skillCounts = {};
                window.ALL_LEVELS.forEach(lvl => lvl.skills.forEach(s => { if (s) skillCounts[s] = (skillCounts[s] || 0) + 1; }));
                window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(skillCounts).map(([s, c]) => [s, c / (window.ALL_LEVELS.length || 1)]));

                window.RANKED_DATA = lbData.map(parsePlayerRow).sort((a, b) => b.points - a.points);
                window.PLAYER_DATA = [...window.RANKED_DATA];

                document.getElementById('loading-msg').style.display = 'none';
                renderLeaderboard();
            } catch (err) {
                document.getElementById('loading-msg').innerHTML = "Error loading data.";
            }
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            const sortBy    = document.getElementById('sort-select').value;

            let display = [...window.PLAYER_DATA];
            if (sortBy === "points") display.sort((a, b) => b.points - a.points);
            else if (sortBy === 'difficulty') display.sort((a, b) => getTopNumber(a.hardest) - getTopNumber(b.hardest));
            else if (sortBy === 'totalclears') {
                display.sort((a, b) => getPlayerClears(b.name).length - getPlayerClears(a.name).length);
            }

            container.innerHTML = display.map(p => {
                const globalRank = window.RANKED_DATA.indexOf(p) + 1;
                const clears = getPlayerClears(p.name);
                const gmCount = clears.filter(l => getDiffGroup(l.difficulty) === "gm").length;
                const mstrCount = clears.filter(l => getDiffGroup(l.difficulty) === "master").length;
                const expCount = clears.filter(l => getDiffGroup(l.difficulty) === "expert").length;

                let colorClass = "rank-gray";
                if (globalRank <= 3) colorClass = "rank-purple";
                else if (globalRank <= 10) colorClass = "rank-blue";
                else if (globalRank <= 25) colorClass = "rank-green";

                return `
                <div class="level-entry ${colorClass}" onclick="showPlayerDetails('${p.name.replace(/'/g, "\\'")}')">
                    <div class="level-rank">#${globalRank}</div>
                    <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                    <div class="player-info">
                        <div class="player-name-wrapper">${getFlagElement(p.country)} <b>${p.name}</b></div>
                        <span class="hardest-display">Hardest: ${p.hardest || "—"}</span>
                    </div>
                    <div class="entry-stats-right">
                        <div class="clear-counts-brief">
                            <span class="c-tag c-gm">${gmCount}</span>
                            <span class="c-tag c-mstr">${mstrCount}</span>
                            <span class="c-tag c-exp">${expCount}</span>
                        </div>
                        <div class="level-points"><b>${p.points.toLocaleString()}</b></div>
                    </div>
                </div>`;
            }).join('');
        }

        function getFlagElement(countryCode) {
            if (!countryCode || countryCode.trim() === "" || countryCode.toLowerCase() === "n/a")
                return `<div class="flag-container no-flag"></div>`;
            const code = countryCode.toLowerCase().trim();
            return `<img class="flag-container" src="https://flagcdn.com/w40/${code}.png" onerror="this.outerHTML='<div class=\'flag-container no-flag\'></div>'">`;
        }

        function getPlayerClears(playerName) {
            const nameLower = playerName.toLowerCase();
            return window.ALL_LEVELS.filter(lvl => lvl.victors.some(v => v.toLowerCase() === nameLower));
        }

        /* ── Modal logic remains mostly the same, updated with icons ── */
        function showPlayerDetails(name) {
            const player = window.PLAYER_DATA.find(p => p.name === name);
            if (!player) return;

            const clears = getPlayerClears(name);
            const gmCount = clears.filter(l => getDiffGroup(l.difficulty) === "gm").length;
            const masterCount = clears.filter(l => getDiffGroup(l.difficulty) === "master").length;
            const expertCount = clears.filter(l => getDiffGroup(l.difficulty) === "expert").length;

            currentClearsFilter = "all";
            window._currentModalClears = clears;

            document.getElementById('player-modal-body').innerHTML = `
                <div class="player-modal-header">
                    <img class="player-pfp" style="width:60px;height:60px;" src="assets/players/${player.name}.png" onerror="this.src='assets/players/default.png'">
                    <div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            ${getFlagElement(player.country)}
                            <h2 style="margin:0;">${player.name}</h2>
                        </div>
                        <div style="color:var(--accent);font-size:0.9rem;font-weight:800;margin-top:2px;">${player.points.toLocaleString()} PTS</div>
                    </div>
                </div>

                <div class="player-stats-row">
                    <div class="pstat"><div class="pstat-val">${gmCount}</div><div class="pstat-label">GM</div></div>
                    <div class="pstat"><div class="pstat-val">${masterCount}</div><div class="pstat-label">Master</div></div>
                    <div class="pstat"><div class="pstat-val">${expertCount}</div><div class="pstat-label">Expert</div></div>
                    <div class="pstat"><div class="pstat-val">${clears.length}</div><div class="pstat-label">Total</div></div>
                </div>

                <p class="modal-section-title"><i class="fa-solid fa-trophy"></i> Hardest Clears</p>
                <div class="hardest-clears-row">
                    ${[player.hardest, player.secondHardest, player.thirdHardest].map(c => hardestClearCard(c || "")).join('')}
                </div>

                <p class="modal-section-title"><i class="fa-solid fa-chart-simple"></i> All Clears</p>
                <div class="clears-filter-row">
                    <button class="clears-filter-btn active" data-filter="all" onclick="setClearsFilter(this)">All</button>
                    <button class="clears-filter-btn" data-filter="gm" onclick="setClearsFilter(this)">GM</button>
                    <button class="clears-filter-btn" data-filter="master" onclick="setClearsFilter(this)">Master</button>
                    <button class="clears-filter-btn" data-filter="expert" onclick="setClearsFilter(this)">Expert</button>
                    <span class="clears-count-label" id="pm-clears-count">${clears.length} clears</span>
                </div>
                <div class="clears-grid" id="pm-clears-grid">${renderClearsGrid(clears, 'all')}</div>
            `;
            document.getElementById('playerModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        // Include hardestClearCard, renderClearsGrid, setClearsFilter, closePlayerModal from original...
        function hardestClearCard(clearText) {
            const levelName = extractLevelName(clearText);
            if (!levelName) return `<div class="hc-empty">—</div>`;
            const lvl = findLevel(levelName);
            const thumb = lvl ? (lvl.fullimg || lvl.smallimg) : "";
            const topMatch = clearText.match(/\(Top\s*(\d+)\)/i);
            return `
            <div class="hardest-clear-card">
                ${thumb ? `<img class="hc-thumb" src="${thumb}" onerror="this.style.opacity='0.12'">` : `<div style="width:100%;height:100%;background:rgba(255,255,255,0.03);"></div>`}
                <div class="hc-overlay"><div class="hc-name">${levelName}</div>${topMatch ? `<div class="hc-sub">Top ${topMatch[1]}</div>` : ''}</div>
            </div>`;
        }

        function renderClearsGrid(clears, filter) {
            const filtered = filter === "all" ? clears : clears.filter(lvl => getDiffGroup(lvl.difficulty) === filter);
            return filtered.map(lvl => `
                <div class="clear-card">
                    <img class="cc-thumb" src="${lvl.smallimg}" onerror="this.style.opacity='0.12'">
                    <div class="cc-label">${lvl.name}</div>
                </div>
            `).join('');
        }

        function setClearsFilter(btn) {
            btn.closest('.clears-filter-row').querySelectorAll('.clears-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentClearsFilter = btn.dataset.filter;
            const grid = document.getElementById('pm-clears-grid');
            grid.innerHTML = renderClearsGrid(window._currentModalClears, currentClearsFilter);
        }

        function closePlayerModal() {
            document.getElementById('playerModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onload = fetchLeaderboard;
    </script>
</body>
</html>
