<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* ── Main Layout ── */
        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 100px);
        }

        /* ── Left Column: Leaderboard List ── */
        .leaderboard-column {
            flex: 0 0 420px;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .list-header {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }

        .search-wrap {
            position: relative;
            margin-bottom: 10px;
        }
        .search-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 0.9rem;
        }
        .search-bar {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border-radius: 8px;
            background: #111;
            border: 1px solid #444;
            color: white;
            font-family: inherit;
        }

        #leaderboard-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* ── Entry Styling ── */
        .level-entry {
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .level-entry:hover { transform: translateX(5px); }
        .level-entry.selected {
            border-color: var(--accent);
            background: rgba(139, 60, 247, 0.15);
            box-shadow: inset 4px 0 0 var(--accent);
        }

        .player-info {
            flex: 1;
            min-width: 0; /* Allows ellipsis to work */
            margin: 0 12px;
        }
        .player-name-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-name-wrapper b {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Right Column: Player Profile ── */
        .details-column {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 30px;
            overflow-y: auto;
        }

        /* ── Hardest Clear Cards (Restored) ── */
        .hardest-clears-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .hardest-clear-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 1;
        }
        .hc-thumb { width: 100%; height: 100%; object-fit: cover; }
        .hc-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.9));
            display: flex; flex-direction: column; justify-content: flex-end; padding: 10px;
        }
        .hc-name { font-size: 0.85rem; font-weight: 800; color: #fff; line-height: 1.2; }
        .hc-empty { 
            aspect-ratio: 1; border: 1px dashed #444; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: #555;
        }
        .diff-badge { position: absolute; top: 8px; right: 8px; width: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .rank-badge { 
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); 
            padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 900; 
        }

        /* ── Skill Bars ── */
        .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .skill-row-label { width: 120px; font-size: 0.8rem; font-weight: 700; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .skill-bar-wrap { flex: 1; height: 14px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: linear-gradient(90deg, #550eb3, #8b3cf7); transition: width 0.6s ease; }
        .skill-multiplier { width: 45px; text-align: right; font-size: 0.75rem; font-weight: 900; color: var(--accent); }

        /* ── Responsive ── */
        @media (max-width: 1000px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .leaderboard-column { flex: none; width: 100%; height: 400px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
    <div class="nav-links">
        <a href="/mainlist">Main List</a>
        <a href="/expert">Extended List</a>
        <a href="/leaderboard" class="active">Leaderboard</a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="leaderboard-column">
        <div class="list-header">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="player-search" class="search-bar" placeholder="Filter players..." oninput="renderLeaderboard()">
            </div>
            <select id="sort-select" style="width:100%; background:#111; color:#888; border:1px solid #444; padding:5px; border-radius:5px; font-size:0.75rem;" onchange="renderLeaderboard()">
                <option value="points">Sort by Points</option>
                <option value="difficulty">Sort by Hardest Clear</option>
                <option value="totalclears">Sort by Total Clears</option>
            </select>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="details-column" id="player-profile-view">
        <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444;">
            <i class="fa-solid fa-id-card" style="font-size:3rem; margin-bottom:15px;"></i>
            <p>Select a player to view stats</p>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
    const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    window.PLAYER_DATA = [];
    window.ALL_LEVELS = [];
    window.GLOBAL_SKILL_RATES = {};
    let selectedPlayerName = null;

    const safeText = v => v ? String(v).trim() : "";
    const getDiffGroup = d => {
        const s = (d || "").toLowerCase();
        if (s.includes("grandmaster")) return "gm";
        if (s.includes("master")) return "master";
        return "expert";
    };

    async function init() {
        const [lb, l1, l2, l3] = await Promise.all([
            fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])
        ]);

        window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
            name: safeText(row["Name"] || row["name"]),
            nameLower: safeText(row["Name"] || row["name"]).toLowerCase(),
            acronym: safeText(row["Acronym"]).toLowerCase(),
            difficulty: safeText(row["Difficulty"]),
            rank: safeText(row["Rank"]),
            skills: safeText(row["Skills Needed"] || row["Skills"]).split(/,|\n/).map(s=>s.trim()).filter(Boolean),
            victors: safeText(row["Victors"]).split(/\s+/).filter(Boolean)
        }));

        // Calc global skill rates for the bars
        const skillCounts = {};
        window.ALL_LEVELS.forEach(l => l.skills.forEach(s => skillCounts[s] = (skillCounts[s] || 0) + 1));
        const total = window.ALL_LEVELS.length || 1;
        window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(skillCounts).map(([s, c]) => [s, c / total]));

        window.PLAYER_DATA = lb.map(row => ({
            name: safeText(row["Username"]),
            points: parseInt(safeText(row["Points"]).replace(/,/g, "")) || 0,
            hardest: safeText(row["Hardest Clear (Master+)"]),
            secondHardest: safeText(row["Second Hardest (Master+)"]),
            thirdHardest: safeText(row["Third Hardest (Master+)"]),
            country: safeText(row["Country"])
        })).sort((a,b) => b.points - a.points);

        renderLeaderboard();
        if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
    }

    async function fetchCsv(gid) {
        const res = await fetch(csvUrl(gid));
        const text = await res.text();
        return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        const query = document.getElementById('player-search').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;

        let display = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));
        
        // Sorting logic
        if(sortBy === 'totalclears') {
            display.sort((a,b) => getClears(b.name).length - getClears(a.name).length);
        }

        container.innerHTML = display.map(p => {
            const rank = window.PLAYER_DATA.findIndex(x => x.name === p.name) + 1;
            let c = "rank-gray";
            if(rank <= 3) c = "rank-purple"; else if(rank <= 10) c = "rank-blue";
            else if(rank <= 25) c = "rank-green"; else if(rank <= 50) c = "rank-yellow";
            
            const isSelected = p.name === selectedPlayerName ? 'selected' : '';

            return `
            <div class="level-entry ${c} ${isSelected}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                <div class="level-rank">#${rank}</div>
                <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                <div class="player-info">
                    <div class="player-name-wrapper">
                        ${p.country ? `<img src="https://flagcdn.com/w20/${p.country.toLowerCase()}.png" style="width:16px;">` : ''}
                        <b>${p.name}</b>
                    </div>
                    <div style="font-size:0.65rem; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p.hardest || 'No Clears'}</div>
                </div>
                <div class="level-points">${p.points.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function getClears(name) {
        return window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase()));
    }

    function selectPlayer(name) {
        selectedPlayerName = name;
        renderLeaderboard();
        const p = window.PLAYER_DATA.find(x => x.name === name);
        const clears = getClears(name);

        // Skill Math
        const pCounts = {};
        clears.forEach(l => l.skills.forEach(s => pCounts[s] = (pCounts[s] || 0) + 1));
        const skillProfile = Object.entries(pCounts).map(([s, count]) => ({
            skill: s, ratio: (count / (clears.length || 1)) / (window.GLOBAL_SKILL_RATES[s] || 0.001)
        })).sort((a,b) => b.ratio - a.ratio).slice(0, 8);

        const hardestSection = [p.hardest, p.secondHardest, p.thirdHardest].map(txt => {
            if(!txt || txt === 'None') return `<div class="hc-empty"><i class="fa-solid fa-lock"></i></div>`;
            const cleanName = txt.replace(/\(Top\s*\d+\)/i, "").trim();
            const lvl = window.ALL_LEVELS.find(l => l.nameLower === cleanName.toLowerCase());
            return `
                <div class="hardest-clear-card">
                    <img class="hc-thumb" src="assets/thumbs/${lvl?.acronym}.png" onerror="this.style.opacity='0.1'">
                    ${lvl?.rank ? `<div class="rank-badge">#${lvl.rank}</div>` : ''}
                    ${lvl?.difficulty ? `<img class="diff-badge" src="assets/diffs/${lvl.difficulty}.png">` : ''}
                    <div class="hc-overlay"><div class="hc-name">${cleanName}</div></div>
                </div>`;
        }).join('');

        document.getElementById('player-profile-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
                <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:100px; height:100px; border-radius:15px; border:2px solid var(--border);">
                <div>
                    <h1 style="margin:0; font-size:2rem;">${p.name}</h1>
                    <p style="color:var(--accent); font-weight:800; margin:0;">${p.points.toLocaleString()} POINTS</p>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:30px;">
                <div style="background:#1a1a1a; padding:15px; border-radius:10px; text-align:center; border:1px solid var(--border);">
                    <span style="display:block; font-size:1.2rem; font-weight:900;">${clears.length}</span>
                    <span style="font-size:0.6rem; color:#666; text-transform:uppercase;">Clears</span>
                </div>
                <div style="background:#1a1a1a; padding:15px; border-radius:10px; text-align:center; border:1px solid var(--border);">
                    <span style="display:block; font-size:1.2rem; font-weight:900;">#${window.PLAYER_DATA.indexOf(p)+1}</span>
                    <span style="font-size:0.6rem; color:#666; text-transform:uppercase;">Rank</span>
                </div>
                <div style="background:#1a1a1a; padding:15px; border-radius:10px; text-align:center; border:1px solid var(--border);">
                    <span style="display:block; font-size:1.2rem; font-weight:900;">${clears.filter(l=>getDiffGroup(l.difficulty)==='gm').length}</span>
                    <span style="font-size:0.6rem; color:#666; text-transform:uppercase;">GM</span>
                </div>
                <div style="background:#1a1a1a; padding:15px; border-radius:10px; text-align:center; border:1px solid var(--border);">
                    <span style="display:block; font-size:1.2rem; font-weight:900;">${p.country || '--'}</span>
                    <span style="font-size:0.6rem; color:#666; text-transform:uppercase;">Region</span>
                </div>
            </div>

            <h3 style="text-transform:uppercase; font-size:0.7rem; letter-spacing:2px; color:#555; margin-bottom:15px;">Hardest Accomplishments</h3>
            <div class="hardest-clears-row">${hardestSection}</div>

            <h3 style="text-transform:uppercase; font-size:0.7rem; letter-spacing:2px; color:#555; margin-top:30px; margin-bottom:15px;">Skill Affinities</h3>
            <div class="skills-box">
                ${skillProfile.map(s => `
                    <div class="skill-row">
                        <div class="skill-row-label">${s.skill}</div>
                        <div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${Math.min(s.ratio*20, 100)}%"></div></div>
                        <div class="skill-multiplier">${s.ratio.toFixed(1)}x</div>
                    </div>
                `).join('') || '<p style="color:#333;">Insufficient data</p>'}
            </div>
        `;
    }

    window.onload = init;
</script>
</body>
</html>
