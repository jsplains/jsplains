<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #111111;
            --border: #222222;
            --text: #e0e0e0;
            --accent: #8b3cf7;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* ── Split Layout Logic ── */
        #container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        #main-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        #leaderboard-container {
            flex: 1;
            min-width: 0;
        }

        /* Sticky Right Side Popup Panel */
        #player-popup-panel {
            width: 450px;
            position: sticky;
            top: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            display: block; /* Shown by default now */
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 100;
        }

        /* ── Rank Border Colors (Exact Brackets) ── */
        .rank-purple { border-left: 5px solid #8b3cf7; } /* 1-3 */
        .rank-blue   { border-left: 5px solid #3c87f7; } /* 4-10 */
        .rank-green  { border-left: 5px solid #3cf770; } /* 11-25 */
        .rank-yellow { border-left: 5px solid #f7e63c; } /* 26-50 */
        .rank-red    { border-left: 5px solid #f73c3c; } /* 51-100 */
        .rank-gray   { border-left: 5px solid #444444; }

        /* ── Difficulty Text Colors ── */
        .c-gm   { color: #4b0082 !important; font-weight: 900; } /* Dark Purple */
        .c-mstr { color: #3c87f7 !important; font-weight: 900; } /* Blue (Master) */
        .c-exp  { color: #ff69b4 !important; font-weight: 900; } /* Pink (Expert) */

        /* ── Entry Styling ── */
        .level-entry {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .level-entry:hover, .level-entry.active-row {
            background: rgba(255,255,255,0.06);
        }
        .level-entry.active-row { border-right: 2px solid var(--accent); }
        
        .player-info { flex: 1; display: flex; align-items: center; gap: 15px; }
        .player-pfp { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #222; border: 1px solid #333; }
        
        .entry-stats-right { display: flex; align-items: center; gap: 30px; }
        .clear-counts-brief { display: flex; gap: 15px; font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; }
        .level-points { width: 110px; text-align: right; font-weight: 900; font-size: 1.1rem; color: #fff; }

        /* ── Popup UI Elements ── */
        .close-btn { float: right; cursor: pointer; color: #666; font-size: 1.8rem; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #fff; }
        .popup-header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .popup-large-pfp { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; border: 3px solid var(--accent); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-card { background: #000; padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #1a1a1a; }
        .stat-num { font-size: 1.4rem; font-weight: 900; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #666; letter-spacing: 1px; }

        .clear-item { 
            display: flex; justify-content: space-between; padding: 10px; 
            background: rgba(255,255,255,0.02); border-radius: 6px; margin-bottom: 5px; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="main-layout">
        <div id="leaderboard-container">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px; padding: 0 10px;">
                <div>
                    <h1 style="margin:0; font-size: 2.5rem; font-weight: 900;">Leaderboard</h1>
                </div>
                <div style="background:#161616; padding:10px; border-radius:12px; border:1px solid #222;">
                    <select id="sort-select" onchange="renderLeaderboard()" style="background:none; color:white; border:none; outline:none; cursor:pointer; font-weight:600;">
                        <option value="points">Points</option>
                        <option value="clears">Total Clears</option>
                    </select>
                </div>
            </div>
            <div id="leaderboard-list"></div>
        </div>

        <div id="player-popup-panel">
            <span class="close-btn" onclick="closePopup()">&times;</span>
            <div id="popup-content"></div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const GIDS = { players: "1908015854", lists: ["0", "1720349441", "1575264256"] };

    window.PLAYER_DATA = [];
    window.LEVEL_DATA = [];

    async function init() {
        const fetchCSV = (gid) => fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`).then(r => r.text());
        try {
            const [pCsv, ...lCsvs] = await Promise.all([fetchCSV(GIDS.players), ...GIDS.lists.map(fetchCSV)]);
            window.PLAYER_DATA = Papa.parse(pCsv, { header: true }).data.filter(p => p.Name);
            lCsvs.forEach(csv => {
                const parsed = Papa.parse(csv, { header: true }).data;
                window.LEVEL_DATA = window.LEVEL_DATA.concat(parsed.filter(l => l.Name));
            });
            renderLeaderboard();
        } catch (err) { console.error(err); }
    }

    function getDiffGroup(diff) {
        if (!diff) return "other";
        const d = diff.toLowerCase();
        if (d.includes("grandmaster")) return "gm";
        if (d.includes("master")) return "master";
        if (d.includes("expert")) return "expert";
        return "other";
    }

    function getPlayerStats(name) {
        const clears = window.LEVEL_DATA.filter(l => {
            const victors = l.Victors ? l.Victors.split(',').map(v => v.trim()) : [];
            return victors.includes(name);
        });
        return {
            gm: clears.filter(l => getDiffGroup(l.Difficulty) === "gm").length,
            master: clears.filter(l => getDiffGroup(l.Difficulty) === "master").length,
            expert: clears.filter(l => getDiffGroup(l.Difficulty) === "expert").length,
            all: clears.sort((a,b) => (parseInt(b.ID) || 0) - (parseInt(a.ID) || 0))
        };
    }

    function renderLeaderboard() {
        const sortBy = document.getElementById('sort-select').value;
        const listDiv = document.getElementById('leaderboard-list');
        
        let processed = window.PLAYER_DATA.map(p => ({
            ...p,
            stats: getPlayerStats(p.Name),
            points: parseFloat(p.Points || 0)
        }));

        processed.sort((a, b) => sortBy === 'points' ? b.points - a.points : b.stats.all.length - a.stats.all.length);

        listDiv.innerHTML = processed.map((p, i) => {
            const rank = i + 1;
            let bracket = "rank-gray";
            if (rank <= 3) bracket = "rank-purple";
            else if (rank <= 10) bracket = "rank-blue";
            else if (rank <= 25) bracket = "rank-green";
            else if (rank <= 50) bracket = "rank-yellow";
            else if (rank <= 100) bracket = "rank-red";

            return `
            <div class="level-entry ${bracket}" id="row-${p.Name.replace(/\s+/g, '-')}" onclick="openPopup('${p.Name.replace(/'/g, "\\'")}')">
                <div style="width: 40px; font-weight: 800; opacity: 0.3;">${rank}</div>
                <div class="player-info">
                    <img class="player-pfp" src="assets/players/${p.Name}.png" onerror="this.src='assets/players/default.png'">
                    <div class="player-name-wrapper"><b>${p.Name}</b></div>
                </div>
                <div class="entry-stats-right">
                    <div class="clear-counts-brief">
                        <span class="c-gm">${p.stats.gm}</span>
                        <span class="c-mstr">${p.stats.master}</span>
                        <span class="c-exp">${p.stats.expert}</span>
                    </div>
                    <div class="level-points">${p.points.toLocaleString()}</div>
                </div>
            </div>`;
        }).join('');

        // ── AUTO-SELECT #1 PLAYER ──
        if (processed.length > 0) {
            openPopup(processed[0].Name);
        }
    }

    function openPopup(name) {
        const player = window.PLAYER_DATA.find(p => p.Name === name);
        const stats = getPlayerStats(name);
        const panel = document.getElementById('player-popup-panel');
        const content = document.getElementById('popup-content');

        // Add visual feedback to the list
        document.querySelectorAll('.level-entry').forEach(el => el.classList.remove('active-row'));
        const activeRow = document.getElementById(`row-${name.replace(/\s+/g, '-')}`);
        if(activeRow) activeRow.classList.add('active-row');

        content.innerHTML = `
            <div class="popup-header">
                <img src="assets/players/${name}.png" onerror="this.src='assets/players/default.png'" class="popup-large-pfp">
                <h2 style="margin:0;">${name}</h2>
                <div style="color:var(--accent); font-weight:800; margin-top:5px;">
                    ${parseFloat(player.Points || 0).toLocaleString()} POINTS
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-num c-gm">${stats.gm}</span><span class="stat-label">GM</span></div>
                <div class="stat-card"><span class="stat-num c-mstr">${stats.master}</span><span class="stat-label">Master</span></div>
                <div class="stat-card"><span class="stat-num c-exp">${stats.expert}</span><span class="stat-label">Expert</span></div>
            </div>
            <h3 style="font-size:0.9rem; text-transform:uppercase; color:#555;">Clear History</h3>
            <div style="display:flex; flex-direction:column; gap:8px;">
                ${stats.all.slice(0, 15).map(l => `
                    <div class="clear-item">
                        <span>${l.Name}</span>
                        <span class="c-${getDiffGroup(l.Difficulty)}">${l.Difficulty}</span>
                    </div>
                `).join('')}
            </div>
        `;
        panel.style.display = 'block';
    }

    function closePopup() {
        document.getElementById('player-popup-panel').style.display = 'none';
        document.querySelectorAll('.level-entry').forEach(el => el.classList.remove('active-row'));
    }

    init();
</script>
</body>
</html>
