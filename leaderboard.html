<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard | The Grandmaster Zone</title>
    <link rel="icon" type="image/png" href="assets/diffs/High Grandmaster I.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* ── Sort bar ── */
        .sort-container {
            margin: 20px auto;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }
        #sort-select {
            padding: 8px 12px;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #444;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── Entry extras ── */
        .hardest-display {
            display: block;
            font-size: 0.8rem;
            color: #bbb;
            margin-top: 4px;
            font-weight: 600;
        }
        .player-info small { color: #888; display: inline-block; }

        /* ── Player modal layout ── */
        #player-modal-body { color: var(--text-main); }

        .player-modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }
        .player-modal-header h2 { margin: 0; font-size: 1.6rem; }

        .modal-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            color: #888;
            margin: 20px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Stats row ── */
        .player-stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .pstat {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .pstat-val   { font-size: 1.4rem; font-weight: 900; color: var(--text-main); }
        .pstat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: 700; margin-top: 2px; }

        /* ── Hardest Clears (3 large image cards) ── */
        .hardest-clears-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .hardest-clear-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-card);
            aspect-ratio: 1;
        }
        .hardest-clear-card img.hc-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .hardest-clear-card .hc-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.88));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 8px;
        }
        .hardest-clear-card .hc-name {
            font-size: 0.82rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
            text-shadow: 0 1px 3px rgba(0,0,0,1);
        }
        .hardest-clear-card .hc-sub {
            font-size: 0.68rem;
            color: #bbb;
            margin-top: 2px;
            text-shadow: 0 1px 2px rgba(0,0,0,1);
        }
        .hardest-clear-card .diff-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            object-fit: contain;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.9));
        }
        .hardest-clear-card .rank-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0,0,0,0.68);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            backdrop-filter: blur(2px);
        }
        .hc-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--border);
            border-radius: 10px;
            aspect-ratio: 1;
        }

        /* ── Skills profile bars ── */
        .skills-summary { display: flex; flex-direction: column; gap: 6px; }
        .skill-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .skill-row-label {
            width: 130px;
            flex-shrink: 0;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .skill-bar-wrap {
            flex: 1;
            height: 16px;
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
            overflow: hidden;
        }
        .skill-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #550eb3, #8b3cf7);
            transition: width 0.5s ease;
        }
        .skill-multiplier {
            width: 44px;
            flex-shrink: 0;
            font-size: 0.78rem;
            font-weight: 900;
            color: #c4a0ff;
            text-align: right;
        }

        /* ── Clears grid ── */
        .clears-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
            gap: 7px;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .clears-grid::-webkit-scrollbar { width: 6px; }
        .clears-grid::-webkit-scrollbar-track { background: transparent; }
        .clears-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .clear-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-card);
            aspect-ratio: 1;
            cursor: default;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }
        .clear-card:hover { transform: scale(1.06); border-color: var(--accent); z-index: 2; }
        .clear-card img.cc-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        .clear-card .cc-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.88));
            color: #fff;
            font-size: 0.52rem;
            font-weight: 800;
            padding: 10px 3px 3px 3px;
            text-align: center;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .clear-card .diff-badge {
            position: absolute;
            top: 3px; right: 3px;
            width: 16px; height: 16px;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.9));
        }
        .clear-card .rank-overlay {
            position: absolute;
            top: 3px; left: 3px;
            background: rgba(0,0,0,0.68);
            color: #fff;
            font-size: 0.52rem;
            font-weight: 900;
            padding: 1px 4px;
            border-radius: 3px;
            line-height: 1.3;
            backdrop-filter: blur(2px);
        }

        /* ── Filter bar ── */
        .clears-filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .clears-filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .clears-filter-btn:hover { border-color: var(--accent); color: var(--text-main); }
        .clears-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .clears-count-label {
            margin-left: auto;
            font-size: 0.78rem;
            color: #888;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-link">
            <img src="assets/logo.webp" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/">Grandmaster Zone</a>
            <a href="/expert">Expert Zone</a>
            <a href="/leaderboard" class="active">Leaderboard</a>
        </div>
    </nav>

    <div id="container" style="max-width: 800px; margin: 0px auto; padding: 20px;">
        <h1 style="text-align:center; font-weight: 800;">Leaderboard</h1>

        <div class="sort-container">
            <label for="sort-select">Sort by:</label>
            <select id="sort-select" onchange="renderLeaderboard()">
                <option value="points">Points</option>
                <option value="difficulty">Hardest Clear</option>
                <option value="totalclears">Total Clears</option>
            </select>
        </div>

        <div id="loading-msg">Zoning in on the leaderboard...</div>
        <div id="leaderboard-list"></div>
    </div>

    <!-- Player Modal -->
    <div id="playerModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:780px;">
            <span onclick="closePlayerModal()" class="close-btn" style="cursor:pointer; font-size:24px; float:right;">&times;</span>
            <div id="player-modal-body"></div>
        </div>
    </div>

    <script>
        // ── Config ───────────────────────────────────────────────────────────
        const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const LB_GID         = "1908015854";
        const LEVEL_GIDS     = ["0", "1720349441", "1575264256"];
        const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

        // ── State ────────────────────────────────────────────────────────────
        window.PLAYER_DATA         = [];
        window.RANKED_DATA         = [];
        window.ALL_LEVELS          = [];
        window.GLOBAL_SKILL_RATES  = {};
        window._currentModalClears = [];
        let currentClearsFilter    = "all";

        // ── Helpers ──────────────────────────────────────────────────────────
        const safeText = v => (v === undefined || v === null) ? "" : String(v);

        function getTopNumber(text) {
            if (!text || text.toLowerCase() === "none" || text.trim() === "") return 999999;
            const m = text.match(/\(Top\s*(\d+)\)/i);
            return m ? parseInt(m[1], 10) : 999998;
        }

        const parseVictors = raw => (!raw || !raw.trim()) ? [] : raw.trim().split(/\s+/).filter(Boolean);
        const parseSkills  = raw => (!raw) ? [] : raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean);

        function extractLevelName(str) {
            if (!str || str.trim() === "" || str.toLowerCase() === "none") return null;
            return str.replace(/\(Top\s*\d+\)/i, "").trim();
        }

        function findLevel(nameStr) {
            if (!nameStr) return null;
            const needle = nameStr.toLowerCase();
            return window.ALL_LEVELS.find(l => l.nameLower === needle)
                || window.ALL_LEVELS.find(l => l.nameLower.includes(needle) || needle.includes(l.nameLower))
                || null;
        }

        const getDiffGroup = d => {
            const s = (d || "").toLowerCase();
            if (s.includes("grandmaster")) return "gm";
            if (s.includes("master"))      return "master";
            if (s.includes("expert"))      return "expert";
            return "other";
        };

        // ── CSV parsers ──────────────────────────────────────────────────────
        async function fetchCsv(gid) {
            const res  = await fetch(csvUrl(gid));
            const text = await res.text();
            return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        }

        function parsePlayerRow(row) {
            return {
                name:          safeText(row["Username"] || row["username"] || "Unknown"),
                points:        parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
                gmClears:      safeText(row["Num of GM Clears"]    || "0"),
                mstrClears:    safeText(row["Num of Mstr Clears"]  || "0"),
                expClears:     safeText(row["Num of Exp Clears"]   || "0"),
                hardest:       safeText(row["Hardest Clear (Master+)"]  || ""),
                secondHardest: safeText(row["Second Hardest (Master+)"] || ""),
                thirdHardest:  safeText(row["Third Hardest (Master+)"]  || ""),
                country:       safeText(row["Country"] || "")
            };
        }

        function parseLevelRow(row) {
            const name    = safeText(row["Name"] || row["name"]);
            const acronym = safeText(row["Acronym"]).toLowerCase();
            const diff    = safeText(row["Difficulty"] || "");
            // Expert zone uses no Rank column; Num is an internal sequence we don't show
            const rank    = safeText(row["Rank"] || "");
            const pts     = safeText(row["Points"] || row["points"] || "");
            const skills  = parseSkills(safeText(row["Skills Needed"] || row["Skills needed"] || row["Skills"] || ""));
            const victors = parseVictors(safeText(row["Victors"] || ""));
            // Expert sheet stores image path in "Image" column; others derive it from acronym
            const explicitImg = safeText(row["Image"] || "");
            const smallimg = explicitImg || (acronym ? `assets/smallthumbs/${acronym}.png` : "");
            const fullimg  = acronym ? `assets/thumbs/${acronym}.png` : "";
            return {
                name,
                nameLower:  name.toLowerCase(),
                acronym,
                smallimg,
                fullimg,
                diffimg:    diff ? `assets/diffs/${diff.trim()}.png` : "",
                difficulty: diff,
                rank,       // empty string for expert levels — no badge will render
                points: pts,
                skills,
                victors
            };
        }

        // ── Init ─────────────────────────────────────────────────────────────
        async function fetchLeaderboard() {
            try {
                const [lbData, lvlData1, lvlData2, lvlData3] = await Promise.all([
                    fetchCsv(LB_GID),
                    fetchCsv(LEVEL_GIDS[0]),
                    fetchCsv(LEVEL_GIDS[1]),
                    fetchCsv(LEVEL_GIDS[2])
                ]);

                const allLevels = [...lvlData1, ...lvlData2, ...lvlData3].map(parseLevelRow);
                window.ALL_LEVELS = allLevels;

                // Global skill rates (fraction of all levels that require this skill)
                const skillCounts = {};
                allLevels.forEach(lvl => lvl.skills.forEach(s => { if (s) skillCounts[s] = (skillCounts[s] || 0) + 1; }));
                const total = allLevels.length || 1;
                window.GLOBAL_SKILL_RATES = Object.fromEntries(
                    Object.entries(skillCounts).map(([s, c]) => [s, c / total])
                );

                window.RANKED_DATA = lbData.map(parsePlayerRow).sort((a, b) => b.points - a.points);
                window.PLAYER_DATA = [...window.RANKED_DATA];

                document.getElementById('loading-msg').style.display = 'none';
                renderLeaderboard();
            } catch (err) {
                console.error(err);
                document.getElementById('loading-msg').innerHTML = "Error loading data.";
            }
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            const sortBy    = document.getElementById('sort-select').value;

            let display = [...window.PLAYER_DATA];
            if (sortBy === "points") {
                display.sort((a, b) => b.points - a.points);
            } else if (sortBy === 'difficulty') {
                display.sort((a, b) => getTopNumber(a.hardest) - getTopNumber(b.hardest));
            } else if (sortBy === 'totalclears') {
                display.sort((a, b) => {
                    const clearsA = window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === a.name.toLowerCase())).length;
                    const clearsB = window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === b.name.toLowerCase())).length;
                    return clearsB - clearsA;
                });
            }

            container.innerHTML = display.map(p => {
                const globalRank = window.RANKED_DATA.indexOf(p) + 1;
                let colorClass = "rank-gray";
                if      (globalRank <=   3) colorClass = "rank-purple";
                else if (globalRank <=  10) colorClass = "rank-blue";
                else if (globalRank <=  25) colorClass = "rank-green";
                else if (globalRank <=  50) colorClass = "rank-yellow";
                else if (globalRank <= 100) colorClass = "rank-red";

                // Calculate clears dynamically here instead of relying on CSV columns
                const clears = getPlayerClears(p.name);
                const gmCount = clears.filter(l => getDiffGroup(l.difficulty) === "gm").length;
                const mstrCount = clears.filter(l => getDiffGroup(l.difficulty) === "master").length;
                const expCount = clears.filter(l => getDiffGroup(l.difficulty) === "expert").length;

                return `
                <div class="level-entry ${colorClass}" onclick="showPlayerDetails('${p.name.replace(/'/g, "\\'")}')">
                    <div class="level-rank">#${globalRank}</div>
                    <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                    <div class="player-info">
                        <div class="player-name-wrapper">${getFlagElement(p.country)} <b>${p.name}</b></div>
                        <small>${gmCount} GM, ${mstrCount} Master, ${expCount} Expert</small>
                        <span class="hardest-display">Hardest Clear: ${p.hardest || "None"}</span>
                    </div>
                    <div class="level-points">${p.points.toLocaleString()} pts</div>
                </div>`;
            }).join('');
        }

        function getFlagElement(countryCode) {
            if (!countryCode || countryCode.trim() === "" || countryCode.toLowerCase() === "n/a")
                return `<div class="flag-container no-flag"></div>`;
            const code = countryCode.toLowerCase().trim();
            return `<img class="flag-container" src="https://flagcdn.com/w40/${code}.png" onerror="this.outerHTML='<div class=\'flag-container no-flag\'></div>'">`;
        }

        // ── Player modal helpers ──────────────────────────────────────────────
        function getPlayerClears(playerName) {
            const nameLower = playerName.toLowerCase();
            return window.ALL_LEVELS.filter(lvl =>
                lvl.victors.some(v => v.toLowerCase() === nameLower)
            );
        }

        // Proportional skills: ratio of player's rate vs global rate, sorted desc
        function buildSkillsProfile(clears) {
            if (!clears.length) return [];
            const playerCounts = {};
            clears.forEach(lvl => lvl.skills.forEach(s => { if (s) playerCounts[s] = (playerCounts[s] || 0) + 1; }));

            const total = clears.length;
            return Object.entries(playerCounts)
                .map(([skill, count]) => {
                    const playerRate = count / total;
                    const globalRate = window.GLOBAL_SKILL_RATES[skill] || 0.001;
                    return { skill, ratio: playerRate / globalRate, count };
                })
                .sort((a, b) => b.ratio - a.ratio); // Removed the slice here
        }

        function hardestClearCard(clearText) {
            const levelName = extractLevelName(clearText);
            if (!levelName) return `<div class="hc-empty">—</div>`;

            const lvl = findLevel(levelName);
            const thumb   = lvl ? (lvl.fullimg || lvl.smallimg) : "";
            const diffImg = lvl ? lvl.diffimg  : "";
            const rank    = lvl ? lvl.rank     : "";
            const topMatch = clearText.match(/\(Top\s*(\d+)\)/i);
            const topSub   = topMatch ? `Top ${topMatch[1]}` : "";

            return `
            <div class="hardest-clear-card">
                ${thumb
                    ? `<img class="hc-thumb" src="${thumb}" alt="${levelName}" onerror="this.style.opacity='0.12'">`
                    : `<div style="width:100%;height:100%;background:rgba(255,255,255,0.03);"></div>`
                }
                ${rank    ? `<div class="rank-badge">#${rank}</div>`            : ''}
                ${diffImg ? `<img class="diff-badge" src="${diffImg}" alt="">` : ''}
                <div class="hc-overlay">
                    <div class="hc-name">${levelName}</div>
                    ${topSub ? `<div class="hc-sub">${topSub}</div>` : ''}
                </div>
            </div>`;
        }

        function renderClearsGrid(clears, filter) {
            const filtered = filter === "all" ? clears : clears.filter(lvl => getDiffGroup(lvl.difficulty) === filter);
            if (!filtered.length)
                return `<div style="color:#888;font-size:0.9rem;padding:20px;text-align:center;">No clears in this category.</div>`;

            return filtered.map(lvl => `
                <div class="clear-card" title="${lvl.name}${lvl.rank ? ' · #' + lvl.rank : ''}">
                    <img class="cc-thumb" src="${lvl.smallimg}" alt="${lvl.name}" onerror="this.style.opacity='0.12'">
                    ${lvl.rank    ? `<div class="rank-overlay">#${lvl.rank}</div>`                           : ''}
                    ${lvl.diffimg ? `<img class="diff-badge" src="${lvl.diffimg}" alt="${lvl.difficulty}">` : ''}
                    <div class="cc-label">${lvl.name}</div>
                </div>
            `).join('');
        }

        function refreshClearsSection(clears) {
            const filter   = currentClearsFilter;
            const filtered = filter === "all" ? clears : clears.filter(lvl => getDiffGroup(lvl.difficulty) === filter);
            const grid  = document.getElementById('pm-clears-grid');
            const count = document.getElementById('pm-clears-count');
            if (grid)  grid.innerHTML  = renderClearsGrid(clears, filter);
            if (count) count.textContent = `${filtered.length} clear${filtered.length !== 1 ? 's' : ''}`;
        }

        window.toggleSkills = function(btn) {
            const container = document.getElementById('expanded-skills');
            if (container.style.display === 'none') {
                container.style.display = 'flex'; // Uses flex to match the other skills container
                btn.textContent = 'Show Less';
            } else {
                container.style.display = 'none';
                btn.textContent = 'Show More';
            }
        };

        function showPlayerDetails(name) {
            const player = window.PLAYER_DATA.find(p => p.name === name);
            if (!player) return;

            const clears       = getPlayerClears(name);
            const skillProfile = buildSkillsProfile(clears);
            const gmCount      = clears.filter(l => getDiffGroup(l.difficulty) === "gm").length;
            const masterCount  = clears.filter(l => getDiffGroup(l.difficulty) === "master").length;
            const expertCount  = clears.filter(l => getDiffGroup(l.difficulty) === "expert").length;
            const otherCount   = clears.filter(l => getDiffGroup(l.difficulty) === "other").length;

            currentClearsFilter          = "all";
            window._currentModalClears   = clears;

            // Hardest clears — 3 image cards
            const hardestCards = [player.hardest, player.secondHardest, player.thirdHardest]
                .map(c => hardestClearCard(c || ""))
                .join('');

            // Skills profile bars logic
            const maxRatio = skillProfile.length ? skillProfile[0].ratio : 1;
            const renderSkillRow = ({ skill, ratio }) => {
                const barPct = Math.min((ratio / Math.max(maxRatio, 1)) * 100, 100).toFixed(1);
                const label  = ratio >= 10 ? `${ratio.toFixed(0)}×`
                            : ratio >= 2  ? `${ratio.toFixed(1)}×`
                                        : `${ratio.toFixed(2)}×`;
                return `
                <div class="skill-row">
                    <div class="skill-row-label" title="${skill}">${skill}</div>
                    <div class="skill-bar-wrap">
                        <div class="skill-bar-fill" style="width:${barPct}%"></div>
                    </div>
                    <div class="skill-multiplier">${label}</div>
                </div>`;
            };

            let skillsHtml = "";
            if (skillProfile.length > 0) {
                // Grab top 7 and anything remaining
                const top7Html = skillProfile.slice(0, 7).map(renderSkillRow).join('');
                const restHtml = skillProfile.slice(7).map(renderSkillRow).join('');

                skillsHtml = `<div class="skills-summary">${top7Html}</div>`;
                if (restHtml) {
                    // I reused your .clears-filter-btn class so the button matches your theme!
                    skillsHtml += `
                    <div id="expanded-skills" class="skills-summary" style="display:none; margin-top:6px;">
                        ${restHtml}
                    </div>
                    <button class="clears-filter-btn" onclick="toggleSkills(this)" style="margin-top:10px; padding:6px 16px;">Show More</button>
                    `;
                }
            } else {
                skillsHtml = `<div style="color:#888;font-size:0.85rem;">No skill data available.</div>`;
            }

            // Modal HTML injection
            document.getElementById('player-modal-body').innerHTML = `
                <div class="player-modal-header">
                    <img class="player-pfp" style="width:60px;height:60px;"
                        src="assets/players/${player.name}.png"
                        onerror="this.src='assets/players/default.png'">
                    <div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            ${getFlagElement(player.country)}
                            <h2 style="margin:0;">${player.name}</h2>
                        </div>
                        <div style="color:#888;font-size:0.85rem;margin-top:4px;">${player.points.toLocaleString()} total points</div>
                    </div>
                </div>

                <div class="player-stats-row">
                    <div class="pstat">
                        <div class="pstat-val">${gmCount}</div>
                        <div class="pstat-label">Grandmaster</div>
                    </div>
                    <div class="pstat">
                        <div class="pstat-val">${masterCount}</div>
                        <div class="pstat-label">Master</div>
                    </div>
                    <div class="pstat">
                        <div class="pstat-val">${expertCount}</div>
                        <div class="pstat-label">Expert</div>
                    </div>
                    <div class="pstat">
                        <div class="pstat-val">${clears.length}</div>
                        <div class="pstat-label">Total</div>
                    </div>
                </div>

                <p class="modal-section-title">Hardest Clears</p>
                <div class="hardest-clears-row">${hardestCards}</div>

                <p class="modal-section-title">
                    Skills Profile
                    <span style="font-weight:400;letter-spacing:0;font-size:0.68rem;color:#666;text-transform:none;margin-left:8px;">
                        — how over-represented each skill is in their clears vs. the list average
                    </span>
                </p>
                ${clears.length === 0
                    ? `<div style="color:#888;font-size:0.85rem;">No tracked clears found.</div>`
                    : skillsHtml
                }

                <p class="modal-section-title">All Clears</p>
                <div class="clears-filter-row">
                    <button class="clears-filter-btn active" data-filter="all"    onclick="setClearsFilter(this)">All (${clears.length})</button>
                    <button class="clears-filter-btn"        data-filter="gm"     onclick="setClearsFilter(this)">Grandmaster (${gmCount})</button>
                    <button class="clears-filter-btn"        data-filter="master" onclick="setClearsFilter(this)">Master (${masterCount})</button>
                    <button class="clears-filter-btn"        data-filter="expert" onclick="setClearsFilter(this)">Expert (${expertCount})</button>
                    ${otherCount > 0 ? `<button class="clears-filter-btn" data-filter="other" onclick="setClearsFilter(this)">Other (${otherCount})</button>` : ''}
                    <span class="clears-count-label" id="pm-clears-count">${clears.length} clears</span>
                </div>

                ${clears.length === 0
                    ? `<div style="color:#888;font-size:0.9rem;padding:20px;text-align:center;">
                        No levels found with this player listed as a victor.<br>
                        <span style="font-size:0.8rem;">Clears are matched from the Victors column on both level sheets.</span>
                    </div>`
                    : `<div class="clears-grid" id="pm-clears-grid">${renderClearsGrid(clears, 'all')}</div>`
                }
            `;

            document.getElementById('playerModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function setClearsFilter(btn) {
            btn.closest('.clears-filter-row').querySelectorAll('.clears-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentClearsFilter = btn.dataset.filter;
            refreshClearsSection(window._currentModalClears || []);
        }

        function closePlayerModal() {
            document.getElementById('playerModal').style.display = "none";
            document.body.style.overflow = "auto";
            window._currentModalClears = [];
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('playerModal').addEventListener('click', function(e) {
                if (e.target === this) closePlayerModal();
            });
        });

        window.onload = fetchLeaderboard;
    </script>
</body>
</html>
