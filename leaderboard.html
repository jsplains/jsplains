<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        .main-wrapper { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; padding: 20px; height: calc(100vh - 100px); box-sizing: border-box; }
        
        /* Left Column */
        .leaderboard-column { flex: 0 0 400px; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .list-header { padding: 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }
        
        .search-container { display: flex; align-items: center; background: #111; border: 1px solid #444; border-radius: 8px; padding: 0 12px; gap: 8px; width: 100%; box-sizing: border-box; }
        .filter-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #333; padding-right: 8px; color: #666; }
        #sort-select { background: transparent; color: #888; border: none; font-size: 0.75rem; font-family: inherit; cursor: pointer; outline: none; font-weight: 700; text-transform: uppercase; }
        .search-bar { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; font-family: inherit; outline: none; }

        #leaderboard-list { flex: 1; overflow-y: auto; padding: 10px; }

        /* Detail View */
        .details-column { flex: 1; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 30px; overflow-y: auto; }
        
        /* Stats Row */
        .stats-row { display: flex; gap: 10px; margin: 20px 0; }
        .stat-card { flex: 1; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-card span { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-card b { font-size: 1.2rem; color: var(--accent); }

        /* Hardest Clear Fix */
        .hardest-clears-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .hardest-clear-card { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; background: #000; }
        .hc-thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.65; }
        .hc-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.95) 5%, rgba(0,0,0,0) 60%); display: flex; align-items: flex-end; padding: 12px; }
        .hc-name { color: #fff; font-size: 0.9rem; font-weight: 900; text-shadow: 2px 2px 4px #000, 0 0 10px rgba(0,0,0,0.8); line-height: 1.1; }

        /* Skills Profile */
        .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .skill-row-label { width: 130px; font-size: 0.8rem; font-weight: 700; color: #eee; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .skill-bar-wrap { flex: 1; height: 12px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: linear-gradient(90deg, #550eb3, #8b3cf7); transition: width 0.6s ease; }
        .skill-multiplier { width: 40px; font-size: 0.75rem; font-weight: 900; color: #c4a0ff; text-align: right; }

        /* Clears Grid */
        .clears-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; margin-top: 15px; }
        .clear-card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; background: #111; }
        .cc-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); font-size: 0.6rem; padding: 4px 0; text-align: center; color: #eee; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #555; margin: 35px 0 15px 0; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .show-more-btn { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #aaa; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 0.75rem; font-weight: 700; }
        .show-more-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="leaderboard-column">
        <div class="list-header">
            <div class="search-container">
                <div class="filter-group">
                    <i class="fa-solid fa-filter"></i>
                    <select id="sort-select" onchange="renderLeaderboard()">
                        <option value="points">Points</option>
                        <option value="totalclears">Clears</option>
                    </select>
                </div>
                <input type="text" id="player-search" class="search-bar" placeholder="Search victors..." oninput="renderLeaderboard()">
            </div>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="details-column" id="player-profile-view"></div>
</div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
    const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    window.PLAYER_DATA = [];
    window.ALL_LEVELS = [];
    window.GLOBAL_SKILL_RATES = {};
    let selectedPlayerName = null;

    async function init() {
        const [lb, l1, l2, l3] = await Promise.all([fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])]);
        
        window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
            name: (row["Name"] || "").trim(),
            acronym: (row["Acronym"] || "").toLowerCase(),
            difficulty: (row["Difficulty"] || "").trim(),
            skills: (row["Skills Needed"] || row["Skills"] || "").split(/,|\n/).map(s=>s.trim()).filter(Boolean),
            victors: (row["Victors"] || "").split(/\s+/).filter(Boolean)
        }));

        // Math for skill percentages
        const counts = {};
        window.ALL_LEVELS.forEach(l => l.skills.forEach(s => counts[s] = (counts[s] || 0) + 1));
        const totalLvl = window.ALL_LEVELS.length || 1;
        window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(counts).map(([s, c]) => [s, c / totalLvl]));

        window.PLAYER_DATA = lb.map(row => ({
            name: (row["Username"] || "").trim(),
            points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
            hardest: (row["Hardest Clear (Master+)"] || "None").replace(/\(Top\s*\d+\)/i, "").trim(),
            secondHardest: (row["Second Hardest (Master+)"] || "None").replace(/\(Top\s*\d+\)/i, "").trim(),
            thirdHardest: (row["Third Hardest (Master+)"] || "None").replace(/\(Top\s*\d+\)/i, "").trim(),
            country: (row["Country"] || "").trim().toLowerCase()
        })).sort((a,b) => b.points - a.points);

        renderLeaderboard();
        if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
    }

    async function fetchCsv(gid) {
        const res = await fetch(csvUrl(gid));
        const text = await res.text();
        return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function getClears(name) {
        return window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase()));
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        const query = document.getElementById('player-search').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;
        let display = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));
        
        if(sortBy === 'totalclears') display.sort((a,b) => getClears(b.name).length - getClears(a.name).length);

        container.innerHTML = display.map(p => {
            const rank = window.PLAYER_DATA.findIndex(x => x.name === p.name) + 1;
            return `
            <div class="level-entry ${p.name === selectedPlayerName ? 'selected' : ''}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                <div class="level-rank">#${rank}</div>
                <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                <div class="player-info"><div class="player-name-wrapper">${p.country ? `<img src="https://flagcdn.com/w20/${p.country}.png">` : ''} <b>${p.name}</b></div></div>
                <div class="level-points">${p.points.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function selectPlayer(name) {
        selectedPlayerName = name;
        renderLeaderboard();
        const p = window.PLAYER_DATA.find(x => x.name === name);
        const clears = getClears(name);
        
        const gmCount = clears.filter(l => l.difficulty.includes("Grandmaster")).length;
        const mCount = clears.filter(l => l.difficulty.includes("Master")).length;
        const eCount = clears.filter(l => l.difficulty.includes("Expert")).length;

        // Skill Calc
        const pCounts = {};
        clears.forEach(l => l.skills.forEach(s => pCounts[s] = (pCounts[s] || 0) + 1));
        const skillProfile = Object.entries(pCounts).map(([s, count]) => ({
            skill: s, ratio: (count / (clears.length || 1)) / (window.GLOBAL_SKILL_RATES[s] || 0.001)
        })).sort((a,b) => b.ratio - a.ratio);

        const hardestCards = [p.hardest, p.secondHardest, p.thirdHardest].map(h => {
            const lvl = window.ALL_LEVELS.find(l => l.name.toLowerCase() === h.toLowerCase());
            if(!lvl) return `<div class="hardest-clear-card" style="border:1px dashed #222;"></div>`;
            return `
            <div class="hardest-clear-card">
                <img class="hc-thumb" src="assets/thumbs/${lvl.acronym}.png">
                <div class="hc-overlay"><div class="hc-name">${lvl.name}</div></div>
                <img src="assets/diffs/${lvl.difficulty}.png" style="position:absolute; top:8px; right:8px; width:22px;">
            </div>`;
        }).join('');

        document.getElementById('player-profile-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:25px;">
                <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:90px; height:90px; border-radius:15px; border:2px solid #222;">
                <div>
                    <h1 style="margin:0; font-size:1.8rem; display:flex; align-items:center; gap:12px;">
                        ${p.country ? `<img src="https://flagcdn.com/w40/${p.country}.png" style="width:35px;">` : ''} ${p.name}
                    </h1>
                    <b style="color:var(--accent); font-size:1.1rem;">${p.points.toLocaleString()} POINTS</b>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card"><span>Total Clears</span><b>${clears.length}</b></div>
                <div class="stat-card"><span>Grandmaster</span><b>${gmCount}</b></div>
                <div class="stat-card"><span>Master</span><b>${mCount}</b></div>
                <div class="stat-card"><span>Expert</span><b>${eCount}</b></div>
            </div>

            <div class="section-title">Hardest Clears</div>
            <div class="hardest-clears-row">${hardestCards}</div>

            <div class="section-title">Skillset Breakdown</div>
            <div id="skills-box">
                ${skillProfile.slice(0, 5).map(s => `
                    <div class="skill-row">
                        <div class="skill-row-label">${s.skill}</div>
                        <div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${Math.min(s.ratio*10, 100)}%"></div></div>
                        <div class="skill-multiplier">${s.ratio.toFixed(1)}x</div>
                    </div>`).join('')}
                ${skillProfile.length > 5 ? `<div id="extra-skills" style="display:none;">${skillProfile.slice(5).map(s => `<div class="skill-row"><div class="skill-row-label">${s.skill}</div><div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${Math.min(s.ratio*10, 100)}%"></div></div><div class="skill-multiplier">${s.ratio.toFixed(1)}x</div></div>`).join('')}</div>
                <button class="show-more-btn" onclick="const e=document.getElementById('extra-skills'); e.style.display=e.style.display==='none'?'block':'none'; this.innerText=e.style.display==='none'?'Show More Skills':'Show Less'">Show More Skills</button>` : ''}
            </div>

            <div class="section-title">Complete History</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="filter-btn active" onclick="filterH('all', this)">All</button>
                <button class="filter-btn" onclick="filterH('Grandmaster', this)">GM</button>
                <button class="filter-btn" onclick="filterH('Master', this)">Master</button>
                <button class="filter-btn" onclick="filterH('Expert', this)">Expert</button>
            </div>
            <div class="clears-grid" id="history-grid">
                ${clears.slice(0, 12).map(l => `<div class="clear-card"><img src="assets/smallthumbs/${l.acronym}.png"><div class="cc-label">${l.name}</div></div>`).join('')}
            </div>
            ${clears.length > 12 ? `<button class="show-more-btn" id="history-load-more" onclick="showAllHistory()">Show All ${clears.length} Clears</button>` : ''}
        `;
    }

    window.showAllHistory = function() {
        const clears = getClears(selectedPlayerName);
        document.getElementById('history-grid').innerHTML = clears.map(l => `<div class="clear-card"><img src="assets/smallthumbs/${l.acronym}.png"><div class="cc-label">${l.name}</div></div>`).join('');
        document.getElementById('history-load-more').style.display = 'none';
    };

    window.filterH = function(diff, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const clears = getClears(selectedPlayerName);
        const filtered = diff === 'all' ? clears : clears.filter(l => l.difficulty.includes(diff));
        document.getElementById('history-grid').innerHTML = filtered.map(l => `<div class="clear-card"><img src="assets/smallthumbs/${l.acronym}.png"><div class="cc-label">${l.name}</div></div>`).join('');
        if(document.getElementById('history-load-more')) document.getElementById('history-load-more').style.display = 'none';
    };

    window.onload = init;
</script>
</body>
</html>
