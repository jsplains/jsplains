<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* ── Split View Layout ── */
        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 120px);
        }

        /* ── Left Column (List) ── */
        .leaderboard-column {
            flex: 0 0 400px; /* Fixed width for the list */
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .list-header {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }

        .search-container {
            position: relative;
            margin-bottom: 10px;
        }

        .search-container i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .search-bar {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border-radius: 6px;
            background: #111;
            border: 1px solid #444;
            color: white;
            font-family: inherit;
        }

        #leaderboard-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* ── Compressed Name Logic ── */
        .player-info {
            flex: 1;
            min-width: 0; /* Critical for ellipsis to work in flex */
            margin: 0 10px;
        }

        .player-name-wrapper b {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Compresses long names */
            font-size: 0.95rem;
        }

        /* ── Right Column (Details) ── */
        .details-column {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 30px;
            overflow-y: auto;
        }

        /* ── Selection State ── */
        .level-entry.selected {
            background: rgba(139, 60, 247, 0.15);
            border-color: var(--accent);
            box-shadow: inset 4px 0 0 var(--accent);
        }

        /* ── Detailed View Components ── */
        .player-modal-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .modal-section-title { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: var(--accent); 
            margin: 25px 0 12px 0; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .pstat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .pstat { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .pstat-val { display: block; font-size: 1.4rem; font-weight: 900; }
        .pstat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        .clears-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
        .clear-card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1/1; cursor: pointer; }
        .clear-card img { width: 100%; height: 100%; object-fit: cover; }
        .clear-card:hover { border-color: var(--accent); }

        @media (max-width: 1000px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .leaderboard-column { flex: none; width: 100%; height: 500px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo-link"><img src="assets/logo.webp" alt="Logo" class="nav-logo"></a>
        <div class="nav-links">
            <a href="/mainlist">Main List</a>
            <a href="/expert">Extended List</a>
            <a href="/leaderboard" class="active">Leaderboard</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="leaderboard-column">
            <div class="list-header">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="player-search" class="search-bar" placeholder="Filter players..." oninput="renderLeaderboard()">
                </div>
                <div style="display:flex; justify-content: space-between; font-size: 0.7rem; color: #666; text-transform: uppercase;">
                    <span>Rank & Player</span>
                    <span>Points</span>
                </div>
            </div>
            <div id="leaderboard-list">
                <div style="padding:20px; text-align:center; color:#555;"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Data...</div>
            </div>
        </div>

        <div class="details-column" id="player-details-view">
            <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444;">
                <i class="fa-solid fa-user-astronaut style="font-size: 3rem; margin-bottom: 15px;"></i>
                <p>Select a player to view their profile</p>
            </div>
        </div>
    </div>

    <script>
        // ... (PapaParse & Data Fetching Logic remains same as previous version) ...
        const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const LB_GID = "1908015854";
        const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
        const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

        window.PLAYER_DATA = [];
        window.ALL_LEVELS = [];
        let selectedPlayerName = null;

        async function init() {
            try {
                const [lbData, l1, l2, l3] = await Promise.all([
                    fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])
                ]);

                window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
                    name: (row["Name"] || row["name"] || "").trim(),
                    acronym: (row["Acronym"] || "").toLowerCase(),
                    difficulty: (row["Difficulty"] || "").trim(),
                    victors: (row["Victors"] || "").split(/\s+/).filter(Boolean)
                }));

                window.PLAYER_DATA = lbData.map(row => ({
                    name: (row["Username"] || "Unknown").trim(),
                    points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
                    hardest: row["Hardest Clear (Master+)"] || "None",
                    country: row["Country"] || ""
                })).sort((a,b) => b.points - a.points);

                renderLeaderboard();
                if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
            } catch(e) { console.error("Load failed", e); }
        }

        async function fetchCsv(gid) {
            const res = await fetch(csvUrl(gid));
            const text = await res.text();
            return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            const query = document.getElementById('player-search').value.toLowerCase();
            
            const filtered = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));

            container.innerHTML = filtered.map((p, idx) => {
                const rank = window.PLAYER_DATA.findIndex(orig => orig.name === p.name) + 1;
                const isSelected = p.name === selectedPlayerName ? 'selected' : '';
                
                return `
                <div class="level-entry ${isSelected}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                    <div class="level-rank">#${rank}</div>
                    <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                    <div class="player-info">
                        <div class="player-name-wrapper"><b>${p.name}</b></div>
                        <div style="font-size:0.65rem; color:#666;">${p.hardest}</div>
                    </div>
                    <div class="level-points">${p.points.toLocaleString()}</div>
                </div>`;
            }).join('');
        }

        function selectPlayer(name) {
            selectedPlayerName = name;
            renderLeaderboard(); // Update selection styling

            const p = window.PLAYER_DATA.find(x => x.name === name);
            const clears = window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase()));

            document.getElementById('player-details-view').innerHTML = `
                <div class="player-modal-header">
                    <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:80px; height:80px; border-radius:12px; border:2px solid var(--border);">
                    <div>
                        <h1 style="margin:0; letter-spacing:-1px;">${p.name}</h1>
                        <p style="margin:0; color:#888;"><i class="fa-solid fa-location-dot"></i> ${p.country || 'Unknown'}</p>
                    </div>
                </div>

                <div class="pstat-row">
                    <div class="pstat"><span class="pstat-val">${p.points.toLocaleString()}</span><span class="pstat-label">Points</span></div>
                    <div class="pstat"><span class="pstat-val">${clears.length}</span><span class="pstat-label">Total Clears</span></div>
                    <div class="pstat"><span class="pstat-val">#${window.PLAYER_DATA.indexOf(p)+1}</span><span class="pstat-label">Global Rank</span></div>
                    <div class="pstat"><span class="pstat-val"><i class="fa-solid fa-trophy" style="color:gold;"></i></span><span class="pstat-label">Status</span></div>
                </div>

                <div class="modal-section-title"><i class="fa-solid fa-list-check"></i> Recent Clears</div>
                <div class="clears-grid">
                    ${clears.slice(0, 20).map(c => `
                        <div class="clear-card" title="${c.name}">
                            <img src="assets/smallthumbs/${c.acronym}.png" onerror="this.style.opacity='0.2'">
                        </div>
                    `).join('') || '<p style="color:#444">No clears found.</p>'}
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
