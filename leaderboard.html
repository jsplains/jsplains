<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandmaster Zone | Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        /* Base Layout & Spacing */
        body { margin: 0; padding: 0; overflow: hidden; background: var(--bg-page); }


        .main-wrapper { 
            display: flex; 
            gap: 20px; 
            max-width: 1300px; 
            margin: 70px auto 0 auto; 
            padding: 20px; 
            height: calc(100vh - 70px); 
            box-sizing: border-box; 
        }

        /* Sidebar Column */
        .leaderboard-column { 
            flex: 0 0 380px; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            box-shadow: var(--shadow);
        }

        .list-header { 
            padding: 15px; 
            background: rgba(0,0,0,0.2); 
            border-bottom: 1px solid var(--border); 
        }

        .search-container { 
            display: flex; 
            align-items: center; 
            background: var(--bg-page); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 0 12px; 
        }

        #sort-select { 
            background: transparent; color: var(--text-muted); border: none; font-size: 0.7rem; 
            font-weight: 800; text-transform: uppercase; cursor: pointer; outline: none;
            padding: 10px 0; border-right: 1px solid var(--border); margin-right: 10px;
        }

        .search-bar { 
            flex: 1; background: transparent; border: none; color: var(--text-main); 
            padding: 10px 0; font-size: 0.85rem; outline: none; 
        }

        #leaderboard-list { flex: 1; overflow-y: auto; padding: 10px; }

        /* Sidebar Entry Styling */
        #leaderboard-list .level-entry {
            margin-bottom: 8px;
            padding: 10px;
            background: rgba(15, 23, 42, 0.3);
            border-left: 4px solid #888;
        }

        #leaderboard-list .level-entry.selected {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .level-rank { 
            width: 45px; 
            font-size: 1.1rem !important; 
            color: var(--text-main); 
            justify-content: flex-start !important;
        }

        .player-pfp { width: 38px; height: 38px; border-radius: 6px; margin-right: 12px; object-fit: cover; }
        .level-points { font-weight: 800; color: var(--accent); font-size: 0.9rem; margin-left: auto; }

        /* Profile Details Column */
        .details-column { 
            flex: 1; 
            background: var(--bg-card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            padding: 30px; 
            overflow-y: auto; 
            box-shadow: var(--shadow);
        }

        .pstat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .pstat { background: var(--bg-page); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
        .pstat-val { font-size: 1.3rem; font-weight: 900; color: var(--text-main); display: block; }
        .pstat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

        /* Cards & Skill Bars */
        .hc-card { 
            position: relative; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            width: 100%;
            aspect-ratio: 21 / 9;
            background: #000; 
        }
        .hc-thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .hc-overlay { 
            position: absolute; inset: 0; padding: 20px;
            background: linear-gradient(0deg, var(--bg-page) 5%, transparent 100%); 
            display: flex; flex-direction: column; justify-content: flex-end; 
        }

        .skill-bar-bg { background: var(--bg-page); height: 12px; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; margin: 6px 0 12px 0; }
        .skill-bar-fill { height: 100%; transition: width 0.6s ease; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 35px 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: 800; }
        
        .clears-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
        .clear-card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1; background: var(--bg-page); }
        .cc-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 0.6rem; padding: 6px 2px; text-align: center; color: #fff; font-weight: 700; }

        .clears-filter-btn {
            background: var(--bg-page); border: 1px solid var(--border); color: var(--text-muted); 
            padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.2s;
        }
        .clears-filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><img src="assets/logo.webp" class="nav-logo"></a>
    <div class="nav-links">
        <a href="/mainlist">Main List</a>
        <a href="/expert">Extended List</a>
        <a href="/leaderboard" class="active">Leaderboard</a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="leaderboard-column">
        <div class="list-header">
            <div class="search-container">
                <select id="sort-select" onchange="renderLeaderboard()">
                    <option value="points">Points</option>
                    <option value="difficulty">Hardest</option>
                    <option value="totalclears">Clears</option>
                </select>
                <input type="text" id="player-search" class="search-bar" placeholder="Search victors..." oninput="renderLeaderboard()">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted)"></i>
            </div>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="details-column" id="player-profile-view">
        <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color: var(--text-muted);">
            <i class="fa-solid fa-medal" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.1;"></i>
            <h3>Select a victor to view profile</h3>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
    const LB_GID = "1908015854";
    const LEVEL_GIDS = ["0", "1720349441", "1575264256"];
    const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;

    window.PLAYER_DATA = [];
    window.ALL_LEVELS = [];
    window.GLOBAL_SKILL_RATES = {};
    let selectedPlayerName = null;

    async function init() {
        try {
            const [lb, l1, l2, l3] = await Promise.all([fetchCsv(LB_GID), fetchCsv(LEVEL_GIDS[0]), fetchCsv(LEVEL_GIDS[1]), fetchCsv(LEVEL_GIDS[2])]);
            
            window.ALL_LEVELS = [...l1, ...l2, ...l3].map(row => ({
                name: (row["Name"] || "").trim(),
                acronym: (row["Acronym"] || "").toLowerCase(),
                difficulty: (row["Difficulty"] || "").trim(),
                skills: (row["Skills Needed"] || row["Skills"] || "").split(/,|\n/).map(s=>s.trim()).filter(Boolean),
                victors: (row["Victors"] || "").split(/\s+/).filter(Boolean)
            }));

            const counts = {};
            window.ALL_LEVELS.forEach(l => l.skills.forEach(s => counts[s] = (counts[s] || 0) + 1));
            window.GLOBAL_SKILL_RATES = Object.fromEntries(Object.entries(counts).map(([s, c]) => [s, c / window.ALL_LEVELS.length]));

            window.PLAYER_DATA = lb.map(row => ({
                name: (row["Username"] || "").trim(),
                points: parseInt((row["Points"] || "0").replace(/,/g, "")) || 0,
                hardest: (row["Hardest Clear (Master+)"] || "None").trim(),
                country: (row["Country"] || "").trim().toLowerCase()
            })).sort((a,b) => b.points - a.points);

            renderLeaderboard();
            if(window.PLAYER_DATA.length > 0) selectPlayer(window.PLAYER_DATA[0].name);
        } catch(e) { console.error("Leaderboard error:", e); }
    }

    async function fetchCsv(gid) {
        const res = await fetch(csvUrl(gid));
        const text = await res.text();
        return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function getClears(name) {
        return window.ALL_LEVELS.filter(l => l.victors.some(v => v.toLowerCase() === name.toLowerCase()));
    }

    function getTopNumber(text) {
        if (!text || text.toLowerCase() === "none") return 999999;
        const match = text.match(/\(Top\s*(\d+)\)/i);
        return match ? parseInt(match[1], 10) : 999998; 
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        const query = document.getElementById('player-search').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;
        
        let display = window.PLAYER_DATA.filter(p => p.name.toLowerCase().includes(query));
        
        if (sortBy === 'totalclears') display.sort((a, b) => getClears(b.name).length - getClears(a.name).length);
        else if (sortBy === 'difficulty') display.sort((a, b) => getTopNumber(a.hardest) - getTopNumber(b.hardest));
        else display.sort((a, b) => b.points - a.points);

        container.innerHTML = display.map((p) => {
            const globalRank = window.PLAYER_DATA.findIndex(x => x.name === p.name) + 1;
            let rankClass = "rank-gray";
            if (globalRank <= 3) rankClass = "rank-purple";
            else if (globalRank <= 10) rankClass = "rank-blue";
            else if (globalRank <= 25) rankClass = "rank-green";
            else if (globalRank <= 50) rankClass = "rank-yellow";
            else if (globalRank <= 100) rankClass = "rank-red";

            return `
            <div class="level-entry ${rankClass} ${p.name === selectedPlayerName ? 'selected' : ''}" onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')">
                <div class="level-rank">#${globalRank}</div>
                <img class="player-pfp" src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'">
                <div class="player-info">
                    <div class="player-name-wrapper">
                        ${p.country ? `<img class="flag-container" src="https://flagcdn.com/w40/${p.country}.png">` : ''} 
                        <span class="level-name" style="font-size:0.9rem">${p.name}</span>
                    </div>
                    <span class="level-meta" style="font-size:0.7rem">${p.hardest}</span>
                </div>
                <div class="level-points">${p.points.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function selectPlayer(name) {
        selectedPlayerName = name;
        renderLeaderboard();
        const p = window.PLAYER_DATA.find(x => x.name === name);
        const clears = getClears(name);
        
        const counts = { GM: 0, Master: 0, Expert: 0 };
        clears.forEach(l => {
            if(l.difficulty.includes("Grandmaster")) counts.GM++;
            else if(l.difficulty.includes("Master")) counts.Master++;
            else if(l.difficulty.includes("Expert")) counts.Expert++;
        });

        const pCounts = {};
        clears.forEach(l => l.skills.forEach(s => pCounts[s] = (pCounts[s] || 0) + 1));
        const skillProfile = Object.entries(pCounts).map(([s, count]) => ({
            skill: s, ratio: (count / (clears.length || 1)) / (window.GLOBAL_SKILL_RATES[s] || 0.001)
        })).sort((a,b) => b.ratio - a.ratio);

        const baseName = p.hardest.replace(/\(Top\s*\d+\)/i, "").trim().toLowerCase();
        const hardestLvl = window.ALL_LEVELS.find(l => l.name.toLowerCase() === baseName);

        document.getElementById('player-profile-view').innerHTML = `
            <div style="display:flex; align-items:center; gap:20px;">
                <img src="assets/players/${p.name}.png" onerror="this.src='assets/players/default.png'" style="width:80px; height:80px; border-radius:12px; border: 2px solid var(--border);">
                <div>
                    <h1 style="margin:0; font-size:1.8rem; display:flex; align-items:center; gap:12px;">
                        ${p.country ? `<img src="https://flagcdn.com/w40/${p.country}.png" class="flag-container" style="width:35px; height:auto;">` : ''} ${p.name}
                    </h1>
                    <span style="color:var(--accent); font-weight:900; font-size: 1rem;">${p.points.toLocaleString()} TOTAL POINTS</span>
                </div>
            </div>

            <div class="pstat-row">
                <div class="pstat"><span class="pstat-val">${counts.GM}</span><span class="pstat-label">Grandmaster</span></div>
                <div class="pstat"><span class="pstat-val">${counts.Master}</span><span class="pstat-label">Master</span></div>
                <div class="pstat"><span class="pstat-val">${counts.Expert}</span><span class="pstat-label">Expert</span></div>
                <div class="pstat"><span class="pstat-val">${clears.length}</span><span class="pstat-label">Total Clears</span></div>
            </div>

            <div class="section-title">Hardest Clear</div>
            <div class="hc-card">
                <img class="hc-thumb" src="assets/thumbs/${hardestLvl?.acronym || 'default'}.png" onerror="this.src='assets/thumbs/default.png'">
                <div class="hc-overlay"><div class="level-name" style="font-size:1.5rem">${p.hardest}</div></div>
            </div>

            <div class="section-title">Skillset Profile</div>
            <div>
                ${skillProfile.slice(0, 5).map(s => `
                    <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:700; color:var(--text-muted); margin-bottom:4px;">
                        <span>${s.skill}</span>
                        <span style="color:var(--accent)">${s.ratio.toFixed(1)}x</span>
                    </div>
                    <div class="skill-bar-bg">
                        <div class="skill-bar-fill" style="width:${Math.min(s.ratio*10, 100)}%; background: linear-gradient(90deg, #550eb3, #8b3cf7);"></div>
                    </div>
                `).join('')}
            </div>

            <div class="section-title">All Clears</div>
            <div style="display:flex; gap:8px; margin-bottom:20px;">
                <button class="clears-filter-btn active" onclick="filterC('all', this)">All</button>
                <button class="clears-filter-btn" onclick="filterC('Grandmaster', this)">GM</button>
                <button class="clears-filter-btn" onclick="filterC('Master', this)">Master</button>
                <button class="clears-filter-btn" onclick="filterC('Expert', this)">Expert</button>
            </div>
            <div class="clears-grid" id="history-grid">
                ${clears.map(l => `
                    <div class="clear-card">
                        <img style="width:100%; height:100%; object-fit:cover;" src="assets/smallthumbs/${l.acronym}.png" onerror="this.src='assets/smallthumbs/default.png'">
                        <div class="cc-label">${l.name}</div>
                    </div>`).join('')}
            </div>
        `;
    }

    window.filterC = function(diff, btn) {
        document.querySelectorAll('.clears-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const clears = getClears(selectedPlayerName);
        const filtered = diff === 'all' ? clears : clears.filter(l => l.difficulty.includes(diff));
        document.getElementById('history-grid').innerHTML = filtered.map(l => `
            <div class="clear-card">
                <img style="width:100%; height:100%; object-fit:cover;" src="assets/smallthumbs/${l.acronym}.png" onerror="this.src='assets/smallthumbs/default.png'">
                <div class="cc-label">${l.name}</div>
            </div>`).join('');
    };

    window.onload = init;
</script>
</body>
</html>
